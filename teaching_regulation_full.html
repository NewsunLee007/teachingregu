<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>温州市初中教学常规（2025）</title>
  <style>
:root {
  --bg: #f0f2f5;
  --paper: #ffffff;
  --ink: #2c3e50;
  --muted: #7f8c8d;
  --border: #e1e4e8;
  --accent: #3498db;
  --accent-2: #2980b9;
  --highlight-bg: #fff9c4;
  --highlight-border: #f1c40f;
  --focus: rgba(52, 152, 219, 0.4);
  --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
  --radius: 8px;
  
  /* Typography */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-serif: "Merriweather", "Noto Serif SC", serif;
  --font-mono: "Fira Code", monospace;
  --font-display: "PingFang SC", "Microsoft YaHei", var(--font-sans);
  --font-nav: "PingFang SC", var(--font-sans);
  --font-body: "Songti SC", "SimSun", "Noto Serif SC", serif; /* Changed to serif as requested for "different" feel */

  --h1-size: 28px;
  --h2-size: 24px;
  --h3-size: 20px;
  --h4-size: 17px;
  --h5-size: 15px;
  --h6-size: 14px;

  --h1-color: #2c3e50;
  --h2-color: #34495e;
  --h3-color: #2c3e50;
  --h4-color: #2c3e50;
  --h5-color: #2c3e50;
  --h6-color: #7f8c8d;
  
  --text-body: #111827; /* Darker black for body text */

  --topbar-h: 60px;
  --subnav-h: 48px;
  
  --sidebar-w: 180px;
  --page-max: 1200px;
  --prose-max: 800px;
  --gutter: 32px;
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

button, input, select { font: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

/* Layout */
.layout { display: flex; height: 100%; overflow: hidden; background: var(--bg); }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  flex: 0 0 var(--sidebar-w);
  background: var(--paper); /* Changed from #fff */
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  box-shadow: 2px 0 8px rgba(0,0,0,0.02);
}

.brand {
  height: 112px; /* 60px (topbar) + 52px (subnav) */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: var(--paper); /* Removed gradient, cleaner look */
  text-align: center; /* Center align */
}
.brand h1 {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 800; /* Bolder */
  line-height: 1.2;
  color: var(--accent); /* Use accent color for text */
  font-size: 24px; /* Larger */
  letter-spacing: -0.5px;
}
.brand p {
  margin: 8px 0 0 0;
  color: var(--muted);
  font-size: 14px;
  font-family: var(--font-mono); /* Technical look for year */
  letter-spacing: 4px;
  font-weight: 600;
}

/* Directory/Nav */
.directory {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.directory-list { display: flex; flex-direction: column; gap: 4px; }

.directory-btn {
  width: 100%;
  text-align: center; /* Centered as requested */
  border: none;
  background: transparent;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center; /* Centered as requested */
  gap: 10px;
  color: var(--ink);
  font-size: 15px;
  font-weight: 500;
  font-family: var(--font-nav);
  transition: all 0.2s ease;
}
.directory-btn:hover { background: rgba(0,0,0,0.03); color: var(--accent); }
.directory-btn[aria-current="page"] {
  background: linear-gradient(90deg, rgba(52, 152, 219, 0.1), transparent);
  color: var(--accent);
  font-weight: 600;
  box-shadow: inset 4px 0 0 var(--accent);
  border-radius: 4px 8px 8px 4px;
}

/* Main Area */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; background: var(--paper); /* Changed from #fff */ }

.topbar {
  height: var(--topbar-h);
  background: var(--paper); /* Changed from #fff */
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 90;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}
.crumb { color: var(--ink); font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }

.top-actions { display: flex; gap: 12px; align-items: center; }

.btn {
  border: 1px solid var(--border);
  background: var(--paper); /* Changed from #fff */
  border-radius: 6px;
  padding: 6px 14px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  font-weight: 500; color: var(--ink); font-size: 14px;
  transition: all 0.2s;
}
.btn:hover { background-color: var(--bg); border-color: var(--accent); color: var(--accent); }

/* Subnav Bar (Top Tabs) */
.subnavBar{
  position: sticky;
  top: 0;
  z-index: 80;
  background: var(--paper); /* Changed from rgba(255,255,255,0.95) */
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 24px;
  height: 52px;
}
.subnavTabs{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  overflow: hidden; /* Changed from overflow-x: auto to hidden for Priority+ pattern */
  flex: 1;
  height: 100%;
}
.subnavTabs::-webkit-scrollbar { display: none; }

.subnavTab{
  border: none;
  background: transparent;
  padding: 0 16px;
  font-size: 15px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  border-radius: 0;
  transition: all 0.2s;
  height: 100%;
  font-family: var(--font-nav);
  position: relative;
  display: flex;
  align-items: center;
}
.subnavTab:hover {
  color: var(--accent);
}
.subnavTab[aria-current="true"]{ 
  color: var(--accent);
  font-weight: 600;
  background: transparent;
}
.subnavTab[aria-current="true"]::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--accent);
  border-radius: 3px 3px 0 0;
}

.subnavMore { position: relative; display: none; /* Hidden by default */ }
.subnavMore[data-visible="true"] { display: block; }

.subnavMenu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  min-width: 220px;
  max-height: min(70vh, 520px);
  overflow: auto;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 6px;
  z-index: 1000; /* Ensure menu is above other content */
}
.subnavMenuItem{
  width: 100%;
  text-align: left;
  border: none;
  background: transparent;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--ink);
  font-family: var(--font-nav);
}
.subnavMenuItem:hover { background: var(--bg); }
.subnavMenuItem[aria-current="true"] { color: var(--accent); font-weight: 600; background: var(--focus); }

/* Reader Styles (Optimized Text) */
.contentWrap { flex: 1; min-height: 0; background: var(--paper); /* Changed from #fff */ display: flex; flex-direction: column; /* Fix scrolling issue */ }
.reader {
  flex: 1;
  overflow-y: auto;
  padding: 40px var(--gutter) 120px;
  background: var(--paper); /* Changed from #fff */
}
.page { max-width: var(--prose-max); margin: 0 auto; }

.hero {
  text-align: left;
  margin: 0 0 40px 0;
  padding: 0 0 24px;
  border-bottom: 2px solid var(--bg);
}
.hero p { margin: 0; color: var(--accent); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.hero h1 { margin: 12px 0 0 0; font-size: 36px; font-weight: 800; color: var(--ink); letter-spacing: -0.5px; }

/* Document Typography */
.doc h1, .doc h2, .doc h3, .doc h4, .doc h5 {
  margin-top: 32px;
  margin-bottom: 20px;
  font-weight: 700;
  line-height: 1.4;
  font-family: var(--font-display);
  color: var(--ink);
}
.doc h2 { 
  font-size: 26px;
  padding: 0;
  border: none;
  background: transparent;
  border-radius: 0;
  color: var(--accent-2);
  position: relative;
  padding-left: 0;
}
.doc h3 { font-size: 20px; color: var(--ink); margin-top: 28px; font-weight: 600; }
.doc h4 { font-size: 18px; font-weight: 600; color: var(--muted); }

.doc {
  font-family: var(--font-body);
}

.doc p, .doc li, .doc div {
  margin: 16px 0;
  text-align: justify;
  font-size: 17px;
  color: var(--text-body);
  line-height: 1.8;
  font-weight: 400;
  font-family: var(--font-body); /* Apply the new font */
}
.doc p {
  text-indent: 2em;
}

/* Simplified Layout (No Cards) */
.cardSection{
  margin: 0;
  padding: 0;
}
.cardSection .card{
  box-shadow: none;
  border: none;
  background: transparent;
  border-radius: 0;
  padding: 0;
  margin: 0 0 40px 0;
}

/* Transitions */
.contentStage{
  opacity: 1;
  transition: opacity 0.2s ease;
}
.contentStage.is-switching{
  opacity: 0.5;
}

/* Highlights */
.highlight-bg { background-color: var(--highlight-bg); padding: 0 2px; }
.highlight-border { 
  color: var(--text-body);
  font-weight: 400; /* Removed 500 */
}
p.highlight-border {
  background: transparent;
  border: none;
  padding: 0;
  border-radius: 0;
  font-family: inherit;
  max-width: none;
  color: var(--text-body);
}
strong { font-weight: 600; color: var(--ink); }

/* Table Styles */
.tableBlock {
  margin: 22px 0;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: var(--paper);
}
.tableToolbar {
  padding: 10px 12px;
  background: var(--bg); /* Changed from mix */
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.badge{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
  color: color-mix(in srgb, var(--accent) 70%, var(--ink));
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-nav);
}
.tableTools { display: inline-flex; align-items: center; gap: 8px; }
.tableHint { font-size: 12px; color: var(--muted); font-family: var(--font-nav); }
.btn.tableAction { padding: 4px 10px; font-size: 12px; background: transparent; }
.tableWrap{
  overflow: auto;
  max-width: 100%;
  outline: none;
  scrollbar-color: color-mix(in srgb, var(--muted) 55%, transparent) transparent;
}
.tableWrap:focus-visible{
  box-shadow: 0 0 0 3px var(--focus);
  border-radius: 14px;
}
.regTable{
  border-collapse: separate;
  border-spacing: 0;
  width: 100%; /* Changed from max-content to 100% */
  min-width: 100%;
  font-size: 14px;
  color: var(--ink);
  font-family: var(--font-sans);
  table-layout: auto; /* Added auto layout */
}
.regTable col{ width: auto !important; } /* Removed fixed width */
.regTable th,
.regTable td{
  padding: 10px 12px;
  vertical-align: top;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--paper);
  white-space: normal;
  word-break: break-word;
}
.regTable th{
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--bg); /* Changed from mix */
  font-weight: 700;
  font-size: 13px;
  font-family: var(--font-display);
}
.regTable tbody tr:nth-child(odd) td { background: var(--paper); } /* Removed mix */
.regTable tbody tr:hover td { background: var(--bg); }
.regTable td:first-child{
  font-weight: 700;
  font-family: var(--font-display);
  background: var(--paper); /* Removed mix */
}
.regTable tr:last-child td{ border-bottom: none; }
.regTable th:last-child,
.regTable td:last-child{ border-right: none; }

/* Auth Modal */
.auth-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}
.auth-box {
  background: var(--paper);
  padding: 40px;
  border-radius: 16px;
  box-shadow: var(--shadow);
  text-align: center;
  max-width: 400px;
  width: 90%;
  border: 1px solid var(--border);
}
.auth-box h2 { margin: 0 0 16px 0; color: var(--ink); font-family: var(--font-display); }
.auth-box p { color: var(--muted); margin: 0 0 24px 0; }
.auth-input-group { display: flex; gap: 10px; justify-content: center; }
.auth-input-group input {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--ink);
  outline: none;
  font-size: 16px;
}
.auth-input-group input:focus { border-color: var(--accent); }
.auth-error { color: #e74c3c !important; margin-top: 16px !important; font-size: 14px; }

/* Responsive */
@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar {
    display: flex;
    width: 100%;
    flex: 0 0 auto;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 101;
  }
  .brand {
    display: none; /* Hide brand in sidebar on mobile to save space */
  }
  .directory {
    width: 100%;
    overflow-x: auto;
    padding: 8px 12px;
  }
  .directory-list {
    display: flex;
    flex-direction: row;
    gap: 8px;
    width: max-content;
  }
  .directory-btn {
    padding: 8px 16px;
    border-radius: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    white-space: nowrap;
    margin: 0;
  }
  .directory-btn[aria-current="page"] {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: none;
  }
  .topbar { padding: 0 16px; height: 50px; }
  .subnavBar { padding: 0 16px; overflow-x: auto; }
  /* Fix Scrolling Issue */
  .main {
    flex: 1;
    min-height: 0;
    overflow: hidden; /* Ensure main container doesn't overflow */
  }
  .contentWrap {
    flex: 1;
    overflow: hidden; /* Ensure contentWrap respects flex */
  }
  .reader {
    padding: 20px 16px 80px;
    height: 100%; /* Force height */
    overflow-y: auto; /* Enable scroll */
    -webkit-overflow-scrolling: touch;
  }
  .hero { margin-bottom: 24px; }
  .hero h1 { font-size: 28px; }
  /* Fix Subnav Menu Position on Mobile */
  .subnavMenu {
    position: fixed; /* Change from absolute to fixed */
    top: 110px; /* Adjust based on topbar + subnav height */
    right: 16px;
    left: 16px; /* Full width minus padding */
    width: auto;
    max-height: 60vh;
  }
}

/* Dark Mode */
html[data-theme="dark"] {
  --bg: #0d1117;
  --paper: #1c1e24; /* Lighter gray for cards/main */
  --ink: #e6edf3;
  --muted: #8b949e;
  --border: #30363d;
  --accent: #58a6ff;
  --highlight-bg: rgba(187, 128, 9, 0.15);
  --focus: rgba(56, 139, 253, 0.15);
  --text-body: #c9d1d9; /* Light gray text */
}
html[data-theme="dark"] .sidebar { background: var(--paper); }
html[data-theme="dark"] .directory-btn[aria-current="page"] { background: rgba(56, 139, 253, 0.1); color: #58a6ff; box-shadow: inset 3px 0 0 #58a6ff; }
html[data-theme="dark"] .subnavTab[aria-current="true"] { background: rgba(110, 118, 129, 0.1); color: #f0f6fc; }
html[data-theme="dark"] .subnavTab[aria-current="true"]::after { background: #f78166; }

</style>
  <style>html[data-theme="dark"]{
  --bg:#0B0D10;
  --paper:#121212;
  --ink:#FFFFFF;
  --muted:#E0E0E0;
  --border:#2A2F3A;
  --accent:#5AD18B;
  --accent-2:#2E8B57;
  --focus: rgba(255,255,255,0.28);
  --shadow: 0 18px 60px rgba(0,0,0,0.55);

  --h1-color: #FFFFFF;
  --h2-color: #FFFFFF;
  --h3-color: #E0E0E0;
  --h4-color: #E0E0E0;
  --h5-color: #E0E0E0;
  --h6-color: #E0E0E0;
}

@media (prefers-color-scheme: dark){
  html:not([data-theme="light"]){
    --bg:#0B0D10;
    --paper:#121212;
    --ink:#FFFFFF;
    --muted:#E0E0E0;
    --border:#2A2F3A;
    --accent:#5AD18B;
    --accent-2:#2E8B57;
    --focus: rgba(255,255,255,0.28);
    --shadow: 0 18px 60px rgba(0,0,0,0.55);

    --h1-color: #FFFFFF;
    --h2-color: #FFFFFF;
    --h3-color: #E0E0E0;
    --h4-color: #E0E0E0;
    --h5-color: #E0E0E0;
    --h6-color: #E0E0E0;
  }
}

html[data-theme="dark"] .topbar{
  background: var(--paper);
}

html[data-theme="dark"] .directory-btn{
  color:#E0E0E0;
  opacity:1;
}

html[data-theme="dark"] .directory-btn[aria-current="page"],
html[data-theme="dark"] .directory-btn[aria-selected="true"]{
  color:#FFFFFF;
  opacity:1;
}

html[data-theme="dark"] .btn,
html[data-theme="dark"] .search,
html[data-theme="dark"] .subnavBar{
  background: var(--paper);
}

html[data-theme="dark"] .subnavTab{
  color: #E0E0E0;
}

html[data-theme="dark"] .subnavTab[aria-current="true"]{
  color: #FFFFFF;
}

@media (prefers-color-scheme: dark){
  html:not([data-theme="light"]) .topbar{
    background: var(--paper);
  }
  html:not([data-theme="light"]) .directory-btn{
    color:#E0E0E0;
    opacity:1;
  }
  html:not([data-theme="light"]) .directory-btn[aria-current="page"],
  html:not([data-theme="light"]) .directory-btn[aria-selected="true"]{
    color:#FFFFFF;
    opacity:1;
  }
  html:not([data-theme="light"]) .btn,
  html:not([data-theme="light"]) .search,
  html:not([data-theme="light"]) .subnavBar{
    background: var(--paper);
  }

  html:not([data-theme="light"]) .subnavTab{
    color: #E0E0E0;
  }

  html:not([data-theme="light"]) .subnavTab[aria-current="true"]{
    color: #FFFFFF;
  }
}
</style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" aria-label="主导航">
      <div class="brand">
        <h1>温州初中<br />教学常规</h1>
        <p>2025</p>
      </div>
      <nav class="directory" id="subjectNav" aria-label="学科导航"></nav>
    </aside>
    <section class="main">
      <header class="topbar" role="banner">
        <div class="crumb" id="currentTitle">语文</div>
        <div class="top-actions">
          <button class="btn" id="themeToggle" type="button" aria-label="切换夜间模式">夜间</button>
        </div>
      </header>

      <div class="subnavBar" role="navigation" aria-label="子目录">
        <div class="subnavTabs" id="subnavTabs"></div>
        <div class="subnavMore">
          <button class="btn" id="subnavMoreBtn" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="更多子目录">更多</button>
          <div class="subnavMenu" id="subnavMenu" role="menu" hidden></div>
        </div>
      </div>

      <div class="contentWrap">
        <main class="reader" id="scrollContainer" tabindex="0" aria-label="正文阅读区">
          <div class="page">
            <div class="hero">
              <p>WENZHOU TEACHING REGULATION</p>
              <h1 id="heroTitle">语文</h1>
            </div>
            <div id="subjectPanels"></div>
          </div>
        </main>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  <div id="authModal" class="auth-modal">
    <div class="auth-box">
      <h2>请输入访问密码</h2>
      <p>内部资料，请输入密码继续阅读</p>
      <div class="auth-input-group">
        <input type="password" id="authInput" placeholder="请输入密码" />
        <button id="authBtn" class="btn">进入系统</button>
      </div>
      <p id="authError" class="auth-error" hidden>密码错误，请重试</p>
    </div>
  </div>
  <script>const SUBJECTS = [

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function normalizeRoutePart(s) {
  return (s || '').replace(/^#+/, '').trim();
}

function parseRoute() {
  const raw = normalizeRoutePart(location.hash);
  if (!raw || raw === '/') return { subject: null, section: null };
  const parts = raw.split('/').filter(Boolean);
  return { subject: parts[0] || null, section: parts[1] || null };
}

function setRoute(subject, section) {
  const seg = section ? `#/${subject}/${section}` : `#/${subject}`;
  if (location.hash !== seg) location.hash = seg;
}

function validateRoute(route) {
  if (route.subject === 'welcome') return { subject: 'welcome', section: null, reason: null };
  const subject = route.subject && SUBJECTS.some((s) => s.key === route.subject) ? route.subject : null;
  if (!subject) return { subject: 'management', section: null, reason: 'invalid-subject' };
  let nav = app.navBySubject.get(subject);
  if (!nav && app.mdBySubject?.has?.(subject)) {
    renderSubjectContent(subject);
    nav = app.navBySubject.get(subject);
  }
  if (!nav) return { subject, section: null, reason: 'nav-not-ready' };
  
  // 'full' is always valid
  if (route.section === 'full') return { subject, section: 'full', reason: null };
  
  if (!route.section) return { subject, section: nav.tabs?.[0]?.id || null, reason: null };
  
  const ok = nav.allIds.has(route.section);
  if (!ok) return { subject, section: nav.tabs?.[0]?.id || null, reason: 'invalid-section' };
  return { subject, section: route.section, reason: null };
}

async function loadSourceMd() {

  if (!res.ok) throw new Error('无法加载原文 MD');
  const txt = await res.text();
  return txt.replace(/\r\n/g, '\n');
}

function indexOfHeading(md, headingText) {
  const norm = s => s.replace(/[（(]/g, '(').replace(/[）)]/g, ')').trim();
  const needle = `# ${norm(headingText)}`;
  const lines = md.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#')) {
      if (norm(line) === needle) {
        return md.indexOf(lines[i]);
      }
    }
  }
  const alt = `# ${headingText.replace(/（/g, '(').replace(/）/g, ')')}`;
  const idx = md.indexOf(alt);
  if (idx >= 0) return idx;
  const alt2 = `# ${headingText.replace(/\(/g, '（').replace(/\)/g, '）')}`;
  return md.indexOf(alt2);
}

function buildSubjectMdMap(mdAll) {
  const mdBy = new Map();
  const positions = [];
  SUBJECTS.forEach((s) => {
    if (!s.header) return;
    const idx = indexOfHeading(mdAll, s.header);
    if (idx >= 0) positions.push({ key: s.key, idx });
  });
  positions.sort((a, b) => a.idx - b.idx);
  for (let i = 0; i < positions.length; i++) {
    const start = positions[i].idx;
    const end = i + 1 < positions.length ? positions[i + 1].idx : mdAll.length;
    mdBy.set(positions[i].key, mdAll.slice(start, end).trim());
  }
  return mdBy;
}

function cleanHeadingText(text) {
  let t = (text || '').replace(/^——\s*/, '').replace(/\s*——$/, '').trim();
  // Don't strip numbers yet, we need them for hierarchy detection
  return t;
}

function getHeadingLevel(text, rawLevel) {
  const t = cleanHeadingText(text);
  // Logic: If it looks like a numbered list item (一、, 1., (1)), it's content (Level 3 or 4).
  // If it's a non-numbered header, it's a Tab (Level 2).
  
  if (/^第?[0-9一二三四五六七八九十]+[、.．]/.test(t)) return 3;
  if (/^[（(][0-9一二三四五六七八九十]+[）)]/.test(t)) return 4;
  if (/^\d+\./.test(t)) return 4;
  
  // Attachments are tabs
  if (t.includes('附件') || t.includes('附录')) return 2;
  
  // Default: If it was # in markdown (level 1 inside subject), treat as Tab
  if (rawLevel === 1) return 2;
  
  return 3;
}

function mdToBlocks(md) {
  const lines = (md || '').split('\n');
  const blocks = [];
  let i = 0;
  const pushPara = (buf) => {
    const raw = buf.join('\n');
    if (!raw.trim()) return;
    // Clean paragraph starts
    const cleaned = raw.replace(/^(\d+\.|[一二三四五六七八九十]+、)\s+/, '$1 ');
    blocks.push({ type: 'p', text: cleaned });
  };
  while (i < lines.length) {
    const line = lines[i];
    const headerMatch = line.match(/^(#+)\s+(.*)/);
    if (headerMatch) {
      blocks.push({ type: 'h', level: headerMatch[1].length, text: headerMatch[2] });
      i += 1;
      continue;
    }
    if (/^\|/.test(line) && lines[i + 1] && /^\|\s*---/.test(lines[i + 1])) {
      const tableLines = [line, lines[i + 1]];
      i += 2;
      while (i < lines.length && /^\|/.test(lines[i])) {
        tableLines.push(lines[i]);
        i += 1;
      }
      blocks.push({ type: 'table', lines: tableLines });
      continue;
    }
    if (!line.trim()) {
      i += 1;
      continue;
    }
    const buf = [];
    const LIST_START_RE = /^\s*(?:[0-9]+\.|[一二三四五六七八九十]+[、\.]|\([0-9]+\)|（[0-9]+）|①)\s*/;
    
    while (
      i < lines.length &&
      lines[i].trim() !== '' &&
      !lines[i].startsWith('#') &&
      !(/^\|/.test(lines[i]) && lines[i + 1] && /^\|\s*---/.test(lines[i + 1]))
    ) {
      const line = lines[i];
      // Check if this line is a list item start
      if (LIST_START_RE.test(line) && buf.length > 0) {
         // If we already have content, stop here to flush previous paragraph
         break;
      }
      
      buf.push(line);
      i += 1;
    }
    pushPara(buf);
  }
  return blocks;
}

function parseTable(tableLines) {
  const rows = tableLines
    .filter((l) => l.trim().startsWith('|'))
    .map((l) => l.trim())
    .map((l) => l.replace(/^\|/, '').replace(/\|$/, '').split('|').map((c) => c.trim()));
  if (rows.length < 2) return null;
  return { header: rows[0], body: rows.slice(2) };
}

function makeId(subjectKey, text, salt) {
  const base = `${subjectKey}-${text}-${salt}`;
  let h = 2166136261;
  for (let i = 0; i < base.length; i++) {
    h ^= base.charCodeAt(i);
    h = (h * 16777619) >>> 0;
  }
  return `${subjectKey}-${h.toString(16)}`;
}

// Logic to group attachments and build nav based on strict structure
function buildNavFromBlocks(subjectKey, blocks) {
  const tabs = [];
  const allIds = new Set();
  const structure = SUBJECT_STRUCTURE[subjectKey];
  
  if (!structure) {
    // Fallback if not defined
    return { tabs: [], allIds: new Set() };
  }

  structure.forEach((title, idx) => {
    // Generate ID for each expected tab
    const id = makeId(subjectKey, title, idx);
    tabs.push({ id, title });
    allIds.add(id);
  });
  
  return { tabs, allIds };
}

function renderSubnavTabs(subjectKey) {
  els.subnavTabs.innerHTML = '';
  els.subnavMenu.innerHTML = '';
  els.subnavMenu.hidden = true;
  els.subnavMoreBtn.setAttribute('aria-expanded', 'false');
  
  // Hide More container initially
  const moreContainer = els.subnavMoreBtn.parentElement;
  moreContainer.style.display = 'none';

  const nav = app.navBySubject.get(subjectKey);
  const tabs = nav?.tabs || [];
  
  // "Full View" tab
  const allTabs = [...tabs, { id: 'full', title: '全文预览' }];

  allTabs.forEach((t) => {
    // Create Tab (Visible)
    const btn = document.createElement('button');
    btn.className = 'subnavTab';
    btn.type = 'button';
    btn.textContent = t.title;
    btn.dataset.section = t.id;
    btn.setAttribute('aria-current', t.id === app.activeSection ? 'true' : 'false');
    btn.addEventListener('click', () => setRoute(subjectKey, t.id));
    els.subnavTabs.appendChild(btn);

    // Create Menu Item (Hidden by default, used for overflow)
    const mi = document.createElement('button');
    mi.className = 'subnavMenuItem';
    mi.type = 'button';
    mi.role = 'menuitem';
    mi.textContent = t.title;
    mi.dataset.section = t.id; // Add ID for lookup
    mi.style.display = 'none'; // Initially hidden
    mi.setAttribute('aria-current', t.id === app.activeSection ? 'true' : 'false');
    mi.addEventListener('click', () => {
      els.subnavMenu.hidden = true;
      els.subnavMoreBtn.setAttribute('aria-expanded', 'false');
      setRoute(subjectKey, t.id);
    });
    els.subnavMenu.appendChild(mi);
  });

  // Priority+ Pattern Logic
  // Wait for layout
  requestAnimationFrame(() => {
    const container = els.subnavTabs;
    
    // Check if overflowing
    if (container.scrollWidth > container.clientWidth) {
      moreContainer.style.display = 'block';
      
      // Move items to menu until it fits
      // We iterate backwards from the last tab
      const tabNodes = Array.from(container.children);
      for (let i = tabNodes.length - 1; i >= 0; i--) {
        // Check if we still overflow
        // Note: we check strict greater than, because if equal it fits.
        // We also check if we have any children left.
        if (container.scrollWidth <= container.clientWidth) break;
        
        const tab = tabNodes[i];
        const sectionId = tab.dataset.section;
        
        // Remove from visible tabs
        container.removeChild(tab);
        
        // Show in menu
        const menuItem = els.subnavMenu.querySelector(`.subnavMenuItem[data-section="${sectionId}"]`);
        if (menuItem) menuItem.style.display = 'block';
      }
    } else {
      moreContainer.style.display = 'none';
    }
  });

  // Overflow handling events (Click "More")
  if (!renderSubnavTabs._wired) {
    renderSubnavTabs._wired = true;
    els.subnavMoreBtn.addEventListener('click', () => {
      const open = els.subnavMenu.hidden === false;
      els.subnavMenu.hidden = open;
      els.subnavMoreBtn.setAttribute('aria-expanded', open ? 'false' : 'true');
    });
    document.addEventListener(
      'click',
      (e) => {
        if (!els.subnavMenu || els.subnavMenu.hidden) return;
        const t = e.target;
        if (t === els.subnavMoreBtn || els.subnavMoreBtn.contains(t) || els.subnavMenu.contains(t)) return;
        els.subnavMenu.hidden = true;
        els.subnavMoreBtn.setAttribute('aria-expanded', 'false');
      },
      { capture: true }
    );
  }
}

  const sectionsMap = new Map();
  // Initialize buffers for all tabs
  nav.tabs.forEach(t => sectionsMap.set(t.id, ''));

  // Default to first tab (or '条文内容' if management)
  let currentTabIndex = 0;
  let currentId = nav.tabs[0]?.id;
  let currentHtml = [];
  let tableIndex = 0;

  // Helper to save current buffer to CURRENT tab
  const saveBuffer = () => {
    if (currentHtml.length > 0 && currentId) {
      const existing = sectionsMap.get(currentId) || '';
      sectionsMap.set(currentId, existing + currentHtml.join(''));
    }
    currentHtml = [];
  };

  blocks.forEach((b, idx) => {
    if (b.type === 'h') {
      const title = cleanHeadingText(b.text);
      const level = getHeadingLevel(b.text, b.level);
      
      // Check if this header matches any tab in the structure
      // We check if it matches the *next* expected tab or any future tab
      // But usually it's sequential.
      // Special case for Management "条文内容": it consumes everything until "附件表"
      
      let matchedIndex = -1;
      
      // Try to find matching tab
      for (let i = 0; i < structure.length; i++) {

        // Exact or fuzzy match
        if (title.includes(tabName) || (tabName === '附件' && (title.includes('附件') || title.includes('附录')))) {
           // For management table special case
           if (subjectKey === 'management' && tabName === '附件表' && title.includes('反馈表')) {
             matchedIndex = i;
             break;
           }
           // General case
           if (title === tabName || (title.includes(tabName) && level <= 3)) {
             matchedIndex = i;
             break;
           }
        }
      }

      // If we found a tab match, switch to it
      if (matchedIndex !== -1) {
        saveBuffer();
        currentTabIndex = matchedIndex;
        currentId = nav.tabs[currentTabIndex].id;
        // Render the header as H2
        currentHtml.push(`<h2 class="doc-heading" id="${currentId}" data-level="2">${escapeHtml(title)}</h2>`);
        return;
      }
      
      // If it's the start of Management, assign to "条文内容" (index 0) if not already
      if (subjectKey === 'management' && currentTabIndex === 0 && !currentId) {
         currentId = nav.tabs[0].id;
      }

      // Normal content header
      if (level === 2) {
         currentHtml.push(`<h2 class="doc-heading" data-level="2">${escapeHtml(title)}</h2>`);
      } else if (level === 3) {
        currentHtml.push(`<h3 class="doc-heading" data-level="3">${escapeHtml(title)}</h3>`);
      } else {
        currentHtml.push(`<h4 class="doc-heading" data-level="4">${escapeHtml(title)}</h4>`);
      }
      return;
    }

    if (b.type === 'p') {
      const important = /应|必须|严禁|不得/.test(b.text);
      
      // Special check: If paragraph starts with "附件：" or "附件:"
      // and we have an "附件" tab in structure.
      if (/^附件[:：]/.test(b.text)) {
         // Find index of "附件" tab
         const attachIdx = structure.findIndex(s => s === '附件');
         if (attachIdx !== -1 && attachIdx !== currentTabIndex) {
             saveBuffer();
             currentTabIndex = attachIdx;
             currentId = nav.tabs[currentTabIndex].id;
         }
      }

      const text = escapeHtml(b.text);
      currentHtml.push(`<p class="${important ? 'highlight-border' : ''}">${text}</p>`);
      return;
    }

    if (b.type === 'table') {
      const t = parseTable(b.lines);
      if (t) {
        currentHtml.push(buildTableHtml(t, subjectKey, tableIndex));
        tableIndex += 1;
      }
    }
  });

  saveBuffer(); // Save last chunk
  app.sectionsBySubject.set(subjectKey, sectionsMap);
}

function buildTableHtml(table, subjectKey, tableIndex) {
  const colCount = Math.max(table.header.length, ...table.body.map((r) => r.length));
  const header = table.header.slice();
  while (header.length < colCount) header.push('');
  
  // Remove fixed width colgroup to allow auto-layout
  let colGroup = '<colgroup>';
  for (let i = 0; i < colCount; i++) colGroup += '<col>';
  colGroup += '</colgroup>';

  let thead = '<thead><tr>';
  for (let i = 0; i < colCount; i++) {
    const cell = escapeHtml(header[i] || '');
    thead += `<th scope="col">${cell}</th>`;
  }
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  for (const row of table.body) {
    const r = row.slice();
    while (r.length < colCount) r.push('');
    tbody += '<tr>';
    for (const raw of r) {
      const v = raw || '';
      tbody += `<td>${escapeHtml(v)}</td>`;
    }
    tbody += '</tr>';
  }
  tbody += '</tbody>';

  const idx = Number.isFinite(tableIndex) ? String(tableIndex) : '';
  return `<div class="tableBlock" data-table-index="${idx}"><div class="tableToolbar"><span class="badge">表格</span><div class="tableTools"><span class="tableHint">可横向滚动</span><button type="button" class="btn tableAction" data-table-action="copy">复制</button><button type="button" class="btn tableAction" data-table-action="csv">导出CSV</button></div></div><div class="tableWrap" tabindex="0"><table class="regTable">${colGroup}${thead}${tbody}</table></div></div>`;
}

function normalizeCellText(s) {
  return (s || '')
    .replace(/\u00a0/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function tableToMatrix(tableEl) {
  const rows = Array.from(tableEl?.rows || []);
  return rows.map((row) => Array.from(row.cells || []).map((cell) => normalizeCellText(cell.textContent)));
}

function matrixToTsv(matrix) {
  return matrix.map((row) => row.join('\t')).join('\n');
}

function csvEscapeCell(s) {
  const v = String(s ?? '');
  if (/[",\n\r]/.test(v)) return `"${v.replace(/"/g, '""')}"`;
  return v;
}

function matrixToCsv(matrix) {
  return matrix.map((row) => row.map(csvEscapeCell).join(',')).join('\r\n');
}

function safeFilenamePart(s) {
  return String(s || '')
    .replace(/[\\/:*?"<>|]/g, '-')
    .replace(/\s+/g, ' ')
    .trim()
    .slice(0, 80);
}

function downloadTextFile(filename, text, mimeType) {
  const blob = new Blob([text], { type: mimeType || 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  window.setTimeout(() => URL.revokeObjectURL(url), 800);
}

async function copyTextToClipboard(text) {
  if (navigator.clipboard?.writeText) {
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
}

function wireTableActions() {
  if (wireTableActions._wired) return;
  wireTableActions._wired = true;

  els.subjectPanels.addEventListener('click', async (e) => {
    const btn = e.target?.closest?.('[data-table-action]');
    if (!btn) return;

    const action = btn.getAttribute('data-table-action');
    const block = btn.closest('.tableBlock');
    const table = block?.querySelector?.('table.regTable');
    if (!table) return;

    const matrix = tableToMatrix(table);
    const subject = safeFilenamePart(app.activeSubject);
    const section = safeFilenamePart(app.activeSection || 'section');
    const idx = safeFilenamePart(block?.dataset?.tableIndex || '');

    try {
      if (action === 'copy') {
        await copyTextToClipboard(matrixToTsv(matrix));
        showToast('已复制表格');
        return;
      }
      if (action === 'csv') {
        const csv = '\ufeff' + matrixToCsv(matrix);
        const filename = `表格-${subject}-${section}${idx ? '-' + idx : ''}.csv`;
        downloadTextFile(filename, csv, 'text/csv;charset=utf-8');
        showToast('已导出 CSV');
      }
    } catch {
      showToast('操作失败');
    }
  });
}

// Display the content based on active section
function updateContentArea() {
  const subjectKey = app.activeSubject;
  const sectionsMap = app.sectionsBySubject.get(subjectKey);
  if (!sectionsMap) return;

  const sectionId = app.activeSection;
  const nav = app.navBySubject.get(subjectKey);
  
  if (subjectKey === 'welcome') {
     return;
  }

  let fullHtml = '';
  
  if (sectionId === 'full') {
    // Render ALL sections joined together
    nav.tabs.forEach(t => {
      const html = sectionsMap.get(t.id) || '';
      fullHtml += `<section class="cardSection" id="${t.id}-container"><div class="card doc">${html}</div></section>`;
    });
  } else {
    // Render ONLY the active section
    const html = sectionsMap.get(sectionId) || '';
    if (html) {
      fullHtml = `<section class="cardSection" id="${sectionId}-container"><div class="card doc">${html}</div></section>`;
    } else {
      fullHtml = `<div style="padding: 40px; color: var(--muted); text-align: center;">暂无内容</div>`;
    }
  }
  
  els.subjectPanels.innerHTML = `<div class="contentStage">${fullHtml}</div>`;
  
  // Scroll Logic
  setTimeout(() => {
    // If in Full Preview, we might want to scroll to a specific section if provided via hash?
    // But usually clicking "Full Preview" just shows everything.
    // If we are in single section mode, we always scroll to top.
    
    if (sectionId === 'full') {
       els.scrollContainer.scrollTop = 0;
    } else {
       els.scrollContainer.scrollTop = 0;
    }
  }, 10);

  // Highlight subnav
  Array.from(els.subnavTabs.querySelectorAll('.subnavTab')).forEach((b) => {
    b.setAttribute('aria-current', b.dataset.section === sectionId ? 'true' : 'false');
  });
  
  // Highlight menu items too
  Array.from(els.subnavMenu.querySelectorAll('.subnavMenuItem')).forEach((b) => {
    b.setAttribute('aria-current', b.dataset.section === sectionId ? 'true' : 'false');
  });
}

function applyActiveSubject(subjectKey, desiredSection) {
  app.activeSubject = subjectKey;
  const subject = SUBJECTS.find((s) => s.key === subjectKey);
  if (subjectKey !== 'welcome') {
      els.currentTitle.textContent = subject?.title || subjectKey;
      els.heroTitle.textContent = subject?.title || subjectKey;
  }
  renderSubjects();

  // Process MD if not done
  if (!app.sectionsBySubject.has(subjectKey)) {
    renderSubjectContent(subjectKey);
  }

  const nav = app.navBySubject.get(subjectKey);
  // Default to first tab
  const fallback = nav?.tabs?.[0]?.id || 'full';
  
  // If no desired section is provided, use fallback (first tab).
  // If desired section IS provided, validate it.
  let validSection = fallback;
  if (desiredSection === 'full') {
    validSection = 'full';
  } else if (desiredSection && nav?.allIds?.has(desiredSection)) {
    validSection = desiredSection;
  }
  
  app.activeSection = validSection;
  
  renderSubnavTabs(subjectKey);
  updateContentArea();
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (app.activeSubject) renderSubnavTabs(app.activeSubject);
  }, 100);
});

function onRouteChange() {
  const raw = parseRoute();
  const v = validateRoute(raw);
  
  if (v.reason === 'invalid-subject') showToast('无效科目链接');
  if (v.reason === 'invalid-section') showToast('无效章节链接');
  
  if (v.subject !== raw.subject || v.section !== raw.section) {
    setRoute(v.subject, v.section);
    return;
  }

  const subjectChanged = v.subject !== app.activeSubject;
  if (subjectChanged) {
    applyActiveSubject(v.subject, v.section);
  } else {
    // Same subject, different section
    app.activeSection = v.section;
    renderSubnavTabs(v.subject); // Update active state visually (though logic is in updateContentArea too, but tab list might need refresh if changed? No, just highlight)
    updateContentArea();
  }
}

  // Removed
}

async function main() {
  initEls();
  initAuth(); // Block until auth
  initTheme();
  // wireSearch(); // Removed
  wireTableActions();
  renderSubjects();

  try {
    app.mdAll = await loadSourceMd();
    const mdBy = buildSubjectMdMap(app.mdAll);
    app.mdBySubject = mdBy;
    
    // Initial Route
    window.addEventListener('hashchange', onRouteChange);
    if (!location.hash) setRoute('welcome', null);
    else onRouteChange();
  } catch (e) {
    showToast('加载失败');
    els.subjectPanels.innerHTML = `<div style="padding:20px;color:red">${escapeHtml(String(e))}</div>`;
  }
}

document.addEventListener('DOMContentLoaded', main);
</script>
