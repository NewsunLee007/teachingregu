\u6559\u5b66\u76ee\u6807|\u6559\u5b66\u76ee\u6807\u660e\u786e\u3001\u5177\u4f53\u3001\u53ef\u64cd\u4f5c\u3002\u76ee\u6807\u8868\u8ff0\u9700\u878d\u5408\u77e5\u8bc6\u3001\u80fd\u529b\u3001\u6838\u5fc3\u7d20\u517b\u76ee\u6807\u3002|||||\n|C6\u6559\u5b66\u7b56\u7565|\u6559\u5b66\u7b56\u7565\u8981\u5f3a\u5316\u5b66\u79d1\u5b9e\u8df5\u3002\u6ce8\u91cd\u5b66\u4e60\u652f\u6301\u6750\u6599\u8bbe\u8ba1,\u6784\u5efa\u6570\u5b57\u5316\u5b66\u4e60\u73af\u5883\u3002|||||\n|C7\u6559\u5b66\u73af\u8282|\u8bfe\u5802\u6559\u5b66\u73af\u8282\u5b8c\u6574,\u6709\u63d0\u51fa\u95ee\u9898\u3001\u660e\u786e\u4efb\u52a1\u3001\u77e5\u8bc6\u6280\u80fd\u5b66\u4e60\u3001\u95ee\u9898\u89e3\u51b3\u4e0e\u6982\u5ff5\u8fa8\u6790\u3001\u8bc4\u4ef7\u4e0e\u5c55\u793a\u7b49\u3002|||||\n|C8\u6559\u5b66\u91cd\u96be\u70b9\u4efb\u52a1\u8bbe\u8ba1|\u56f4\u7ed5\u6559\u5b66\u91cd\u96be\u70b9\u8bbe\u8ba1\u4efb\u52a1,\u6d3b\u52a8\u8bbe\u8ba1\u7b26\u5408\u5e74\u9f84\u7279\u5f81\u3002|||||\n\n\u9644\u4ef63\n\n|   |   |   |   |   |   |   |   |   |   |   |\n|---|---|---|---|---|---|---|---|---|---|---|\n|\u4e00\u7ea7\u8981\u7d20|\u4e8c\u7ea7\u8981\u7d20|\u4e09\u7ea7\u8981\u7d20|\u5185\u5bb9|\u6750\u6599|\u65b9\u5f0f|\u6307\u5bfc\u610f\u89c1|   |   |   |\u5907\u6ce8|\n|\u5206\u503c|\u4e2a\u4eba|\u5b66\u6821|\u53bf|\n|||C9\u6559\u5b66\u8bc4\u4ef7\u91cf\u89c4\u8bbe\u8ba1|\u8bbe\u8ba1\u4efb\u52a1\u8bc4\u4ef7\u91cf\u89c4\u3002\u8bbe\u7f6e\u5408\u7406\u7684\u7ef4\u5ea6\u548c\u5c3a\u5ea6\u3002||||||||\n|C10\u6559\u5b66\u53cd\u601d|\u5bf9\u6559\u5b66\u76ee\u6807\u3001\u73af\u8282\u3001\u7b56\u7565\u7b49\u8fdb\u884c\u53cd\u601d,\u4f18\u5316\u6559\u5b66\u51b3\u7b56\u3002\u8bfe\u540e\u6559\u5b66\u53cd\u601d\u4e0d\u5c11\u4e8e\u8bfe\u65f620%\u3002||||||\n|A2\u4e0a\u8bfe\u5e38\u89c4(30\u5206)|B4\u6559\u5b66\u51c6\u5907|C11\u6559\u5b66\u51c6\u5907|\u63d0\u524d\u505a\u597d\u6559\u5b66\u8bbe\u5907\u3001\u5b9e\u9a8c\u8bbe\u5907\u7b49\u786c\u4ef6\u8bbe\u65bd\u51c6\u5907\u3002\u63d0\u524d\u51c6\u5907\u597d\u4e0a\u8bfe\u6240\u9700\u591a\u5a92\u4f53\u8bfe\u4ef6\u3001\u5e94\u7528\u8f6f\u4ef6\u3001\u4efb\u52a1\u5355\u3001\u5b66\u4e60\u8d44\u6e90\u7b49\u8d44\u6599\u3002|\u8bfe\u5802\u6559\u5b66|\u5b9e\u5730\u8003\u5bdf\u5b66\u751f\u8bbf\u8c08|5|||||\n|B5\u6559\u5b66\u5b9e\u65bd|C12\u6559\u5b66\u573a\u666f|\u5229\u7528\u6570\u5b57\u5316\u8d44\u6e90,\u521b\u8bbe\u60c5\u5883,\u8425\u9020\u826f\u597d\u7684\u4fe1\u606f\u79d1\u6280\u5b66\u4e60\u6c1b\u56f4\u3002|\u8bfe\u5802\u89c2\u5bdf|4|||||\n|C13\u5b9e\u8df5\u6d3b\u52a8|\u5f00\u5c55\u4e30\u5bcc\u7684\u4fe1\u606f\u79d1\u6280\u5b9e\u8df5\u6d3b\u52a8,\u5728\u5b66\u79d1\u5b9e\u8df5\u4e2d\u5e2e\u52a9\u5b66\u751f\u5efa\u7acb\u5e38\u89c4\u3001\u638c\u63e1\u6280\u80fd\u3001\u57f9\u517b\u4fe1\u606f\u7d20\u517b\u3002|4|||||\n|C14\u5b66\u79d1\u5b9e\u8df5|\u56f4\u7ed5\u6559\u6750\u91cd\u70b9\u3001\u96be\u70b9\u5f00\u5c55\u5b66\u79d1\u5b9e\u8df5\u3002|4|||||\n|C15\u5b66\u751f\u5b66\u4e60|\u8bfe\u7a0b\u5b66\u4e60\u4fdd\u8bc1\u5b9e\u8df5\u64cd\u4f5c\u65f6\u95f4,\u63a7\u5236\u8bb2\u6388\u548c\u6f14\u793a\u6bd4\u4f8b\u3002\u5f15\u5bfc\u6570\u5b57\u5316\u5b66\u4e60,\u9f13\u52b1\u5c0f\u7ec4\u5408\u4f5c\u3002|4|||||\n|C16\u8bfe\u5802\u8c03\u63a7|\u53ca\u65f6\u4e86\u89e3\u5b66\u751f\u5b66\u4e60\u72b6\u6001,\u505a\u597d\u8bfe\u5802\u751f\u6210\u53ca\u8c03\u63a7\u3002|4|||||\n|A3\u4f5c\u4e1a\u5e38\u89c4(15\u5206)|B6\u4f5c\u4e1a\u8bbe\u8ba1|C17\u4f5c\u4e1a\u8bbe\u8ba1|\u7cbe\u5fc3\u9009\u7f16\u8bfe\u5802\u4f5c\u4e1a(\u4efb\u52a1),\u76ee\u6807\u660e\u786e\u3001\u8bbe\u8ba1\u5408\u7406\u3002\u6d3b\u52a8\u6709\u4f53\u73b0\u201c\u4fe1\u606f\u79d1\u5b66\u539f\u7406\u7406\u89e3\u201d\u6216\u201c\u4f7f\u7528\u4fe1\u606f\u6280\u672f\u89e3\u51b3\u95ee\u9898\u201d\u3002|\u6d3b\u52a8\u8bbe\u8ba1\u65b9\u6848\u3001\u8fc7\u7a0b\u8bb0\u5f55\u4e0e\u53cd\u9988|\u67e5\u9605|6|||||\n|C18\u5206\u5c42\u4f5c\u4e1a|\u5173\u6ce8\u5b66\u751f\u4fe1\u606f\u79d1\u6280\u80fd\u529b\u8fdb\u9636\u53d1\u5c55,\u8bbe\u8ba1\u6709\u68af\u5ea6\u7684\u5b66\u79d1\u6d3b\u52a8,\u9f13\u52b1\u5408\u4f5c\u63a2\u7a76\u3002|4|||||\n|B7\u6279\u6539\u53cd\u9988|C19\u4f5c\u4e1a\u6279\u6539|\u53ca\u65f6\u3001\u8ba4\u771f\u6279\u6539\u4f5c\u4e1a\u3002\u63d0\u5021\u4f7f\u7528\u6570\u5b57\u5316\u5b66\u4e60\u5e73\u53f0\u652f\u6301\u6279\u6539\u3002|6|||||\n|C20\u6279\u6539\u53cd\u9988|\u6279\u6539\u5efa\u8bae\u7edf\u4e00\u91c7\u7528\u7b49\u7ea7\u6216\u7b49\u7ea7\u52a0\u4e0a\u8bc4\u8bed\u7684\u65b9\u6cd5\u8fdb\u884c\u3002\u591a\u6e20\u9053\u5c55\u793a\u4f5c\u4e1a\u4e2d\u7684\u5171\u6027\u95ee\u9898\u548c\u4eae\u70b9\u3002|4|||||\n\n|   |   |   |   |   |   |   |   |   |   |   |\n|---|---|---|---|---|---|---|---|---|---|---|\n|\u4e00\u7ea7\u8981\u7d20|\u4e8c\u7ea7\u8981\u7d20|\u4e09\u7ea7\u8981\u7d20|\u5185\u5bb9|\u6750\u6599|\u65b9\u5f0f|\u6307\u5bfc\u610f\u89c1|   |   |   |\u5907\u6ce8|\n|\u5206\u503c|\u4e2a\u4eba|\u5b66\u6821|\u53bf|\n|A4\u8bc4\u4ef7\u5e38\u89c4(10\u5206)|B8\u8fc7\u7a0b\u8bc4\u4ef7|C22\u5b66\u4e60\u6001\u5ea6|\u5173\u6ce8\u5b66\u751f\u826f\u597d\u5b66\u4e60\u6001\u5ea6\u548c\u884c\u89c4\u7684\u517b\u6210,\u505a\u597d\u65e5\u5e38\u4e0a\u8bfe\u51fa\u52e4\u8bb0\u5f55\u3002|\u65e5\u5e38\u7ba1\u7406\u8bb0\u5f55\u5355\u3001\u6d4b\u8bc4\u8bd5\u5377\u3001\u5b66\u751f\u5c55\u793a\u7167\u7247\u3001\u89c6\u9891\u7b49|\u67e5\u9605|4|||||\n|C23\u5b66\u4e60\u6210\u679c|\u878d\u5408\u8bfe\u5802\u8bc4\u4ef7\u3001\u4f5c\u4e1a\u8bc4\u4ef7\u3001\u5355\u5143\u8bc4\u4ef7\u7b49\u65b9\u5f0f\u3002\u5355\u5143\u8bc4\u4ef7\u4e3b\u8981\u4ee5\u5355\u5143\u5b66\u4e60\u9879\u76ee\u4f5c\u54c1\u6216\u6210\u679c\u5c55\u793a\u4e3a\u5bfc\u5411,\u6bcf\u5b66\u671f\u8bc4\u4ef72-3\u6b21\u3002|3|||||\n|B9\u5b66\u4e1a\u6d4b\u8bc4|C24\u8bc4\u4ef7\u65b9\u6848|\u5173\u6ce8\u5b66\u751f\u7684\u5b66\u4e1a\u8868\u73b0,\u4e30\u5bcc\u8bc4\u4ef7\u5de5\u5177,\u521b\u65b0\u8bc4\u4ef7\u5f62\u5f0f,\u7814\u5236\u6d4b\u8bc4\u65b9\u6848\u548c\u8bd5\u5377\u3002|4|||||\n|C25\u5b66\u4e1a\u6d4b\u8bc4|\u6bcf\u5b66\u671f\u81f3\u5c11\u5f00\u5c551\u6b21\u5b66\u4e1a\u7b49\u7ea7\u6d4b\u8bc4\u3002\u5e73\u65f6\u6210\u7ee9\u4e0e\u671f\u672b\u68c0\u6d4b\u6210\u7ee9\u7ed3\u5408,\u5e73\u65f6\u6210\u7ee9\u6743\u91cd\u4e0d\u4f4e\u4e8e40%\u3002|4|||||\n|A5\u6559\u7814\u5e38\u89c4(15\u5206)|B10\u6559\u7814\u6d3b\u52a8|C26\u6559\u7814\u6d3b\u52a8|\u96c6\u4f53\u6559\u7814\u6d3b\u52a8\u6b21\u6570\u6bcf\u5b66\u671f8\u6b21\u4ee5\u4e0a\u3002\u6bcf\u5b66\u671f\u53c2\u52a0\u5e02\u7ea7\u6559\u7814\u6d3b\u52a8\u4e0d\u5c11\u4e8e1\u6b21,\u53bf(\u5e02\u3001\u533a)\u4e0d\u5c11\u4e8e2\u6b21\u3002|\u6559\u7814\u6d3b\u52a8\u8bb0\u5f55|\u67e5\u9605|4|||||\n|C27\u4e0a\u8bfe\u542c\u8bfe|\u6bcf\u5b66\u671f\u542c\u8bfe\u6570\u4e0d\u4f4e\u4e8e10\u8282,\u6bcf\u5b66\u671f\u5f00\u8bbe\u7ec4\u5185\u6216\u6821\u7ea7\u53ca\u4ee5\u4e0a\u516c\u5f00\u8bfe1\u8282\u3001\u4e3b\u9898\u4ea4\u6d411\u6b21\u3002|\u542c\u8bfe\u672c|4|||||\n|C28\u6210\u679c\u8f6c\u5316|\u6bcf\u5b66\u5e74\u81f3\u5c11\u7ec4\u7ec7\u8de8\u5b66\u79d1\u5b66\u4e60\u6d3b\u52a81\u9879,\u9009\u62e9\u64b0\u5199\u5355\u5143\u6559\u5b66\u8bbe\u8ba1\u3001\u8bfe\u540e\u6d3b\u52a8\u6848\u4f8b\u6216\u6559\u5b66\u8bba\u6587\u7b49\u81f3\u5c111\u7bc7\u3002|\u8bfb\u540e\u611f\u3001\u5c55\u8bc4\u4e0e\u83b7\u5956\u8bc1\u4e66\u7b49\u3002|3|||||\n|C29\u9605\u8bfb\u4e66\u7c4d|\u6bcf\u5b66\u671f\u9605\u8bfb\u5b66\u79d1\u63a8\u8350\u4e66\u76ee\u81f3\u5c111\u672c,\u64b0\u5199\u8bfb\u540e\u611f1\u7bc7\u3002|4|||||\n|A6\u5176\u4ed6|\u7279\u6b8a\u8d21\u732e|   |\u6839\u636e\u6559\u5e08\u7684\u5de5\u4f5c\u8868\u73b0,\u5728\u843d\u5b9e\u6559\u5b66\u5e38\u89c4\u65b9\u9762\u6709\u7279\u6b8a\u8d21\u732e,\u7ed9\u4e881-5\u5206\u7684\u52a0\u5206\u3002||||||||\n|\u4eae\u70b9|   |   ||   |   |   |   |   |   |   |\n|\u5efa\u8bae|   |   ||   |   |   |   |   |   |   |\n|\u8bf4\u660e:\u5b66\u6821\u6559\u7814\u7ec4\u7ed3\u5408\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u4fe1\u606f\u79d1\u6280\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248)\u300b\u8981\u6c42,\u4ee5\u672c\u8868\u4e3a\u53c2\u8003,\u7ed3\u5408\u5b66\u6821\u5b9e\u9645\u548c\u6559\u5e08\u4e2a\u4eba\u8868\u73b0,\u53ef\u4ee5\u589e\u5220\u76f8\u5173\u5185\u5bb9,\u52a1\u5b9e\u4e14\u521b\u9020\u6027\u5730\u5f00\u5c55\u6559\u5b66\u5e38\u89c4\u8bc4\u8bae\u5de5\u4f5c,\u4ee5\u9488\u5bf9\u6027\u5730\u843d\u5b9e\u6559\u5b66\u5e38\u89c4,\u63d0\u9ad8\u6559\u5e08\u65e5\u5e38\u6559\u5b66\u8d28\u91cf\u3002|   |   |   |   |\u6c47\u603b||||||\n\n\u53cd\u9988\u4eba\uff1a\n\n# \u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u52b3\u52a8\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09\n\n\u4e49\u52a1\u6559\u80b2\u9636\u6bb5\u52b3\u52a8\u8bfe\u7a0b\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u8bfe\u7a0b\u662f\u57f9\u517b\u5b66\u751f\u7efc\u5408\u7d20\u8d28\u7684\u8de8\u5b66\u79d1\u5b9e\u8df5\u6027\u8bfe\u7a0b\u3002\u6839\u636e\u300a\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u65b9\u6848\uff082022\u5e74\u7248\uff09\u300b\u300a\u4e49\u52a1\u6559\u80b2\u52b3\u52a8\u8bfe\u7a0b\u6807\u51c6\uff082022\u5e74\u7248\uff09\u300b\u300a\u4e2d\u5c0f\u5b66\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u8bfe\u7a0b\u6307\u5bfc\u7eb2\u8981\uff082017\u5e74\u7248\uff09\u300b\u7b49\u7cbe\u795e\uff0c\u7ed3\u5408\u7701\u7f16\u52b3\u52a8\u6559\u6750\u5185\u5bb9\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u6307\u5357\u5185\u5bb9\u53ca\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u5b9e\u65bd\u529e\u6cd5\u300b\uff08\u6e29\u6559\u57fa\u30142024\u301551\u53f7\uff09\uff0c\u7279\u5236\u5b9a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u52b3\u52a8\u6559\u80b2\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09\u3002\u4f9b\u5168\u5e02\u4e49\u52a1\u6559\u80b2\u6bb5\u5b66\u6821\u53c2\u8003\u5b9e\u65bd\u3002\n\n# \u5907\u8bfe\u5e38\u89c4\n\n# \u4e00\u3001\u5236\u5b9a\u8bfe\u7a0b\u5b9e\u65bd\u8ba1\u5212\n\n1.\u4f9d\u636e\u300a\u4e49\u52a1\u6559\u80b2\u52b3\u52a8\u8bfe\u7a0b\u6807\u51c6\uff082022\u5e74\u7248\uff09\u300b\u300a\u4e2d\u5c0f\u5b66\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u8bfe\u7a0b\u6307\u5bfc\u7eb2\u8981\uff082017\u5e74\u7248\uff09\u300b\u548c\u5b66\u6821\u8bfe\u7a0b\u6574\u4f53\u89c4\u5212\u8bbe\u8ba1\uff0c\u901a\u8bfb\u5168\u518c\u6559\u6750\u548c\u914d\u5957\u7684\u6559\u5e08\u7528\u4e66\uff0c\u4e3b\u5bfc\u6216\u53c2\u4e0e\u5236\u8ba2\u5b66\u6821\u5c42\u9762\u7684\u201c\u5b66\u6821\u52b3\u52a8\u6559\u80b2\u5b9e\u65bd\u65b9\u6848\u201d\u201c\u5b66\u6821\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u5b9e\u65bd\u65b9\u6848\u201d\u548c\u5b66\u671f\u5b9e\u65bd\u8ba1\u5212\uff0c\u5b9e\u65bd\u65b9\u6848\u548c\u5b66\u671f\u5b9e\u65bd\u8ba1\u5212\u8981\u4e0e\u5b66\u6821\u6574\u4f53\u89c4\u5212\u76f8\u4e92\u3001\u914d\u5957\u3001\u76f8\u4e92\u8854\u63a5\u3002\n\n2.\u5236\u5b9a\u4e2a\u4eba\u73ed\u7ea7\u5b66\u671f\u6559\u5b66\u8ba1\u5212\n\n(1)\u00a0\u00a0\u00a0\u00a0 \u73b0\u6709\u8d44\u6e90\u5206\u6790\uff0c\u68b3\u7406\u597d\u4e0e\u4e3b\u9898\u76f8\u5173\u7684\u4eba\u529b\u3001\u73af\u5883\u3001\u5b9e\u8df5\u57fa\u5730\u7b49\u8d44\u6e90\u3002\n\n(2)\u00a0\u00a0\u00a0\u00a0 \u73ed\u7ea7\u60c5\u51b5\u5206\u6790\uff0c\u5305\u62ec\u5b66\u751f\u5174\u8da3\u7231\u597d\u3001\u751f\u6d3b\u7ecf\u9a8c\u3001\u4eba\u9645\u5173\u7cfb\u3001\u73ed\u98ce\u73ed\u8c8c\u3001\u5b9e\u8df5\u6d3b\u52a8\u6c34\u5e73\u7b49\u5b66\u60c5\u3002\n\n\uff083\uff09\u672c\u518c\u6559\u6750\u5185\u5bb9\u53ca\u6d3b\u52a8\u76ee\u6807\uff0c\u6839\u636e\u5b66\u751f\u57fa\u7840\u8fdb\u884c\u9002\u5207\u7684\u4e3b\u9898\u8bbe\u8ba1\uff0c\u5408\u7406\u9009\u62e9\u5b9e\u8df5\u9879\u76ee\u5185\u5bb9\u3002\n\n(4)\u00a0\u00a0\u00a0\u00a0 \u5b89\u5168\u98ce\u9669\u9632\u63a7\u5206\u6790\uff0c\u5408\u7406\u5b89\u6392\u4efb\u52a1\u3001\u5f3a\u5ea6\u3001\u65f6\u957f\uff0c\u5728\u573a\u6240\u8bbe\u65bd\u9009\u62e9\u3001\u6750\u6599\u9009\u7528\u3001\u5de5\u5177\u8bbe\u5907\u548c\u9632\u62a4\u7528\u54c1\u4f7f\u7528\u3001\u6d3b\u52a8\u6d41\u7a0b\u7b49\u65b9\u9762\uff0c\u786e\u4fdd\u5b9e\u8df5\u6d3b\u52a8\u5b89\u5168\u6709\u5e8f\u5b9e\u65bd\u3002\n\n(5)\u00a0\u00a0\u00a0\u00a0 \u5b89\u6392\u6559\u5b66\u8fdb\u5ea6\uff0c\u4ee5\u8868\u683c\u7684\u5f62\u5f0f\u5217\u51fa\u5177\u4f53\u5b89\u6392\u3002\u5b66\u671f\u6559\u5b66\u8ba1\u5212\u5f00\u5b66\u540e\u4e24\u5468\u5185\u4e0a\u4ea4\u3002\n\n# \u4e8c\u3001\u5236\u5b9a\u52b3\u52a8\u5468\u4e13\u9898\u6d3b\u52a8\u65b9\u6848\n\n\u52b3\u52a8\u5468\u662f\u52b3\u52a8\u8bfe\u7a0b\u7684\u91cd\u8981\u7ec4\u6210\u90e8\u5206\uff0c\u62d3\u5c55\u4e86\u52b3\u52a8\u6559\u80b2\u7684\u5b9e\u65bd\u9014\u5f84\uff0c\u6709\u52a9\u4e8e\u53d1\u5c55\u5b66\u751f\u7684\u52b3\u52a8\u610f\u8bc6\u4e0e\u80fd\u529b\uff0c\u6253\u901a\u5b66\u6821\u4e0e\u793e\u4f1a\u7684\u8054\u7cfb\uff0c\u53d1\u6325\u52b3\u52a8\u6559\u80b2\u7684\u7efc\u5408\u80b2\u4eba\u4ef7\u503c\u3002\u52b3\u52a8\u4e13\u517c\u804c\u6559\u5e08\u4e3b\u5bfc\u6216\u53c2\u4e0e\u5236\u8ba2\u3001\u5b9e\u65bd\u5b66\u6821\u52b3\u52a8\u5468\u4e13\u9898\u6d3b\u52a8\u65b9\u6848\uff1a\n\n1.\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 \u4e3b\u9898\u9009\u62e9\uff0c\u5e94\u4f53\u73b0\u52b3\u52a8\u4ef7\u503c\u89c2\u7684\u57f9\u80b2\u548c\u52b3\u52a8\u7cbe\u795e\u7684\u57f9\u517b\uff0c\u4ee5\u5b66\u751f\u7684\u751f\u6d3b\u5b9e\u9645\u548c\u793e\u4f1a\u751f\u4ea7\u5b9e\u9645\u4e3a\u51fa\u53d1\u70b9\u3002\n\n2.\u5185\u5bb9\u8bbe\u8ba1\uff0c\u5305\u542b\u52b3\u52a8\u9879\u76ee\u5b9e\u8df5\u3001\u6280\u80fd\u7ade\u8d5b\u3001\u52b3\u6a21\u5927\u8bb2\u5802\u3001\u4e3b\u9898\u6f14\u8bb2\u6216\u8fa9\u8bba\u3001\u6210\u679c\u5c55\u793a\u3001\u804c\n\n\u4e1a\u4f53\u9a8c\u7b49\u3002\n\n3.\u65f6\u95f4\u5b89\u6392\uff0c\u4e00\u822c\u6bcf\u5b66\u5e74\u5b89\u6392\u4e00\u6b21\uff0c\u5177\u4f53\u65f6\u95f4\u53ef\u6839\u636e\u52b3\u52a8\u5468\u7684\u5185\u5bb9\u8bbe\u8ba1\u548c\u5177\u4f53\u4efb\u52a1\u786e\u5b9a\u3002\n\n4.\u8d44\u6e90\u5229\u7528\uff0c\u7edf\u7b79\u548c\u5229\u7528\u597d\u793e\u4f1a\u3001\u5bb6\u5ead\u548c\u5b66\u6821\u7b49\u8d44\u6e90\uff0c\u5c0f\u5b66\u4ee5\u6821\u5185\u4e3a\u4e3b\u3001\u5c0f\u5b66\u9ad8\u5e74\u7ea7\u548c\u521d\u4e2d\u53ef\u9002\u5f53\u5b89\u6392\u90e8\u5206\u6821\u5916\u52b3\u52a8\u3002\n\n5.\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 \u6ce8\u610f\u4e8b\u9879, \u52b3\u52a8\u5468\u65e2\u8981\u5173\u6ce8\u52b3\u52a8\u77e5\u8bc6\u548c\u52b3\u52a8\u6280\u80fd\u7684\u5b66\u4e60, \u66f4\u8981\u5173\u6ce8\u8bfe\u5916\u3001\u6821\u5916\u52b3\u52a8\u5b9e\u8df5\u7684\u4ef7\u503c\u5f15\u9886\u3001\u52b3\u52a8\u7cbe\u795e\u7684\u57f9\u80b2, \u5c06\u52b3\u52a8\u5468\u6559\u80b2\u4e0e\u5b66\u751f\u4e2a\u4eba\u751f\u6d3b\u3001\u6821\u56ed\u751f\u6d3b\u548c\u793e\u4f1a\u751f\u6d3b\u6709\u673a\u7ed3\u5408,\u5f00\u5c55\u6709\u52b3\u52a8\u6709\u6559\u80b2\u7684\u52b3\u52a8\u5468\u3002\n\n# \u4e09\u3001\u5236\u5b9a\u6d3b\u52a8\u65b9\u6848\n\n\u9488\u5bf9\u4e0d\u540c\u5b66\u6bb5\u5b66\u751f\u7684\u7ecf\u9a8c\u57fa\u7840\u548c\u53d1\u5c55\u9700\u8981\uff0c\u8003\u8651\u533a\u57df\u7279\u70b9\u548c\u5b66\u6821\u6559\u80b2\u73af\u5883\uff0c\u628a\u63e1\u4e0d\u540c\u5b66\u6bb5\u5b66\u751f\u7d20\u517b\u53d1\u5c55\u8981\u6c42\uff0c\u5408\u7406\u9009\u62e9\u548c\u786e\u5b9a\u5b9e\u8df5\u9879\u76ee\uff08\u4e3b\u9898\uff09\u5185\u5bb9\u3002\u5305\u62ec\u6d3b\u52a8\u80cc\u666f\u5206\u6790\u3001\u6d3b\u52a8\u76ee\u6807\u3001\u91cd\u96be\u70b9\u3001\u6d3b\u52a8\u51c6\u5907\u3001\u6d3b\u52a8\u8fc7\u7a0b\u3001\u5177\u4f53\u6d3b\u52a8\u5185\u5bb9\u3001\u7269\u5316\u6210\u679c\u5c55\u793a\u4ea4\u6d41\u3001\u6539\u8fdb\u4e0e\u5b8c\u5584\u3002\n\n# \u4e0a\u8bfe\u5e38\u89c4\n\n# \u4e00\u3001\u6d3b\u52a8\u51c6\u5907\uff08\u91cd\u70b9\u9886\u57df\uff1a\u5b89\u5168\u6559\u80b2\uff09\n\n\u4fdd\u969c\u5b9e\u8df5\u6d3b\u52a8\u7684\u5b89\u5168\u3002\u5408\u7406\u5b89\u6392\u6d3b\u52a8\u4efb\u52a1\u3001\u5f3a\u5ea6\u3001\u65f6\u957f\uff0c\u5728\u573a\u6240\u8bbe\u65bd\u9009\u62e9\u3001\u6750\u6599\u9009\u7528\u3001\u5de5\u5177\u8bbe\u5907\u548c\u9632\u62a4\u7528\u54c1\u4f7f\u7528\u3001\u6d3b\u52a8\u6d41\u7a0b\u7b49\u65b9\u9762\uff0c\u5236\u5b9a\u5b89\u5168\u3001\u79d1\u5b66\u7684\u64cd\u4f5c\u89c4\u8303\uff1b\u6ce8\u91cd\u5b9e\u8df5\u6d3b\u52a8\u98ce\u9669\u9632\u63a7\u9884\u6848\u7684\u5236\u8ba2\uff0c\u4ee5\u53ca\u5e94\u6025\u4e0e\u4e8b\u6545\u5904\u7406\u673a\u5236\u7684\u5efa\u7acb\uff0c\u786e\u4fdd\u6d3b\u52a8\u8bfe\u7a0b\u5b89\u5168\u6709\u5e8f\u5b9e\u65bd\u3002\n\n# \u4e8c\u3001\u6559\u5b66\u57fa\u672c\u6d41\u7a0b\n\n# 1. \u660e\u786e\u4efb\u52a1\n\n\u7acb\u8db3\u5b66\u751f\u771f\u5b9e\u7684\u751f\u6d3b\u7ecf\u5386\u6216\u4f53\u9a8c\uff0c\u9762\u5411\u73b0\u5b9e\u751f\u6d3b\u548c\u771f\u5b9e\u4e16\u754c\uff0c\u521b\u8bbe\u5b9e\u8df5\u5b66\u4e60\u60c5\u5883\u3002\u9009\u62e9\u9002\u5207\u7684\u771f\u5b9e\u95ee\u9898\uff0c\u786e\u5b9a\u4e3a\u5b66\u4e60\u4e3b\u9898\uff0c\u660e\u786e\u6d3b\u52a8\u4efb\u52a1\u3002\n\n# 2.\u6dec\u70bc\u64cd\u4f5c\uff08\u5b9e\u8df5\u63a2\u7a76\uff09\n\n\u5f15\u5bfc\u5b66\u751f\u6ce8\u91cd\u8fd0\u7528\u5b9e\u5730\u89c2\u5bdf\u3001\u8bbf\u8c08\u3001\u5b9e\u9a8c\u7b49\u65b9\u6cd5\uff0c\u63d0\u51fa\u95ee\u9898\u3001\u9009\u62e9\u65b9\u6cd5\uff0c\u56f4\u7ed5\u5982\u4f55\u505a\u7684\u95ee\u9898\uff0c\u8ba9\u5b66\u751f\u5b9e\u8df5\u4f53\u9a8c\u3001\u4ea4\u6d41\u8bc4\u4ef7\u3001\u63a2\u7a76\u9879\u76ee\u6210\u679c\u3001\u53cd\u601d\u6539\u8fdb\u9879\u76ee\uff0c\u5f3a\u5316\u4ef7\u503c\u89c2\u610f\u8bc6\uff0c\u5f3a\u5316\u5b89\u5168\u610f\u8bc6\u3002\n\n# 3. \u6d3b\u52a8\u5b9e\u65bd\n\n\u5f15\u5bfc\u5b66\u751f\u4eb2\u8eab\u4f53\u9a8c\uff0c\u901a\u8fc7\u8bbe\u8ba1\u3001\u5236\u4f5c\u3001\u8bd5\u9a8c\u3001\u63a2\u7a76\u3001\u5c55\u793a\u7b49\u65b9\u5f0f\u83b7\u5f97\u4e30\u5bcc\u7684\u5b9e\u8df5\u7ecf\u9a8c\uff0c\u4fc3\u8fdb\u5b66\u751f\u6709\u6548\u5f00\u5c55\u591a\u6837\u5316\u7684\u5b9e\u8df5\u5b66\u4e60\uff0c\u63d0\u9192\u5b66\u751f\u53ca\u65f6\u505a\u597d\u6d3b\u52a8\u8fc7\u7a0b\u8bb0\u5f55\uff0c\u6ce8\u610f\u6536\u96c6\u3001\u6574\u7406\u548c\u4fdd\u5b58\u6d3b\u52a8\u8d44\u6599\uff0c\u5f62\u6210\u5b9e\u8df5\u6210\u679c\u6863\u6848\u3002\n\n# 4.\u5c55\u793a\u53cd\u601d\n\n\u7ec4\u7ec7\u5b66\u751f\u591a\u79cd\u5f62\u5f0f\u5c55\u793a\u9879\u76ee\u6210\u679c\uff0c\u53cd\u601d\u9879\u76ee\u5b9e\u8df5\u8fc7\u7a0b\u4e2d\u7684\u8981\u70b9\u3001\u96be\u70b9\u4ee5\u53ca\u9879\u76ee\u5408\u4f5c\u4e2d\u7684\u56f0\u96be\u89e3\u51b3\u5fc3\u5f97\u4f53\u4f1a\uff0c\u5f15\u5bfc\u5b66\u751f\u603b\u7ed3\u3001\u4ea4\u6d41\uff0c\u4fc3\u8fdb\u5b66\u751f\u5f62\u6210\u53cd\u601d\u4ea4\u6d41\u4e60\u60ef\u3002\u5c06\u53cd\u601d\u4ea4\u6d41\u4e0e\u6539\u8fdb\u7ed3\u5408\n\n\u8d77\u6765\uff0c\u4f7f\u5b66\u751f\u5728\u9879\u76ee\u5b66\u4e60\u4e2d\u5f62\u6210\u5ba1\u8fa8\u601d\u7ef4\uff0c\u83b7\u5f97\u6210\u957f\u3002\n\n# 5. \u699c\u6837\u6fc0\u52b1\uff08\u6210\u957f\u8bc4\u4f30\uff09\n\n\u5f00\u5c55\u6700\u4f73\u5b9e\u8df5\u5b66\u4e60\u9879\u76ee\u8bc4\u9009\u3001\u56e2\u961f\u8bc4\u9009\u3001\u4e2a\u4eba\u8bc4\u9009\uff0c\u4e88\u4ee5\u7cbe\u795e\u6fc0\u52b1\u6216\u7269\u8d28\u5956\u52b1\uff0c\u6811\u7acb\u591a\u7c7b\u578b\u699c\u6837\uff0c\u660e\u786e\u8981\u6c42\u5b66\u751f\u5728\u5b9e\u8df5\u4e2d\u52aa\u529b\u5411\u699c\u6837\u770b\u9f50\u3002\n\n# \u4e09\u3001\u6d3b\u52a8\u6574\u7406\n\n\u7075\u6d3b\u8fd0\u7528\u6574\u7406\u4e0e\u6536\u7eb3\u7684\u65b9\u6cd5\uff0c\u5f15\u5bfc\u5b66\u751f\u6574\u7406\u5404\u7c7b\u6d3b\u52a8\u7684\u5de5\u5177\u3001\u6750\u6599\uff0c\u5206\u533a\u5b58\u653e\uff0c\u6e05\u6d01\u573a\u5730\u548c\u684c\u9762\uff0c\u517b\u6210\u6574\u7406\u6536\u7eb3\u7684\u597d\u4e60\u60ef\u3002\n\n# \u6d3b\u52a8\u5e38\u89c4\n\n# \u4e00\u3001\u7ec4\u7ec7\u6210\u679c\u5c55\u793a\n\n\u9f13\u52b1\u5b66\u751f\u8fd0\u7528\u5404\u79cd\u5de5\u5177\u3001\u5de5\u827a\u8fdb\u884c\u8bbe\u8ba1\uff0c\u5e76\u52a8\u624b\u64cd\u4f5c\uff0c\u5c06\u81ea\u5df1\u7684\u521b\u610f\u3001\u65b9\u6848\u4ed8\u8bf8\u73b0\u5b9e\uff0c\u8f6c\u5316\u4e3a\u7269\u54c1\u6216\u4f5c\u54c1\u3002\u5b66\u751f\u7528\u56fe\u7247\u3001\u89c6\u9891\u3001\u6253\u5361\u7b49\u591a\u79cd\u5f62\u5f0f\u5c55\u793a\u6d3b\u52a8\u6210\u679c\uff0c\u53ca\u65f6\u4e0a\u4ea4\u6d3b\u52a8\u62a5\u544a\u3001\u53cd\u601d\u65e5\u5fd7\u3001\u5fc3\u5f97\u7b14\u8bb0\u7b49\u3002\n\n# \u4e8c\u3001\u5f00\u5c55\u62d3\u5c55\u6d3b\u52a8\n\n\u5b66\u751f\u5728\u6559\u5e08\u7684\u6307\u5bfc\u4e0b\uff0c\u8d70\u51fa\u6559\u5ba4\uff0c\u53c2\u4e0e\u793e\u4f1a\u6d3b\u52a8\uff0c\u4ee5\u81ea\u5df1\u7684\u5b9e\u8df5\u6d3b\u52a8\u6ee1\u8db3\u793e\u4f1a\u7ec4\u7ec7\u6216\u4ed6\u4eba\u7684\u9700\u8981\uff0c\u4fc3\u8fdb\u76f8\u5173\u77e5\u8bc6\u6280\u80fd\u7684\u5b66\u4e60\uff0c\u63d0\u5347\u5b9e\u8df5\u80fd\u529b\uff0c\u6210\u4e3a\u5c65\u804c\u5c3d\u8d23\u3001\u6562\u4e8e\u62c5\u5f53\u7684\u4eba\u3002\u9879\u76ee\u6d3b\u52a8\u5b8c\u6210\u540e\uff0c\u5e03\u7f6e1\u20142\u9879\u8bfe\u540e\u62d3\u5c55\u4f5c\u4e1a\u3002\n\n# \u4e09\u3001\u843d\u5b9e\u52b3\u52a8\u6e05\u5355\u4efb\u52a1\n\n\u5bb6\u6821\u534f\u540c\uff0c\u534f\u52a9\u5bb6\u957f\u5728\u5bb6\u5ead\u52b3\u52a8\u6559\u80b2\u4e2d\u5c06\u5b66\u6821\u52b3\u52a8\u8bfe\u7a0b\u5185\u5bb9\u4f5c\u4e3a\u91cd\u8981\u7ec4\u6210\u90e8\u5206\uff0c\u4f7f\u5bb6\u5ead\u52b3\u52a8\u6559\u80b2\u4e0e\u5b66\u6821\u52b3\u52a8\u8bfe\u7a0b\u5efa\u7acb\u5173\u8054\uff0c\u8bfe\u540e\u751f\u6d3b\u56de\u5f52\u65e5\u5e38\u751f\u6d3b\u52b3\u52a8\u5b9e\u8df5\uff0c\u4e3b\u52a8\u5206\u62c5\u5bb6\u52a1\u3001\u7231\u60dc\u52b3\u52a8\u6210\u679c\u3002\u6bcf\u5468\u8bfe\u5916\u6d3b\u52a8\u548c\u5bb6\u5ead\u751f\u6d3b\u4e2d\u52b3\u52a8\u65f6\u95f4\uff0c\u5c0f\u5b661\u81f32\u5e74\u7ea7\u4e0d\u5c11\u4e8e2\u5c0f\u65f6\uff0c\u5176\u4ed6\u5e74\u7ea7\u4e0d\u5c11\u4e8e3\u5c0f\u65f6\u3002\u6bcf\u5b66\u5e74\u5b66\u751f\u81f3\u5c11\u5b66\u4f1a\u65e5\u5e38\u751f\u6d3b\u52b3\u52a8\u6e05\u5355\u4e2d\u7684\u9879\u76ee1\u20142\u9879\u3002\n\n# \u56db\u3001\u6307\u5bfc\u516c\u76ca\u5b9e\u8df5\u6d3b\u52a8\n\n\u5f15\u5bfc\u5b66\u751f\u53c2\u4e0e\u9002\u5f53\u7684\u73ed\u7ea7\u96c6\u4f53\u52b3\u52a8\uff0c\u4e3b\u52a8\u7ef4\u62a4\u6559\u5ba4\u5185\u5916\u73af\u5883\u536b\u751f\u7b49\uff0c\u5b9a\u671f\u5f00\u5c55\u6821\u56ed\u5305\u5e72\u533a\u57df\u4fdd\u6d01\u548c\u7f8e\u5316\u3002\u5728\u6559\u5e08\u7684\u6307\u5bfc\u4e0b\uff0c\u8d70\u51fa\u6559\u5ba4\uff0c\u53c2\u4e0e\u793e\u4f1a\u516c\u76ca\u6d3b\u52a8\uff0c\u4ee5\u81ea\u5df1\u7684\u6d3b\u52a8\u6ee1\u8db3\u793e\u4f1a\u7ec4\u7ec7\u6216\u4ed6\u4eba\u7684\u9700\u8981\uff0c\u4fc3\u8fdb\u76f8\u5173\u77e5\u8bc6\u6280\u80fd\u7684\u5b66\u4e60\uff0c\u63d0\u5347\u5b9e\u8df5\u80fd\u529b\uff0c\u505a\u6709\u7231\u5fc3\u7684\u4eba\u3002\n\n# \u2014\u2014\u8bc4\u4ef7\u5e38\u89c4\u2014\u2014\n\n# \u4e00\u3001\u6ce8\u91cd\u5e73\u65f6\u8868\u73b0\u8bc4\u4ef7\u548c\u9636\u6bb5\u7efc\u5408\u8bc4\u4ef7\n\n\u52b3\u52a8\u6559\u80b2\u7d27\u6263\u8bfe\u7a0b\u5185\u5bb9\u548c\u8bfe\u7a0b\u6807\u51c6\u3001\u8bfe\u7a0b\u6838\u5fc3\u7d20\u517b\u8981\u6c42\uff0c\u6784\u5efa\u5bb6\u5ead\u3001\u5b66\u6821\u3001\u793e\u4f1a\u7acb\u4f53\u5316\u8bc4\u4ef7\u4f53\u7cfb\uff0c\u65e5\u5e38\u52b3\u52a8\u6559\u80b2\u6559\u5b66\u6d3b\u52a8\u91c7\u7528\u8fc7\u7a0b\u6027\u8bc4\u4ef7\u3001\u7ec8\u7ed3\u6027\u8bc4\u4ef7\u548c\u7efc\u5408\u8bc4\u4ef7\u4e09\u7ea7\u8bc4\u5b9a\u3002\n\n\u8868 1: \u52b3\u52a8\u8bc4\u4ef7\u5e38\u89c4\n\n|   |   |   |   |   |   |   |   |   |   |   |   |\n|---|---|---|---|---|---|---|---|---|---|---|---|\n|\u7ef4\u5ea6\\\u59d3\u540d|\u8fc7\u7a0b\u6027\u8bc4\u4ef7|   |   |   |   |   |\u7ec8\u7ed3\u6027\u8bc4\u4ef7|   |\u7efc\u5408\u8bc4\u4ef7|   |   |\n|\u52b3\u52a8\u89c2\u5ff5|\u52b3\u52a8\u77e5\u8bc6|\u52b3\u52a8\u6280\u80fd|\u52b3\u52a8\u4e60\u60ef|\u52b3\u52a8\u54c1\u8d28|\u52b3\u52a8\u7cbe\u795e|\u6821\u5185\u73ed\u5185\u6210\u679c\u5c55\u793a20\u5206|\u793e\u4f1a\u5bb6\u5ead\u6210\u679c\u5c55\u793a20\u5206|\u5f97\u5206|\u7b49\u7b2c(\u7ea7)|\u6587\u5b57\u5b9a\u6027\u8bc4\u4ef7|\n|\u8ba4\u540c\u52b3\u52a8\u5c0a\u91cd\u52b3\u52a8\u70ed\u7231\u52b3\u52a810\u5206|\u4f7f\u7528\u5de5\u5177\u5b89\u5168\u77e5\u8bc6\u6280\u672f\u77e5\u8bc610\u5206|\u8bbe\u8ba1\u80fd\u529b\u64cd\u4f5c\u80fd\u529b\u534f\u4f5c\u80fd\u529b10\u5206|\u81ea\u89c9\u52b3\u52a8\u5b89\u5168\u52b3\u52a8\u575a\u6301\u52b3\u52a810\u5206|\u8bda\u5b9e\u5b88\u4fe1\u5403\u82e6\u8010\u52b3\u73cd\u60dc\u6210\u679c10\u5206|\u52e4\u4fed\u8282\u7ea6\u656c\u4e1a\u5949\u732e\u5f00\u62d3\u521b\u65b010\u5206|\n|||||||||||||\n|||||||||||||\n|||||||||||||\n\n\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u8bfe\u7a0b\u8bc4\u4ef7\u548c\u7efc\u5408\u7d20\u8d28\u8bc4\u4ef7\u63a5\u8f68\uff0c\u4ee5\u4fc3\u8fdb\u5b66\u751f\u7efc\u5408\u7d20\u8d28\u53d1\u5c55\u4e3a\u76ee\u7684\u3002\u5173\u6ce8\u8fc7\u7a0b\u6027\u8bc4\u4ef7\uff0c\u5728\u5e73\u65f6\u9879\u76ee\u5b9e\u8df5\u8fc7\u7a0b\u4e2d\u901a\u8fc7\u8bc4\u4ef7\u53ca\u65f6\u53cd\u9988\uff0c\u8bb0\u5f55\u6d3b\u52a8\u60c5\u51b5\uff0c\u6536\u96c6\u6574\u7406\u6709\u5173\u5236\u54c1\u3001\u4f5c\u54c1\u7b49\uff0c\u7eb3\u5165\u7efc\u5408\u7d20\u8d28\u6863\u6848\u4e2d\uff1b\u5173\u6ce8\u7ec8\u7ed3\u6027\u8bc4\u4ef7\uff0c\u901a\u8fc7\u4f5c\u54c1\u5236\u4f5c\u4e0e\u6280\u80fd\u5c55\u793a\u8bc4\u4ef7\u5b66\u751f\u7684\u52a8\u624b\u80fd\u529b\uff0c\u5bf9\u5b66\u751f\u5f00\u5c55\u53d1\u5c55\u6027\u6210\u957f\u8bc4\u4f30\u3002\n\n\u88682\uff1a\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u8bc4\u4ef7\u5e38\u89c4\n\n|   |   |   |   |   |   |   |   |   |   |\n|---|---|---|---|---|---|---|---|---|---|\n|\u7ef4\u5ea6\\\u59d3\u540d|\u8fc7\u7a0b\u6027\u8bc4\u4ef7|   |   |   |\u7ec8\u7ed3\u6027\u8bc4\u4ef7|   |\u7efc\u5408\u8bc4\u4ef7|   |   |\n|\u4ef7\u503c\u4f53\u8ba4|\u8d23\u4efb\u62c5\u5f53|\u95ee\u9898\u89e3\u51b3|\u521b\u610f\u7269\u5316|\u6863\u6848\u888b\u4e2d\u91cd\u8981\u6d3b\u52a8\u8bb0\u5f5520\u5206|\u6d3b\u52a8\u6210\u679c\u62a5\u544a\u6216\u5c55\u793a20\u5206|\u5f97\u5206|\u7b49\u7b2c(\u7ea7)|\u6587\u5b57\u5b9a\u6027\u8bc4\u4ef7|\n|\u79ef\u6781\u6001\u5ea6\u96c6\u4f53\u610f\u8bc6\u5bb6\u56fd\u60c5\u600015\u5206|\u7ba1\u7406\u81ea\u6211\u670d\u52a1\u793e\u4f1a\u5c0a\u91cd\u81ea\u713615\u5206|\u63d0\u51fa\u95ee\u9898\u5206\u6790\u95ee\u9898\u89e3\u51b3\u95ee\u989815\u5206|\u521b\u610f\u8bbe\u8ba1\u57fa\u672c\u6280\u80fd\u4f5c\u54c1\u5c55\u793a15\u5206|\n|||||||||||\n|||||||||||\n|||||||||||\n\n# \u4e8c\u3001\u53c2\u4e0e\u8d28\u91cf\u76d1\u6d4b\uff0c\u5f00\u5c55\u6e05\u5355\u8bc4\u4ef7\n\n\u52b3\u52a8\u8bfe\u7a0b\u53c2\u4e0e\u56db\u5e74\u7ea7\u3001\u516b\u5e74\u7ea7\u56fd\u5bb6\u8d28\u91cf\u76d1\u6d4b\u3002\u7ec4\u7ec7\u5b66\u751f\u6bcf\u5e74\u5b8c\u62101\u20142\u9879\u52b3\u52a8\u6e05\u5355\u4efb\u52a1\uff0c\u5b66\u6821\u5bf9\u5b8c\u6210\u60c5\u51b5\u5f00\u5c55\u7ed3\u679c\u6027\u8bc4\u4ef7\u3002\n\n# \u6559\u7814\u5e38\u89c4\n\n# \u4e00\u3001\u6210\u7acb\u5b66\u79d1\u6559\u7814\u7ec4\n\n\u91cd\u89c6\u6559\u7814\u7ec4\u5efa\u8bbe\uff0c\u9009\u62d4\u5fb7\u624d\u517c\u5907\u7684\u9aa8\u5e72\u6559\u5e08\u62c5\u4efb\u6559\u7814\u7ec4\u957f\uff08\u5c0f\u89c4\u6a21\u5b66\u6821\u8058\u8bf7\u6821\u5916\u6307\u5bfc\u5e08\u3001\n\n\u52b3\u6a21\u5de5\u5320\u7b49), \u4e0d\u5177\u5907\u6210\u7acb\u5b66\u79d1\u6559\u7814\u7ec4\u7684\u5b66\u6821, \u6559\u5e08\u5fc5\u987b\u9009\u62e9\u4e00\u4e2a\u5b66\u79d1\u6559\u7814\u56e2\u961f\u53c2\u4e0e\u6559\u7814\u6d3b\u52a8\u3002\n\n# \u4e8c\u3001\u79ef\u6781\u5f00\u5c55\u6559\u7814\u6d3b\u52a8\n\n\u5b66\u6821\u5e94\u89c4\u8303\u6559\u7814\u7ec4\u5efa\u8bbe\uff0c\u5236\u5b9a\u6821\u672c\u6559\u7814\u6d3b\u52a8\u5236\u5ea6\u3002\u6559\u5e08\u6bcf\u5b66\u671f\u81f3\u5c11\u5f00\u8bbe\u5e74\u7ea7\u6216\u6821\u7ea7\u7814\u8ba8\u8bfe1\u8282\uff0c\u81f3\u5c11\u53c2\u52a01\u6b21\u53bf\u7ea7\u53ca\u4ee5\u4e0a\u6559\u7814\u6d3b\u52a8\uff08\u542b\u7ebf\u4e0a\u6d3b\u52a8\uff09\u5e76\u6709\u8fc7\u7a0b\u8bb0\u5f55\uff08\u65f6\u95f4\u3001\u5730\u70b9\u3001\u4eba\u5458\u3001\u5185\u5bb9\u7b49\uff09\uff0c\u517c\u804c\u4efb\u8bfe\u6559\u5e08\u4e5f\u8981\u53c2\u52a0\u6559\u7814\u6d3b\u52a8\u3002\u5b66\u6821\u5206\u7ba1\u9886\u5bfc\u8981\u6df1\u5165\u6559\u7814\u7ec4\uff0c\u7763\u4fc3\u548c\u53c2\u4e0e\u6821\u672c\u7814\u4fee\u6d3b\u52a8\uff0c\u6709\u5b66\u79d1\u6559\u5b66\u542c\u8bfe\u8bb0\u5f55\u6216\u53c2\u4e0e\u7814\u8ba8\u8bb0\u5f55\u3002\n\n# \u4e09\u3001\u534f\u52a9\u5f00\u5c55\u52b3\u52a8\u5468\u6d3b\u52a8\n\n\u6559\u7814\u7ec4\u534f\u52a9\u5b66\u6821\u7ec4\u7ec7\u5f00\u5c55\u52b3\u52a8\u5468\u3001\u52b3\u52a8\u8282\u3001\u4e30\u6536\u8282\u3001\u52b3\u52a8\u6210\u679c\u5c55\u793a\u7b49\u6d3b\u52a8\u3002\u534f\u52a9\u5b66\u6821\u56e0\u4e8b\u56e0\u5730\u5236\u5b9c\uff0c\u505a\u597d\u52b3\u52a8\u5468\u7684\u8be6\u7ec6\u65b9\u6848\uff0c\u5bf9\u52b3\u52a8\u4e3b\u9898\u9009\u62e9\u3001\u52b3\u52a8\u4efb\u52a1\u5206\u914d\u3001\u5de5\u5177\u9009\u62e9\u3001\u8fc7\u7a0b\u8bb0\u5f55\u3001\u6210\u679c\u5206\u4eab\u4e0e\u5904\u7406\u3001\u6d3b\u52a8\u8bc4\u4f30\u4e0e\u6539\u8fdb\u7b49\u8fdb\u884c\u7ec6\u81f4\u5b89\u6392\u3002\u91cd\u89c6\u52b3\u52a8\u5b9e\u8df5\u7684\u5185\u5316\uff0c\u5728\u52b3\u52a8\u5468\u7684\u6d3b\u52a8\u5b89\u6392\u4e2d\uff0c\u9f13\u52b1\u5b66\u751f\u52a8\u624b\u5b9e\u8df5\u3001\u51fa\u529b\u6d41\u6c57\u3001\u5206\u4eab\u5c55\u793a\u3002\u505a\u597d\u52b3\u52a8\u5468\u5b89\u5168\u9884\u9632\u9884\u6848\u3001\u610f\u5916\u4e8b\u4ef6\u5904\u7406\u7d27\u6025\u9884\u6848\u7b49\u3002\n\n# \u56db\u3001\u6821\u56ed\u6587\u5316\u5efa\u8bbe\u4e2d\u5f3a\u5316\u5b9e\u8df5\u6587\u5316\n\n\u5b66\u6821\u8981\u5c06\u751f\u6d3b\u5373\u6559\u80b2\u3001\u793e\u4f1a\u5373\u5b66\u6821\u7684\u517b\u6210\u6559\u80b2\u878d\u5165\u6821\u56ed\u6587\u5316\u5efa\u8bbe\u4e4b\u4e2d\u3002\u8981\u901a\u8fc7\u5236\u5b9a\u52b3\u52a8\u516c\u7ea6\u3001\u6bcf\u65e5\u5e38\u89c4\u3001\u6d3b\u52a8\u4efb\u52a1\u5355\uff0c\u91c7\u53d6\u4e0e\u5b9e\u8df5\u6559\u80b2\u6709\u5173\u7684\u5174\u8da3\u5c0f\u7ec4\u3001\u793e\u56e2\u7b49\u7ec4\u7ec7\u5f62\u5f0f\uff0c\u5f00\u5c55\u4e30\u5bcc\u7684\u4e3b\u9898\u6559\u80b2\u6d3b\u52a8\uff0c\u8425\u9020\u52b3\u52a8\u6700\u5149\u8363\u3001\u52b3\u52a8\u6700\u4f1f\u5927\u7684\u6821\u56ed\u6587\u5316\u3002\n\n\u9644\u4ef6\uff1a1.\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u52b3\u52a8\u6559\u5b66\u8bbe\u8ba1\u53c2\u8003\u683c\u5f0f\uff082025\u5e74\u7248\uff09\n\n2.\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u6307\u5bfc\u65b9\u6848\u8bbe\u8ba1\u53c2\u8003\u683c\u5f0f\uff082025\u5e74\u7248\uff09\n\n3.\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u52b3\u52a8\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u6559\u5e08\u6559\u5b66\u5e38\u89c4\u8fc7\u7a0b\u6307\u5bfc\u53cd\u9988\u8868\uff082025\u5e74\u7248\uff09\n\n\u9644\u4ef61\n\n\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\ 10\u679c|C9\u6210\u679c\u5c55\u793a|\u7528\u56fe\u7247\u3001\u89c6\u9891\u3001\u6253\u5361\u7b49\u591a\u79cd\u5f62\u5f0f\u5c55\u793a\u6d3b\u52a8\u6210\u679c,\u53ca\u65f6\u4e0a\u4ea4\u6d3b\u52a8\u62a5\u544a\u3001\u53cd\u601d\u65e5\u5fd7\u3001\u5fc3\u5f97\u7b14\u8bb0\u7b49\u3002|\u6d3b\u52a8\u62a5\u544a\u3001\u6750\u6599\u8bb0\u5f55\u7b49|\u67e5\u9605\u3001\u8bbf\u8c08\u7b49|5|||||\n|B6\u5bb6\u6821\u534f\u540c|C10\u5bb6\u5ead\u52b3\u52a8|\u6bcf\u5468\u8bfe\u5916\u6d3b\u52a8\u548c\u5bb6\u5ead\u751f\u6d3b\u4e2d\u52b3\u52a8\u65f6\u95f4,\u5c0f\u5b661\u81f32\u5e74\u7ea7\u4e0d\u5c11\u4e8e2\u5c0f\u65f6,\u5176\u4ed6\u5e74\u7ea7\u4e0d\u5c11\u4e8e3\u5c0f\u65f6\u3002|5|||||\n|B7\u793e\u4f1a\u5b9e\u8df5|C11\u5b9e\u8df5\u6d3b\u52a8|\u53c2\u4e0e\u9002\u5f53\u7684\u73ed\u7ea7\u96c6\u4f53\u52b3\u52a8,\u4e3b\u52a8\u7ef4\u62a4\u6559\u5ba4\u5185\u5916\u73af\u5883\u536b\u751f\u7b49,\u5b9a\u671f\u5f00\u5c55\u6821\u56ed\u5305\u5e72\u533a\u57df\u4fdd\u6d01\u548c\u7f8e\u5316\u3002\u5728\u6559\u5e08\u7684\u6307\u5bfc\u4e0b,\u53c2\u4e0e\u793e\u4f1a\u5b9e\u8df5\u6d3b\u52a8\u3002|5|||||\n|A3\u8bc4\u4ef7\u5e38\u89c4(10\u5206)|B8\u8bc4\u4ef7\u65b9\u5f0f|C12\u8bc4\u4ef7\u89c6\u89d2\u591a\u7ef4|\u7ed3\u5408\u8fd0\u7528\u8868\u73b0\u8bc4\u4ef7\u3001\u9636\u6bb5\u8bc4\u4ef7\u3001\u7efc\u5408\u8bc4\u4ef7,\u6ce8\u91cd\u6536\u96c6\u5b66\u751f\u52b3\u52a8\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u5b66\u4e60\u7684\u5178\u578b\u8868\u73b0\u5e76\u505a\u597d\u6863\u6848\u888b\u8bb0\u5f55\u3002|\u6750\u6599\u8bb0\u5f55|\u67e5\u9605\u3001\u8bbf\u8c08|4|||||\n|B9\u8bc4\u4ef7\u5bf9\u8c61|C13\u8bc4\u4ef7\u4e3b\u4f53\u591a\u5143|\u9f13\u52b1\u6559\u5e08\u3001\u540c\u4f34\u3001\u5bb6\u957f\u7b49\u591a\u5143\u8bc4\u4ef7\u5bf9\u8c61\u53c2\u4e0e\u3002|4|||||\n|B10\u8bc4\u4ef7\u53cd\u9988|C14\u53cd\u9988\u6539\u8fdb|\u91c7\u7528\u5206\u9879\u7b49\u7ea7\u8bc4\u4ef7\u65b9\u5f0f\u5448\u73b0,\u907f\u514d\u7b80\u5355\u5730\u7528\u7b14\u8bd5\u6210\u7ee9\u6216\u6bd4\u4f8b\u5212\u5206\u7b49\u7ea7\u3002|\u5206\u6790\u5355\u3001\u62a5\u544a\u5355|2|||||\n|A4\u6559\u7814\u5e38\u89c4(15\u5206)|B11\u7814\u4fee\u8ba1\u5212|C15\u7ec4\u7ec7\u5efa\u8bbe|\u9009\u62d4\u5fb7\u624d\u517c\u5907\u7684\u9aa8\u5e72\u6559\u5e08\u62c5\u4efb\u6559\u7814\u7ec4\u957f(\u5c0f\u89c4\u6a21\u5b66\u6821\u8058\u8bf7\u6821\u5916\u6307\u5bfc\u5e08\u3001\u52b3\u6a21\u5de5\u5320\u7b49),\u4e0d\u5177\u5907\u6210\u7acb\u5b66\u79d1\u6559\u7814\u7ec4\u7684\u5b66\u6821,\u6559\u5e08\u5fc5\u987b\u9009\u62e9\u4e00\u4e2a\u5b66\u79d1\u6559\u7814\u56e2\u961f\u53c2\u4e0e\u6559\u7814\u6d3b\u52a8\u3002|\u7814\u4fee\u8ba1\u5212\u3001\u6d3b\u52a8\u8bb0\u5f55|\u67e5\u9605|2|||||\n|C16\u6559\u7814\u8ba1\u5212|\u89c4\u8303\u6559\u7814\u7ec4\u5efa\u8bbe,\u5236\u5b9a\u52b3\u52a8\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u6821\u672c\u6559\u7814\u6d3b\u52a8\u5236\u5ea6;\u505a\u597d\u52b3\u52a8\u5468\u6d3b\u52a8\u5b89\u6392\u3002|2|||||\n|B12\u6559\u7814\u6d3b\u52a8|C17\u542c\u8bfe\u3001\u516c\u5f00\u8bfe|\u6559\u5e08\u6bcf\u5b66\u671f\u81f3\u5c11\u5f00\u8bbe\u5e74\u7ea7\u6216\u6821\u7ea7\u7814\u8ba8\u8bfe1\u8282;\u81f3\u5c11\u53c2\u52a01\u6b21\u53bf\u7ea7\u53ca\u4ee5\u4e0a\u6559\u7814\u6d3b\u52a8\u5e76\u6709\u8fc7\u7a0b\u8bb0\u5f55\u3002|\u542c\u8bfe\u672c\u3001\u6559\u7814\u624b\u518c\u3001\u8bc1\u4e66\u7b49|\u67e5\u9605|5|||||\n\n|   |   |   |   |   |   |   |   |   |   |   |\n|---|---|---|---|---|---|---|---|---|---|---|\n|\u4e00\u7ea7\u8981\u7d20|\u4e8c\u7ea7\u8981\u7d20|\u4e09\u7ea7\u8981\u7d20|\u5185\u5bb9|\u6750\u6599|\u65b9\u5f0f|\u6307\u5bfc\u610f\u89c1|   |   |   |\u5907\u6ce8|\n|\u5206\u503c|\u4e2a\u4eba|\u5b66\u6821|\u53bf|\n|||C18\u627f\u62c5\u4efb\u52a1|\u79ef\u6781\u627f\u62c5\u5e02-\u53bf-\u6821\u4e09\u7ea7\u6559\u7814\u7ec4\u7ec7\u5b89\u6392\u7684\u6d3b\u52a8\u4efb\u52a1\u3002|||2|||||\n|B13\u6559\u7814\u6210\u679c|C19\u4ea4\u6d41\u83b7\u5956|\u64b0\u5199\u6559\u80b2\u6559\u5b66\u8bba\u6587\u548c\u6587\u7ae0,\u5f62\u6210\u5178\u578b\u8bfe\u4f8b\u3001\u6848\u4f8b\u3001\u8bba\u6587\u7b49\u6210\u679c;\u53c2\u52a0\u5b66\u6821\u548c\u4e0a\u7ea7\u6559\u80b2\u90e8\u95e8\u7ec4\u7ec7\u7684\u4ea4\u6d41\u7814\u8ba8\u6d3b\u52a8\u548c\u8bc4\u5ba1\u6d3b\u52a8\u3002|4|||||\n|A5\u5176\u4ed6|\u7279\u6b8a\u8d21\u732e|   |\u6839\u636e\u6559\u5e08\u7684\u5de5\u4f5c\u8868\u73b0,\u5728\u843d\u5b9e\u6559\u5b66\u5e38\u89c4\u65b9\u9762\u6709\u7279\u6b8a\u8d21\u732e,\u7ed9\u4e881-5\u5206\u7684\u52a0\u5206\u3002||||||||\n|\u4eae\u70b9|   |   ||   |   |   |   |   |   |   |\n|\u5efa\u8bae|   |   ||   |   |   |   |   |   |   |\n|\u8bf4\u660e:\u5b66\u6821\u6559\u7814\u7ec4\u7ed3\u5408\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u52b3\u52a8\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248)\u300b\u8981\u6c42,\u4ee5\u672c\u8868\u4e3a\u53c2\u8003,\u7ed3\u5408\u5b66\u6821\u5b9e\u9645\u548c\u6559\u5e08\u4e2a\u4eba\u8868\u73b0,\u53ef\u4ee5\u589e\u5220\u76f8\u5173\u5185\u5bb9,\u52a1\u5b9e\u4e14\u521b\u9020\u6027\u5730\u5f00\u5c55\u6559\u5b66\u5e38\u89c4\u8bc4\u8bae\u5de5\u4f5c,\u4ee5\u9488\u5bf9\u6027\u5730\u843d\u5b9e\u6559\u5b66\u5e38\u89c4,\u63d0\u9ad8\u6559\u5e08\u65e5\u5e38\u6559\u5b66\u8d28\u91cf\u3002|   |   |   |   |\u6c47\u603b||||||\n\n\u53cd\u9988\u4eba\uff1a\n\n# \u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09\n\n\u5730\u65b9\u8bfe\u7a0b\u662f\u4e00\u95e8\u57fa\u4e8e\u7701\u60c5\u6559\u80b2\u548c\u4e13\u9898\u6559\u80b2\u5b66\u4e60\u7684\u7efc\u5408\u6027\u3001\u6d3b\u52a8\u6027\u8bfe\u7a0b\u3002\u4f9d\u636e\u300a\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u65b9\u6848\uff082022\u5e74\u7248\uff09\u300b\u300a\u6d59\u6c5f\u7701\u4e49\u52a1\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\u5b66\u79d1\u6559\u5b66\u57fa\u672c\u8981\u6c42\u300b\u7b49\u7cbe\u795e\uff0c\u843d\u5b9e\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u5b9e\u65bd\u529e\u6cd5\u300b\uff0c\u7ed3\u5408\u6d59\u6c5f\u7701\u3001\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\u6559\u6750\u300a\u4eba\u00b7\u81ea\u7136\u00b7\u793e\u4f1a\u300b\u548c\u300a\u8bdd\u8bf4\u6e29\u5dde\u300b\u8981\u6c42\uff0c\u7279\u5236\u5b9a\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09\u300b\u3002\u4f9b\u5168\u5e02\u4e49\u52a1\u6559\u80b2\u5b66\u6821\u53c2\u8003\u5b9e\u65bd\u3002\n\n# \u5907\u8bfe\u5e38\u89c4\n\n# \u4e00\u3001\u5b66\u4e60\u8bfe\u7a0b\u6807\u51c6\u548c\u6559\u6750\n\n1. \u5b66\u4e60\u8bfe\u7a0b\u6807\u51c6\u3002\u5b66\u4e60\u3001\u4e86\u89e3\u300a\u6d59\u6c5f\u7701\u57fa\u7840\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\uff08\u901a\u7528\u5185\u5bb9\uff09\u6807\u51c6\u300b\uff081-9\u5e74\u7ea7\uff09\uff0c\u660e\u786e\u5730\u65b9\u8bfe\u7a0b\u7684\u8bfe\u7a0b\u6027\u8d28\uff0c\u4e86\u89e3\u7701\u7f16\u5730\u65b9\u8bfe\u7a0b\u6559\u6750\u201c\u4f53\u73b0\u6d59\u6c5f\u7279\u70b9\u3001\u57f9\u517b\u5730\u65b9\u60c5\u6000\u3001\u5021\u5bfc\u7efc\u5408\u5b66\u4e60\u3001\u6ce8\u91cd\u7075\u6d3b\u5b9e\u65bd\u201d\u7684\u57fa\u672c\u7406\u5ff5\u4ee5\u53ca\u5e02\u7f16\u5730\u65b9\u8bfe\u7a0b\u6559\u6750\u201c\u4f20\u627f\u6e29\u5dde\u4eba\u7cbe\u795e\u548c\u4e2d\u534e\u4f20\u7edf\u6587\u5316\u201d\u7684\u4ef7\u503c\u7406\u5ff5\u3002\n2. \u660e\u786e\u76ee\u6807\u8981\u6c42\u3002\u51c6\u786e\u628a\u63e1\u7701\u7f16\u5730\u65b9\u8bfe\u7a0b\u7684\u603b\u4f53\u8bfe\u7a0b\u76ee\u6807\uff08\u6d59\u6c5f\u6cbf\u9769\u3001\u6d59\u6c5f\u73af\u5883\u3001\u6d59\u6c5f\u6587\u5316\u3001\u6d59\u6c5f\u7ecf\u6d4e\u3001\u548c\u8c10\u6d59\u6c5f\u4e94\u5927\u4e3b\u9898\u7684\u5206\u7c7b\u76ee\u6807\uff09\u548c\u6e29\u5dde\u5e02\u7f16\u5730\u65b9\u8bfe\u7a0b\u201c\u57f9\u517b\u6e29\u5dde\u4eba\u7cbe\u795e\u3001\u4f20\u627f\u74ef\u8d8a\u6587\u5316\u3001\u57f9\u517b\u5bb6\u56fd\u60c5\u6000\u201d\u603b\u4f53\u76ee\u6807\uff0c\u77e5\u9053\u5730\u65b9\u8bfe\u7a0b\u201c\u4e86\u89e3\u5bb6\u4e61-\u8ba4\u8bc6\u5bb6\u4e61-\u8ba4\u540c\u5bb6\u4e61-\u70ed\u7231\u5bb6\u4e61\u201d\u7684\u8bbe\u8ba1\u4e3b\u7ebf\uff0c\u660e\u786e\u5730\u65b9\u8bfe\u7a0b\u57f9\u517b\u6d59\u6c5f\u60c5\u6000\u7684\u6559\u5b66\u91cd\u5fc3\u3002\n3. \u6574\u4f53\u9605\u8bfb\u6559\u6750\u3002\u901a\u8bfb\u901a\u7528\u5185\u5bb9\u548c\u4e13\u9898\u5185\u5bb9\u7684\u5168\u90e8\u6559\u6750\uff0c\u4e86\u89e3\u4e24\u5957\u6559\u6750\u7684\u6574\u4f53\u601d\u8def\u548c\u7ed3\u6784\u5b89\u6392\uff0c\u7406\u89e3\u7701\u7f16\u6559\u6750\u4e94\u5927\u4e3b\u9898\u201c\u5206\u5757\u8bbe\u7f6e\u3001\u87ba\u65cb\u4e0a\u5347\u201d\u7684\u8bbe\u8ba1\u610f\u56fe\u548c\u5e02\u7f16\u6559\u6750\u6e29\u5dde\u5386\u53f2\u3001\u6e29\u5dde\u98ce\u4fd7\u3001\u6e29\u5dde\u7ecf\u6d4e\u3001\u6e29\u5dde\u6587\u5316\u3001\u6e29\u5dde\u65b9\u8a00\u3001\u6e29\u5dde\u540d\u4eba\u3001\u6e29\u5dde\u996e\u98df\u3001\u6e29\u5dde\u4eba\u7cbe\u795e\u7b49\u65b9\u9762\u7684\u6559\u5b66\u5185\u5bb9\u3002\n\n# \u4e8c\u3001\u5236\u5b9a\u8bfe\u7a0b\u7eb2\u8981\u548c\u76ee\u6807\n\n1. \u5236\u5b9a\u8bfe\u7a0b\u7eb2\u8981\u3002\u6839\u636e\u6559\u6750\u8981\u6c42\u548c\u5b66\u751f\u5b9e\u9645\u60c5\u51b5\uff0c\u5236\u5b9a\u5b66\u671f\u3001\u5355\u5143\u8bfe\u7a0b\u7eb2\u8981\uff0c\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u8bbe\u8ba1\u5305\u542b\u6559\u6750\u5206\u6790\u3001\u5b66\u60c5\u5206\u6790\u3001\u5b66\u4e60\u76ee\u6807\u4e0e\u91cd\u96be\u70b9\u3001\u8bfe\u524d\u51c6\u5907\u3001\u677f\u4e66\u9884\u8bbe\u3001\u6559\u5b66\u8fc7\u7a0b\u8bbe\u8ba1\u3001\u6559\u5b66\u53cd\u601d\u7b49\u65b9\u9762\u7684\u5185\u5bb9\u3002\u5728\u4e00\u5b66\u5e74\u4e2d\u5bf9\u300a\u4eba\u00b7\u81ea\u7136\u00b7\u793e\u4f1a\u300b\u300a\u8bdd\u8bf4\u6e29\u5dde\u300b\u4e24\u5957\u6559\u6750\u8f6e\u6d41\u5b89\u6392\u3002\u914d\u5408\u56fd\u5bb6\u3001\u7701\u7ea7\u5f00\u5c55\u8bfe\u7a0b\u5b9e\u65bd\u76d1\u6d4b\uff0c\u5f00\u9f50\u5f00\u8db3\u8bfe\u7a0b\uff0c\u4e0d\u5f97\u968f\u610f\u5360\u7528\u632a\u7528\u8bfe\u65f6\u3002\u9f13\u52b1\u5bf9\u7701\u7f16\u3001\u5e02\u7f16\u4e24\u5957\u6559\u6750\u76f8\u4f3c\u5185\u5bb9\u8fdb\u884c\u4e3b\u9898\u7edf\u6574\u3001\u8de8\u5b66\u79d1\u6574\u5408\uff0c\u878d\u5408\u5b9e\u65bd\uff0c\u7edf\u7b79\u5b89\u6392\u8bfe\u65f6\u3002\n2. \u5236\u5b9a\u8bfe\u65f6\u76ee\u6807\u3002\u5728\u62df\u5b9a\u5b66\u671f\u6559\u5b66\u8ba1\u5212\u57fa\u7840\u4e0a\u5236\u5b9a\u8bfe\u65f6\u6559\u5b66\u76ee\u6807\uff0c\u5145\u5206\u8003\u8651\u77e5\u8bc6\u4e60\u5f97\u3001\u6280\u80fd\u4f53\u9a8c\u3001\u8fc7\u7a0b\u611f\u609f\u3001\u60c5\u611f\u83b7\u5f97\u7b49\u65b9\u9762\u7684\u6709\u673a\u6574\u5408\u3002\u8bfe\u65f6\u76ee\u6807\u8981\u5177\u4f53\u3001\u660e\u6670\u3001\u53ef\u64cd\u4f5c\uff0c\u7b26\u5408\u5b66\u751f\u9700\u8981\u548c\u6559\u5b66\u8981\u6c42\uff0c\u7b26\u5408\u5404\u4e3b\u9898\u6559\u5b66\u7684\u8fdb\u5ea6\u8981\u6c42\u3002\n\n3.\u5145\u5206\u5206\u6790\u5b66\u60c5\u3002\u591a\u9014\u5f84\u591a\u6e20\u9053\u4e86\u89e3\u5b66\u751f\u5df2\u6709\u77e5\u8bc6\u6c34\u5e73\u548c\u5b9e\u8df5\u52a8\u624b\u80fd\u529b\u53ca\u5bf9\u5728\u5730\u6587\u5316\u7684\u4e86\u89e3\u7a0b\u5ea6\uff0c\u91cd\u89c6\u5bf9\u591a\u6837\u5316\u6587\u5316\u77e5\u8bc6\u53ca\u73b0\u8c61\u7684\u68b3\u7406\u4e0e\u5448\u73b0\uff0c\u6709\u6548\u4e3a\u5b66\u751f\u8bbe\u7f6e\u6559\u5b66\u60c5\u5883\u53ca\u5b66\u4e60\u4efb\u52a1\uff0c\u5e2e\u52a9\u5b66\u751f\u660e\u786e\u5b66\u4e60\u76ee\u6807\u3002\u6839\u636e\u5b66\u751f\u5b66\u60c5\uff0c\u7075\u6d3b\u8c03\u6574\u4e0d\u540c\u5e74\u6bb5\u3001\u4e0d\u540c\u5206\u518c\u7684\u6559\u5b66\u5185\u5bb9\u3002\n\n# \u4e09\u3001\u5408\u7406\u9009\u7528\u6559\u5b66\u7d20\u6750\n\n1.\u5408\u7406\u9009\u7528\u7d20\u6750\u3002\u6ce8\u91cd\u68b3\u7406\u5728\u5730\u6587\u5316\u8d44\u6e90\uff0c\u56e0\u5730\u5236\u5b9c\u3001\u7075\u6d3b\u9009\u62e9\u6559\u5b66\u8d44\u6e90\uff0c\u5408\u7406\u9009\u7528\u5730\u65b9\u8bfe\u7a0b\u901a\u7528\u5185\u5bb9\u548c\u4e13\u9898\u5185\u5bb9\u8bbe\u8ba1\u6559\u5b66\u3002\u8bfe\u7a0b\u8d44\u6e90\u80fd\u591f\u5145\u5206\u53cd\u6620\u7ecf\u6d4e\u793e\u4f1a\u53d1\u5c55\u73b0\u72b6\uff0c\u5f15\u5bfc\u5b66\u751f\u4e86\u89e3\u793e\u4f1a\u53d1\u5c55\u6001\u52bf\uff0c\u6ce8\u91cd\u8054\u7cfb\u5b66\u751f\u5b66\u4e60\u3001\u751f\u6d3b\u3001\u601d\u60f3\u5b9e\u9645\uff0c\u786e\u4fdd\u5185\u5bb9\u7684\u601d\u60f3\u6027\u3001\u79d1\u5b66\u6027\u3001\u9002\u5b9c\u6027\u548c\u65f6\u4ee3\u6027\uff0c\u907f\u514d\u6559\u5b66\u5185\u5bb9\u7684\u8131\u8282\u3001\u8fc7\u65f6\u3002\n\n2.\u505a\u597d\u6559\u6750\u4e8c\u6b21\u5f00\u53d1\u3002\u9ad8\u5ea6\u91cd\u89c6\u5bf9\u5730\u65b9\u8bfe\u7a0b\u6559\u6750\u7684\u4e8c\u6b21\u5f00\u53d1\u7814\u7a76\uff0c\u91cd\u89c6\u793e\u4f1a\u4e3b\u4e49\u6838\u5fc3\u4ef7\u503c\u89c2\u5bfc\u5411\uff0c\u63d0\u9ad8\u89e3\u8bfb\u3001\u4f7f\u7528\u6559\u6750\u7684\u80fd\u529b\u3002\u521b\u9020\u6027\u5f00\u53d1\u4e0e\u5229\u7528\u6e29\u5dde\u5728\u5730\u8bfe\u7a0b\u8d44\u6e90\uff0c\u4e3a\u5b66\u751f\u63d0\u4f9b\u4e0e\u5176\u793e\u4f1a\u751f\u6d3b\u76f8\u8054\u7cfb\u7684\u4e61\u571f\u77e5\u8bc6\u548c\u7ecf\u9a8c\uff0c\u5e2e\u52a9\u5b66\u751f\u7406\u89e3\u5730\u65b9\u6587\u5316\u7684\u591a\u6837\u6027\u3002\n\n3.\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 \u5145\u5206\u5229\u7528\u7f51\u7edc\u8d44\u6e90\u3002\u4ee5\u201c\u6e29\u5dde\u5c0f\u5b66\u5730\u65b9\u201d\u516c\u4f17\u53f7\u4e3a\u652f\u6491\uff0c\u6574\u5408\u4e2d\u5c0f\u5b66\u300a\u8bdd\u8bf4\u6e29\u5dde\u300b\u5168\u518c\u7535\u5b50\u6559\u6750\u3001\u6559\u5b66\u8bbe\u8ba1\u3001\u6559\u5b66\u8bfe\u4ef6\u7b49\u8d44\u6e90\uff0c\u51cf\u8f7b\u6559\u5e08\u5de5\u4f5c\u8d1f\u62c5\uff0c\u9f13\u52b1\u6559\u5e08\u5728\u6a21\u4eff\u5b9e\u8df5\u7684\u57fa\u7840\u4e0a\uff0c\u4f18\u5316\u8fed\u4ee3\u539f\u6709\u8d44\u6e90\uff0c\u63d0\u9ad8\u7f51\u7edc\u8d44\u6e90\u4f7f\u7528\u6548\u7387\uff0c\u63d0\u5347\u6559\u5e08\u8d44\u6e90\u6574\u5408\u548c\u6559\u5b66\u8bbe\u8ba1\u80fd\u529b\u3002\n\n# \u2014\u2014\u4e0a\u8bfe\u5e38\u89c4\u2014\u2014\n\n# \u4e00\u3001\u4e0a\u8bfe\u57fa\u672c\u8981\u6c42\n\n1.\u575a\u6301\u6d3b\u52a8\u6559\u5b66\u3002\u6839\u636e\u8bfe\u6807\u53ca\u6559\u6750\u8981\u6c42\uff0c\u521b\u8bbe\u771f\u5b9e\u6559\u5b66\u60c5\u5883\uff0c\u6709\u6548\u8bbe\u8ba1\u4e30\u5bcc\u591a\u5f69\u7684\u6559\u5b66\u6d3b\u52a8\u3002\u6559\u5b66\u6d3b\u52a8\u8981\u6c42\u7b80\u5355\u3001\u660e\u786e\u3001\u53ef\u64cd\u4f5c\uff0c\u4e0e\u6559\u5b66\u76ee\u6807\u76f8\u5339\u914d\uff0c\u4e0e\u5b66\u751f\u7684\u8ba4\u77e5\u6c34\u5e73\u3001\u751f\u6d3b\u4f53\u9a8c\u76f8\u4e00\u81f4\uff0c\u6ce8\u610f\u5f15\u5bfc\u5b66\u751f\u611f\u609f\u6d3b\u52a8\u610f\u4e49\u3002\u907f\u514d\u4f4e\u6548\u3001\u65e0\u6548\u7684\u6559\u5b66\u6d3b\u52a8\u53ca\u5927\u91cf\u6587\u672c\u8bb2\u6388\u3002\n\n2. \u6ce8\u91cd\u6587\u5316\u4f20\u627f\u3002\u4f18\u79c0\u4f20\u7edf\u6587\u5316\u662f\u5730\u65b9\u8bfe\u7a0b\u7684\u4f18\u8d28\u8bfe\u7a0b\u8d44\u6e90\uff0c\u6559\u5b66\u4e2d\u8981\u91cd\u89c6\u5c06\u793e\u4f1a\u4e3b\u4e49\u5148\u8fdb\u6587\u5316\u3001\u9769\u547d\u6587\u5316\u3001\u4e2d\u534e\u4f18\u79c0\u4f20\u7edf\u6587\u5316\u3001\u56fd\u5bb6\u5b89\u5168\u3001\u751f\u547d\u5b89\u5168\u4e0e\u5065\u5eb7\u7b49\u4f18\u79c0\u6587\u5316\u548c\u91cd\u8981\u4e3b\u9898\u878d\u5165\u8bfe\u7a0b\uff0c\u9002\u5f53\u5f15\u5bfc\u5b66\u751f\u7406\u89e3\u6587\u5316\u4ea7\u751f\u7684\u80cc\u666f\u4e0e\u6e0a\u6e90\uff0c\u79ef\u6781\u53c2\u52a0\u5b66\u6821\u6216\u793e\u4f1a\u7ec4\u7ec7\u7684\u4f18\u79c0\u6587\u5316\u4f20\u627f\u6d3b\u52a8\uff0c\u81ea\u89c9\u6210\u4e3a\u4f18\u79c0\u6587\u5316\u7684\u7ee7\u627f\u8005\u4e0e\u53d1\u626c\u8005\u3002\n3. \u5f15\u5bfc\u51c6\u786e\u751f\u52a8\u3002\u4f5c\u4e3a\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u7684\u5f15\u5bfc\u8005\u3001\u7ec4\u7ec7\u8005\uff0c\u6559\u5e08\u7684\u8bed\u8a00\u8868\u8fbe\u8981\u51c6\u786e\u3001\u751f\u52a8\u3001\u7b80\u660e\u3001\u9002\u5b9c\u3002\u9488\u5bf9\u4e0d\u540c\u6559\u5b66\u8282\u70b9\u548c\u4e0d\u540c\u5b66\u751f\u60c5\u51b5\uff0c\u6559\u5b66\u8bed\u8a00\u8981\u6709\u9488\u5bf9\u6027\uff0c\u6ce8\u91cd\u751f\u6d3b\u5316\u3001\u8da3\u5473\u5316\uff0c\u505a\u5230\u201c\u6307\u5bfc\u5f00\u5c55\u6d3b\u52a8\u51c6\u786e\u3001\u70b9\u8bc4\u5b66\u751f\u884c\u4e3a\u5408\u7406\u3001\u6e32\u67d3\u8bfe\u5802\u6c14\u6c1b\u7a33\u59a5\u201d\u3002\u907f\u514d\u4f7f\u7528\u8fc7\u591a\u504f\u96be\u7684\u4e13\u4e1a\u7528\u8bed\u3001\u8fc7\u5206\u717d\u60c5\u7684\u70b9\u8bc4\u7528\u8bed\u3002\n\n4.\u4fa7\u91cd\u7d20\u517b\u5bfc\u5411\u3002\u901a\u8fc7\u81ea\u4e3b\u5b66\u4e60\u3001\u5408\u4f5c\u4ea4\u6d41\u3001\u6d3b\u52a8\u4f53\u9a8c\u3001\u8c03\u67e5\u5b9e\u8df5\u7b49\u591a\u79cd\u5b66\u4e60\u65b9\u5f0f\uff0c\u5f15\u5bfc\u5b66\u751f\u5e7f\u6cdb\u53c2\u4e0e\u6559\u5b66\u6d3b\u52a8\u53ca\u793e\u4f1a\u6d3b\u52a8\uff0c\u4fc3\u8fdb\u5b66\u751f\u6587\u5316\u7406\u89e3\u4e0e\u4f20\u627f\u7d20\u517b\u3001\u79d1\u5b66\u4e0e\u4eba\u6587\u7d20\u517b\u3001\u6c11\u65cf\u7cbe\u795e\u4e0e\u56fd\u9645\u89c6\u91ce\u3001\u793e\u4f1a\u8d23\u4efb\u611f\u4e0e\u5386\u53f2\u4f7f\u547d\u611f\u7684\u53d1\u5c55\u3002\n\n5.\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 \u5584\u7528\u5b66\u751f\u751f\u6210\u3002\u5408\u7406\u5ba1\u89c6\u5e76\u5584\u4e8e\u501f\u7528\u5b66\u751f\u5728\u6d3b\u52a8\u4e2d\u7684\u751f\u6210\u6027\u8d44\u6e90\uff0c\u5c0a\u91cd\u5e76\u7406\u89e3\u5b66\u751f\u7684\u72ec\n\n\u7279\u89c1\u89e3\uff0c\u5f15\u5bfc\u5b66\u751f\u4e86\u89e3\u793e\u4f1a\u53d1\u5c55\u3001\u6b63\u89c6\u793e\u4f1a\u73b0\u5b9e\uff0c\u5de7\u5999\u5229\u7528\u5b66\u751f\u6210\uff0c\u53ca\u65f6\u8865\u5145\u8c03\u6574\u6559\u5b66\u6d3b\u52a8\u5b89\u6392\u3002\u5408\u7406\u8bbe\u8ba1\u5c0f\u5b66\u4e00\u81f3\u4e8c\u5e74\u7ea7\u8bfe\u7a0b\uff0c\u6ce8\u91cd\u6d3b\u52a8\u5316\u3001\u6e38\u620f\u5316\u3001\u751f\u6d3b\u5316\u7684\u5b66\u4e60\u8bbe\u8ba1\u3002\n\n# \u4e8c\u3001\u4e3b\u9898\u6574\u5408\u6559\u5b66\u8981\u6c42\n\n1.\u5021\u5bfc\u6559\u5b66\u5f00\u653e\u3002\u8bfe\u5802\u6559\u5b66\u4e0d\u5e94\u5c40\u9650\u4e8e\u8bfe\u672c\uff0c\u8981\u5411\u5b66\u751f\u7684\u751f\u6d3b\u7ecf\u9a8c\u5f00\u653e\uff0c\u9009\u7528\u6700\u8d34\u8fd1\u5b66\u751f\u7684\u8bfe\u7a0b\u8d44\u6e90\uff0c\u5f15\u5bfc\u5b66\u751f\u5728\u7ecf\u5386\u4e2d\u83b7\u5f97\u60c5\u611f\u4f53\u9a8c\uff0c\u771f\u5b9e\u611f\u77e5\u4eba\u4e0e\u81ea\u7136\u3001\u793e\u4f1a\u7684\u5173\u7cfb\u3002\u9f13\u52b1\u5b66\u751f\u57fa\u4e8e\u8bfe\u5185\u5b66\u4e60\uff0c\u5f00\u5c55\u793e\u4f1a\u8c03\u67e5\u3001\u4ea7\u54c1\u7814\u7a76\u3001\u91c7\u8bbf\u62cd\u6444\u3001\u5bfc\u89c8\u5206\u4eab\u7b49\u591a\u79cd\u5b9e\u8df5\u6d3b\u52a8\uff0c\u63d0\u4f9b\u9002\u5f53\u6709\u6548\u7684\u65b9\u6cd5\u6307\u5bfc\uff0c\u5e76\u4e3a\u5b66\u751f\u642d\u5efa\u8bfe\u5916\u5ef6\u4f38\u6d3b\u52a8\u7684\u5c55\u793a\u3001\u4ea4\u6d41\u5e73\u53f0\u3002\n\n2.\u7ec4\u7ec7\u6574\u5408\u5b9e\u65bd\u3002\u6709\u6548\u5229\u7528\u8bfe\u540e\u670d\u52a1\u65f6\u95f4\uff0c\u79ef\u6781\u63a8\u8fdb\u5730\u65b9\u8bfe\u7a0b\u4e0e\u6821\u672c\u8bfe\u7a0b\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u3001\u73ed\u56e2\u961f\u6d3b\u52a8\u3001\u5b66\u6821\u4e13\u9898\u6559\u80b2\u6d3b\u52a8\u53ca\u5176\u4ed6\u5b66\u79d1\u76f8\u5173\u6559\u5b66\u5185\u5bb9\u6574\u5408\u5b9e\u65bd\uff0c\u5f3a\u8c03\u6559\u5b66\u76ee\u6807\u3001\u6559\u5b66\u5185\u5bb9\u3001\u6559\u5b66\u65b9\u5f0f\u4e09\u7edf\u4e00\uff0c\u907f\u514d\u62fc\u76d8\u5f0f\u7684\u6d45\u5c42\u6b21\u7edf\u6574\u3002\n\n3.\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 \u5f00\u5c55\u4e3b\u9898\u6559\u5b66\u3002\u6839\u636e\u6d59\u6c5f\u7701\u548c\u6e29\u5dde\u5e02\u5730\u57df\u7ecf\u6d4e\u3001\u6587\u5316\u5386\u53f2\u7684\u53d1\u5c55\u3001\u73b0\u5b9e\u72b6\u51b5\u53ca\u53d1\u5c55\u8981\u6c42\uff0c\u6574\u5408\u300a\u4eba\u00b7\u81ea\u7136\u00b7\u793e\u4f1a\u300b\u6559\u6750\u548c\u300a\u8bdd\u8bf4\u6e29\u5dde\u300b\u6559\u6750\u4e2d\u7684\u76f8\u4f3c\u4e3b\u9898\uff0c\u56f4\u7ed5\u67d0\u4e00\u4e3b\u9898\u5f00\u5c55\u8de8\u5b66\u79d1\u4e3b\u9898\u5b66\u4e60\uff0c\u6d3b\u52a8\u8fc7\u7a0b\u8981\u7a81\u51fa\u63a2\u7a76\u6027\uff0c\u5bfc\u5b66\u751f\u5173\u6ce8\u5bb6\u4e61\u7684\u5386\u53f2\u3001\u73b0\u72b6\u548c\u53d1\u5c55\u524d\u666f\uff0c\u5e2e\u52a9\u5b66\u751f\u4e86\u89e3\u5bb6\u4e61\uff0c\u5173\u7231\u5bb6\u4e61\uff0c\u589e\u5f3a\u5b66\u751f\u4f5c\u4e3a\u6d59\u6c5f\u4eba\u3001\u6e29\u5dde\u4eba\u7684\u81ea\u8c6a\u611f\u548c\u4e3a\u5bb6\u4e61\u670d\u52a1\u7684\u4fe1\u5ff5\u3002\n\n# \u8bc4\u4ef7\u5e38\u89c4\n\n1. \u521b\u65b0\u8bc4\u4ef7\u65b9\u5f0f\u3002\u5730\u65b9\u8bfe\u7a0b\u8bc4\u4ef7\u4ee5\u8fc7\u7a0b\u6027\u8bc4\u4ef7\u4e3a\u4e3b\uff0c\u6839\u636e\u4e0d\u540c\u4e3b\u9898\u5185\u5bb9\u6709\u6240\u4fa7\u91cd\uff0c\u6ce8\u91cd\u5bf9\u5b66\u751f\u7684\u77e5\u8bc6\u4e0e\u6280\u80fd\u3001\u8fc7\u7a0b\u4e0e\u65b9\u6cd5\u3001\u60c5\u611f\u6001\u5ea6\u548c\u4ef7\u503c\u89c2\u7b49\u8fdb\u884c\u7efc\u5408\u8bc4\u4ef7\u3002\u91c7\u7528\u5206\u9879\u7b49\u7ea7\u8bc4\u4ef7\u65b9\u5f0f\u5448\u73b0\uff0c\u907f\u514d\u7b80\u5355\u5730\u7528\u7b14\u8bd5\u6210\u7ee9\u6216\u6bd4\u4f8b\u5212\u5206\u7b49\u7ea7\u3002\n2. \u62d3\u5c55\u8bc4\u4ef7\u5bf9\u8c61\u3002\u9f13\u52b1\u6559\u5e08\u3001\u540c\u4f34\u3001\u5bb6\u957f\u7b49\u591a\u5143\u8bc4\u4ef7\u5bf9\u8c61\u53c2\u4e0e\u3002\u91cd\u89c6\u5b66\u751f\u5728\u60c5\u611f\u4f53\u9a8c\u548c\u611f\u609f\u65b9\u9762\u7684\u4e2a\u6027\u5316\u8868\u73b0\uff0c\u53ef\u4ee5\u91c7\u53d6\u89c2\u5bdf\u3001\u8bbf\u8c08\u3001\u95ee\u5377\u3001\u6c47\u62a5\u3001\u8868\u6f14\u3001\u4f5c\u54c1\u5c55\u793a\u7b49\u591a\u79cd\u8868\u73b0\u6027\u8bc4\u4ef7\u65b9\u6cd5\u3002\n3. \u8bc4\u4ef7\u53cd\u9988\u53ca\u65f6\u3002\u7ed9\u4e88\u8bc4\u4ef7\u8981\u5ba2\u89c2\u3001\u516c\u6b63\u3001\u53ca\u65f6\uff0c\u4ee5\u6fc0\u52b1\u5b66\u751f\u4e2a\u6027\u5316\u53d1\u5c55\uff0c\u4fc3\u8fdb\u6559\u5e08\u5b8c\u5584\u6559\u5b66\u8fc7\u7a0b\u4e3a\u4e3b\u8981\u76ee\u7684\u3002\u8981\u80fd\u591f\u53d1\u73b0\u5e76\u5145\u5206\u80af\u5b9a\u5b66\u751f\u7684\u4e2a\u6027\u7279\u5f81\u3001\u5b66\u4e60\u4f18\u70b9\uff0c\u5e76\u5bf9\u5b66\u751f\u4e0d\u8db3\u4e4b\u5904\u63d0\u4f9b\u6709\u9488\u5bf9\u6027\u7684\u6307\u5bfc\uff0c\u901a\u8fc7\u8bc4\u4ef7\u4e0d\u65ad\u4fc3\u8fdb\u5b66\u751f\u7efc\u5408\u80fd\u529b\u7684\u63d0\u9ad8\u3002\n\n# \u2014\u2014\u6559\u7814\u5e38\u89c4\u2014\u2014\n\n# \u4e00\u3001\u5065\u5168\u6559\u7814\u5236\u5ea6\n\n1. \u5236\u5b9a\u6559\u7814\u8ba1\u5212\u3002\u7acb\u8db3\u5b66\u6821\u5b9e\u9645\uff0c\u5236\u5b9a\u5730\u65b9\u8bfe\u7a0b\u6559\u7814\u8ba1\u5212\uff0c\u4e3b\u9898\u7a81\u51fa\uff0c\u4efb\u52a1\u5206\u5de5\u660e\u786e\u3002\u6bcf\u6708\u81f3\u5c11\u56fa\u5b9a\u4e00\u4e2a\u534a\u5929\u4e3a\u6559\u7814\u6d3b\u52a8\u7684\u65f6\u95f4\uff0c\u53ef\u4e0e\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u3001\u6821\u672c\u8bfe\u7a0b\u6574\u5408\u5b9e\u65bd\uff0c\u6bcf\u6b21\u6559\u7814\u6d3b\u52a8\uff0c\u505a\u5230\u63d0\u524d\u5e03\u7f6e\u4efb\u52a1\uff0c\u5b9a\u65f6\u95f4\u3001\u5b9a\u5730\u70b9\u3001\u5b9a\u4e3b\u9898\u3001\u5b9a\u5185\u5bb9\u3002\n2. \u843d\u5b9e\u5e38\u89c4\u7ba1\u7406\u3002\u5168\u9762\u843d\u5b9e\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09\u300b\uff0c\u5b9a\u671f\u548c\u4e0d\u5b9a\u671f\u5f00\u5c55\u6559\u5b66\u5e38\u89c4\u68c0\u67e5\u4e0e\u53cd\u9988\uff0c\u6811\u7acb\u5148\u8fdb\u5178\u578b\uff0c\u53ca\u65f6\u53d1\u73b0\u548c\u77eb\u6b63\u6559\u5b66\u4e2d\u7684\u4e0d\u5f53\u884c\u4e3a\u3002\n\n3.\u5efa\u7acb\u6fc0\u52b1\u673a\u5236\u3002\u5bf9\u5728\u6559\u7814\u5de5\u4f5c\u4e2d\u8868\u73b0\u79ef\u6781\u3001\u53d6\u5f97\u4f18\u79c0\u6210\u7ee9\u7684\u5730\u65b9\u8bfe\u7a0b\u6559\u5e08\uff0c\u7ed9\u4e88\u8868\u5f70\uff0c\u7ed9\u4ed6\u4eec\u63d0\u4f9b\u5c55\u793a\u4e2a\u4eba\u6559\u7814\u98ce\u91c7\u7684\u5e73\u53f0\uff0c\u5728\u5b66\u79d1\u8bc4\u4f18\u8bc4\u5148\u4e2d\u4f18\u5148\u63a8\u8350\uff0c\u6fc0\u53d1\u6559\u5e08\u53c2\u4e0e\u6559\u7814\u7684\u79ef\u6781\u6027\u3002\n\n# \u4e8c\u3001\u5f00\u5c55\u6559\u7814\u6d3b\u52a8\n\n1. \u5065\u5168\u6307\u5bfc\u5236\u5ea6\u3002\u5065\u5168\u6559\u7814\u6307\u5bfc\u5236\u5ea6\uff0c\u660e\u786e\u4e13\u4eba\u8d1f\u8d23\uff0c\u5f00\u5c55\u5730\u65b9\u8bfe\u7a0b\u5efa\u8bbe\u4e0e\u5b9e\u65bd\u60c5\u51b5\u7684\u8c03\u7814\u4e0e\u4e13\u4e1a\u6307\u5bfc\uff0c\u805a\u7126\u5173\u952e\u95ee\u9898\uff0c\u7ec4\u7ec7\u5f00\u5c55\u5e02\u2014\u2014\u53bf\u2014\u2014\u6821\u4e09\u7ea7\u5e38\u6001\u5316\u6559\u7814\u6d3b\u52a8\uff1b\u5b66\u6821\u8981\u7ec4\u7ec7\u6559\u5e08\u53c2\u4e0e\u5404\u7c7b\u5730\u65b9\u8bfe\u7a0b\u6559\u6750\u3001\u6559\u5b66\u57f9\u8bad\uff0c\u5b9a\u671f\u5f00\u5c55\u6821\u672c\u7814\u4fee\uff1b\u9f13\u52b1\u5f00\u5c55\u8de8\u533a\u57df\u3001\u8de8\u5b66\u6821\u7684\u5730\u65b9\u8bfe\u7a0b\u6559\u7814\u5e2e\u6276\u6d3b\u52a8\u3002\n2. \u5f00\u5c55\u4e3b\u9898\u6559\u7814\u3002\u56f4\u7ed5\u5730\u65b9\u8bfe\u7a0b\u6559\u6750\u6559\u5b66\u5185\u5bb9\uff0c\u6309\u7167\u300a\u4eba\u00b7\u81ea\u7136\u00b7\u793e\u4f1a\u300b\u6d59\u6c5f\u6cbf\u9769\u3001\u6d59\u6c5f\u73af\u5883\u3001\u6d59\u6c5f\u6587\u5316\u3001\u6d59\u6c5f\u7ecf\u6d4e\u3001\u548c\u8c10\u6d59\u6c5f\u4e94\u5927\u4e3b\u9898\u7b49\u6559\u6750\u903b\u8f91\u6216\u300a\u8bdd\u8bf4\u6e29\u5dde\u300b\u81ea\u7136\u98ce\u5149\u3001\u4f20\u7edf\u6587\u5316\u3001\u540d\u80dc\u53e4\u8ff9\u3001\u98ce\u571f\u4eba\u60c5\u3001\u6e29\u5dde\u7269\u4ea7\u548c\u6e29\u5dde\u540d\u4eba\u7b49\u677f\u5757\u4e3e\u884c\u6559\u7814\u6d3b\u52a8\u3002\u9075\u5faa\u201c\u96c6\u4f53\u5907\u8bfe-\u4e0a\u8bfe-\u8bfe\u540e\u7814\u8ba8\u201d\u7b49\u65b9\u5f0f\uff0c\u6df1\u5316\u5bf9\u5730\u65b9\u8bfe\u7a0b\u8bfe\u7a0b\u5185\u5bb9\u7684\u7406\u89e3\u4e0e\u5b9e\u8df5\uff0c\u63d0\u9ad8\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u54c1\u8d28\u3002\n3. \u52a0\u5f3a\u4e13\u9898\u6559\u7814\u3002\u53bf\uff08\u5e02\u3001\u533a\uff09\u6559\u7814\u90e8\u95e8\u6bcf\u5b66\u671f\u81f3\u5c11\u4e3e\u884c1\u6b21\u5730\u65b9\u8bfe\u7a0b\u4e13\u9898\u6559\u5b66\u7814\u8ba8\u6d3b\u52a8\uff0c\u5bf9\u8de8\u5b66\u79d1\u4e3b\u9898\u5b66\u4e60\u3001\u5355\u5143\u6574\u4f53\u6559\u5b66\u3001\u6838\u5fc3\u7d20\u517b\u53d8\u9769\u7b49\u8fdb\u884c\u9488\u5bf9\u6027\u7684\u7814\u8ba8\uff1b\u81f3\u5c11\u4e3e\u884c1\u6b21\u9488\u5bf9\u4e61\u6751\u5b66\u6821\u6216\u8584\u5f31\u5b66\u6821\u7684\u5730\u65b9\u8bfe\u7a0b\u4e13\u9898\u9001\u6559\u6d3b\u52a8\uff0c\u63d0\u9ad8\u4e61\u6751\u6559\u5e08\u5bf9\u5730\u65b9\u8bfe\u7a0b\u7684\u7406\u89e3\u548c\u5b9e\u65bd\u80fd\u529b\uff1b\u6bcf\u5b66\u5e74\u81f3\u5c11\u7ec4\u7ec7\u6559\u5e08\u53c2\u4e0e\u7701\u3001\u5e02\u5730\u65b9\u8bfe\u7a0b\u5173\u952e\u95ee\u9898\u89e3\u51b3\u4e13\u9898\u7814\u8ba8\u6d3b\u52a8\uff0c\u5728\u4ea4\u6d41\u5c55\u793a\u4e2d\u63d0\u5347\u6559\u5e08\u8bfe\u7a0b\u5efa\u8bbe\u80fd\u529b\u3002\u6559\u5e08\u6bcf\u5b66\u671f\u81f3\u5c11\u5f00\u8bbe\u5e74\u7ea7\u6216\u6821\u7ea7\u7814\u8ba8\u8bfe1\u8282\uff0c\u81f3\u5c11\u53c2\u52a01\u6b21\u53bf\u7ea7\u53ca\u4ee5\u4e0a\u6559\u7814\u6d3b\u52a8\u5e76\u6709\u8fc7\u7a0b\u8bb0\u5f55\u3002\n\n# \u4e09\u3001\u63d0\u5347\u6559\u7814\u5b9e\u6548\n\n1.\u5efa\u8bbe\u6559\u5b66\u8d44\u6e90\u3002\u6559\u7814\u7ec4\u8981\u5229\u7528\u597d\u7701\u7ea7\u5929\u5929\u516c\u5f00\u8bfe\u3001\u6e29\u5dde\u5c0f\u5b66\u5730\u65b9\u7b49\u5e73\u53f0\u63d0\u4f9b\u7684\u4f18\u79c0\u8bfe\u7a0b\u8d44\u6e90\uff0c\u52a0\u5f3a\u5b66\u4e60\u7814\u7a76\u3002\u79ef\u6781\u5229\u7528\u4fe1\u606f\u79d1\u6280\u3001\u5927\u6570\u636e\u5e73\u53f0\uff0c\u8fdb\u884c\u6210\u679c\u5c55\u793a\u3001\u7ecf\u9a8c\u63a8\u4ecb\uff0c\u5f62\u6210\u6821\u672c\u5316\u7684\u4f18\u8d28\u8bfe\u7a0b\u4e0e\u6559\u5b66\u8d44\u6e90\u5e93\u3002\n\n2. \u5f00\u5c55\u6559\u5e08\u9605\u8bfb\u3002\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u5185\u5bb9\u6d89\u53ca\u9762\u5e7f\u3001\u5185\u5bb9\u591a\uff0c\u5e94\u6ce8\u91cd\u63d0\u5347\u6559\u5e08\u6587\u5316\u7d20\u517b\uff0c\u591a\u65b9\u4e86\u89e3\u4f53\u9a8c\u3001\u719f\u6089\u5f53\u5730\u6587\u5316\uff0c\u591a\u65b9\u9605\u8bfb\u76f8\u5173\u4e66\u7c4d\uff0c\u589e\u52a0\u4e2a\u4eba\u77e5\u8bc6\u50a8\u5907\u3002\u63d0\u9ad8\u4f5c\u4e1a\u8bbe\u8ba1\u8d28\u91cf\uff0c\u5f00\u5c55\u5730\u65b9\u8bfe\u7a0b\u5b9e\u8df5\u6027\u4f5c\u4e1a\u8bbe\u8ba1\u4e0e\u5b9e\u65bd\u3002\u53ca\u65f6\u8fdb\u884c\u6559\u5b66\u53cd\u601d\uff0c\u4f18\u5316\u6559\u5b66\u884c\u4e3a\uff0c\u589e\u5f3a\u5bf9\u5730\u65b9\u8bfe\u7a0b\u6559\u80b2\u6559\u5b66\u7684\u7406\u89e3\u4e0e\u8ba4\u8bc6\u3002\n3. \u63d0\u70bc\u7814\u7a76\u6210\u679c\u3002\u7ed3\u5408\u5b66\u6821\u5b9e\u9645\uff0c\u6309\u4e0d\u540c\u6559\u7814\u4e3b\u9898\u53ca\u65f6\u6574\u7406\u8bfe\u7a0b\u8d44\u6e90\uff0c\u5e76\u5bf9\u6559\u7814\u8d44\u6599\u8fdb\u884c\u5f52\u7c7b\u5206\u6790\uff0c\u63d0\u70bc\u76f8\u5173\u6559\u7814\u6210\u679c\uff0c\u79ef\u6781\u53c2\u4e0e\u7701\u3001\u5e02\u4e24\u7ea7\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u8bba\u6587\u8bc4\u5ba1\u548c\u8bfe\u9898\u8bc4\u5ba1\uff0c\u786e\u4fdd\u6559\u7814\u6210\u679c\u80fd\u591f\u76f4\u63a5\u5e94\u7528\u4e8e\u6559\u5b66\u5b9e\u8df5\uff0c\u63a8\u52a8\u5b66\u6821\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u6539\u9769\u4e0e\u521b\u65b0\u3002\n\n\u9644\u4ef6\uff1a1.\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\u8bfe\u65f6\u6559\u5b66\u5907\u8bfe\u53c2\u8003\u683c\u5f0f\uff082025\u5e74\u7248\uff09\n\n2.\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\u6559\u5e08\u6559\u5b66\u5e38\u89c4\u8fc7\u7a0b\u6307\u5bfc\u53cd\u9988\u8868\uff082025\u5e74\u7248\uff09\n\n\u9644\u4ef61\n\n\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\u8bfe\u65f6\u6559\u5b66\u5907\u8bfe\u53c2\u8003\u683c\u5f0f\uff082025\u5e74\u7248\uff09\n\n|   |   |   |   |\n|---|---|---|---|\n|\u8bfe\u9898||\u8bfe\u65f6|\u7b2c \u8bfe\u65f6|\n|\u6559\u6750\u5206\u6790|\u300a\u4eba\u00b7\u81ea\u7136\u00b7\u793e\u4f1a\u300b(2024\u7248)\u6216\u300a\u8bdd\u8bf4\u6e29\u5dde\u300b(2023\u7248)\u6559\u6750\u4e2d\u7684\u67d0\u4e00\u8282\u8bfe|   |   |\n|\u5b66\u60c5\u5206\u6790|\u9488\u5bf9\u672c\u8bfe\u6559\u5b66\u5185\u5bb9,\u5206\u6790\u73ed\u7ea7\u5b66\u751f\u7684\u5b66\u4e60\u8d77\u70b9\u548c\u8bfe\u7a0b\u5185\u5bb9\u7684\u5b66\u4e60\u5174\u8da3,\u9884\u5224\u5b66\u751f\u7684\u5b66\u4e60\u96be\u70b9|   |   |\n|\u5b66\u4e60\u76ee\u6807\u4e0e\u91cd\u96be\u70b9|\u5b66\u4e60\u76ee\u6807\u4e0e\u91cd\u96be\u70b9|   |\u76ee\u6807\u8fbe\u6210(\u2713)|\n|\u53c2\u7167\u6d59\u6c5f\u7701\u57fa\u7840\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b(\u901a\u7528\u5185\u5bb9)\u6807\u51c6,\u4f9d\u636e\u5b66\u60c5\u786e\u5b9a\u8bfe\u65f6\u6559\u5b66\u76ee\u6807,\u505a\u5230\u51c6\u786e\u3001   subjectPanels: document.getElementById('subjectPanels'),
  currentTitle: document.getElementById('currentTitle'),
  heroTitle: document.getElementById('heroTitle'),
  scrollContainer: document.getElementById('scrollContainer'),
  themeToggle: document.getElementById('themeToggle'),
  themeLink: document.getElementById('dark-theme'),
  toast: document.getElementById('toast'),
  globalSearch: document.getElementById('globalSearch'),
  searchBtn: document.getElementById('searchBtn'),
  searchModal: document.getElementById('searchModal'),
  closeSearch: document.getElementById('closeSearch'),
  searchResults: document.getElementById('searchResults'),
};

let app = {
  mdAll: '',
  mdBySubject: new Map(),
  navBySubject: new Map(),     // Stores tab structure { tabs: [], allIds: Set }
  sectionsBySubject: new Map(), // Stores rendered HTML chunks { [id]: html }
  activeSubject: 'management',
  activeSection: null,
};

function showToast(message) {
  if (!els.toast) return;
  els.toast.textContent = message;
  els.toast.hidden = false;
  window.clearTimeout(showToast._t);
  showToast._t = window.setTimeout(() => {
    els.toast.hidden = true;
  }, 2400);
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function normalizeRoutePart(s) {
  return (s || '').replace(/^#+/, '').trim();
}

function parseRoute() {
  const raw = normalizeRoutePart(location.hash);
  if (!raw || raw === '/') return { subject: null, section: null };
  const parts = raw.split('/').filter(Boolean);
  return { subject: parts[0] || null, section: parts[1] || null };
}

function setRoute(subject, section) {
  const seg = section ? `#/${subject}/${section}` : `#/${subject}`;
  if (location.hash !== seg) location.hash = seg;
}

function validateRoute(route) {
  const subject = route.subject && SUBJECTS.some((s) => s.key === route.subject) ? route.subject : null;
  if (!subject) return { subject: 'management', section: null, reason: 'invalid-subject' };
  const nav = app.navBySubject.get(subject);
  if (!nav) return { subject, section: null, reason: 'nav-not-ready' };
  
  // 'full' is always valid
  if (route.section === 'full') return { subject, section: 'full', reason: null };
  
  if (!route.section) return { subject, section: nav.tabs?.[0]?.id || null, reason: null };
  
  const ok = nav.allIds.has(route.section);
  if (!ok) return { subject, section: nav.tabs?.[0]?.id || null, reason: 'invalid-section' };
  return { subject, section: route.section, reason: null };
}

function initTheme() {
  const saved = localStorage.getItem('wztr_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === 'dark' || (!saved && prefersDark)) setTheme(true);
  else setTheme(false);
  els.themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    setTheme(!isDark);
  });
}

function setTheme(isDark) {
  if (isDark) {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('wztr_theme', 'dark');
    els.themeToggle.textContent = '日间';
    if (els.themeLink) els.themeLink.media = 'all';
  } else {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('wztr_theme', 'light');
    els.themeToggle.textContent = '夜间';
    if (els.themeLink) els.themeLink.media = 'not all';
  }
}

async function loadSourceMd() {
  // If MD is already embedded (for single file mode), use it
  if (window.__MD_CONTENT__) return window.__MD_CONTENT__;
  
  const url = new URL('./温州市初中教学常规（2025年版）.md', location.href);
  const res = await fetch(url.toString(), { cache: 'force-cache' });
  if (!res.ok) throw new Error('无法加载原文 MD');
  const txt = await res.text();
  return txt.replace(/\r\n/g, '\n');
}

function indexOfHeading(md, headingText) {
  const norm = s => s.replace(/[（(]/g, '(').replace(/[）)]/g, ')').trim();
  const needle = `# ${norm(headingText)}`;
  const lines = md.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#')) {
      if (norm(line) === needle) {
        return md.indexOf(lines[i]);
      }
    }
  }
  const alt = `# ${headingText.replace(/（/g, '(').replace(/）/g, ')')}`;
  const idx = md.indexOf(alt);
  if (idx >= 0) return idx;
  const alt2 = `# ${headingText.replace(/\(/g, '（').replace(/\)/g, '）')}`;
  return md.indexOf(alt2);
}

function buildSubjectMdMap(mdAll) {
  const mdBy = new Map();
  const positions = [];
  SUBJECTS.forEach((s) => {
    if (!s.header) return;
    const idx = indexOfHeading(mdAll, s.header);
    if (idx >= 0) positions.push({ key: s.key, idx });
  });
  positions.sort((a, b) => a.idx - b.idx);
  for (let i = 0; i < positions.length; i++) {
    const start = positions[i].idx;
    const end = i + 1 < positions.length ? positions[i + 1].idx : mdAll.length;
    mdBy.set(positions[i].key, mdAll.slice(start, end).trim());
  }
  return mdBy;
}

function cleanHeadingText(text) {
  let t = (text || '').replace(/^——\s*/, '').replace(/\s*——$/, '').trim();
  t = t.replace(/^(\d+\.|[一二三四五六七八九十]+、)\s+/, '$1 ');
  return t;
}

function getHeadingLevel(text) {
  const t = cleanHeadingText(text);
  if (LEVEL1_TABS.some(k => t.includes(k))) return 2; 
  if (/^[一二三四五六七八九十]+、/.test(t)) return 3;
  if (/^[（(][一二三四五六七八九十]+[）)]/.test(t)) return 4;
  if (/^\d+\./.test(t)) return 4;
  return 3;
}

function mdToBlocks(md) {
  const lines = (md || '').split('\n');
  const blocks = [];
  let i = 0;
  const pushPara = (buf) => {
    const raw = buf.join('\n');
    if (!raw.trim()) return;
    const cleaned = raw.replace(/^(\d+\.|[一二三四五六七八九十]+、)\s+/, '$1 ');
    blocks.push({ type: 'p', text: cleaned });
  };
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith('# ')) {
      blocks.push({ type: 'h', text: line.slice(2) });
      i += 1;
      continue;
    }
    if (/^\|/.test(line) && lines[i + 1] && /^\|\s*---/.test(lines[i + 1])) {
      const tableLines = [line, lines[i + 1]];
      i += 2;
      while (i < lines.length && /^\|/.test(lines[i])) {
        tableLines.push(lines[i]);
        i += 1;
      }
      blocks.push({ type: 'table', lines: tableLines });
      continue;
    }
    if (!line.trim()) {
      i += 1;
      continue;
    }
    const buf = [];
    while (
      i < lines.length &&
      lines[i].trim() !== '' &&
      !lines[i].startsWith('# ') &&
      !(/^\|/.test(lines[i]) && lines[i + 1] && /^\|\s*---/.test(lines[i + 1]))
    ) {
      buf.push(lines[i]);
      i += 1;
    }
    pushPara(buf);
  }
  return blocks;
}

function parseTable(tableLines) {
  const rows = tableLines
    .filter((l) => l.trim().startsWith('|'))
    .map((l) => l.trim())
    .map((l) => l.replace(/^\|/, '').replace(/\|$/, '').split('|').map((c) => c.trim()));
  if (rows.length < 2) return null;
  return { header: rows[0], body: rows.slice(2) };
}

function makeId(subjectKey, text, salt) {
  const base = `${subjectKey}-${text}-${salt}`;
  let h = 2166136261;
  for (let i = 0; i < base.length; i++) {
    h ^= base.charCodeAt(i);
    h = (h * 16777619) >>> 0;
  }
  return `${subjectKey}-${h.toString(16)}`;
}

// Logic to group attachments and build nav
function buildNavFromBlocks(subjectKey, blocks) {
  const tabs = [];
  const allIds = new Set();
  const seenTitles = new Set();
  let hasAttachments = false;
  
  // First pass: identify attachments and normal tabs
  blocks.forEach((b, idx) => {
    if (b.type !== 'h') return;
    const title = cleanHeadingText(b.text);
    const isAttachment = title.includes('附件') || title.includes('附录');
    
    if (isAttachment) {
      hasAttachments = true;
      return;
    }

    const level = getHeadingLevel(b.text);
    if (level !== 2) return;
    if (seenTitles.has(title)) return;
    
    seenTitles.add(title);
    const id = makeId(subjectKey, title, idx);
    tabs.push({ id, title });
    allIds.add(id);
  });

  // If attachments exist, add a single consolidated tab
  if (hasAttachments) {
    const attId = `${subjectKey}-attachments`;
    tabs.push({ id: attId, title: '附件' });
    allIds.add(attId);
  }
  
  return { tabs, allIds };
}

function renderSubjects() {
  els.subjectNav.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'directory-list';
  SUBJECTS.forEach((s) => {
    const btn = document.createElement('button');
    btn.className = 'directory-btn';
    btn.type = 'button';
    btn.setAttribute('aria-label', `切换到${s.title}`);
    btn.setAttribute('aria-current', s.key === app.activeSubject ? 'page' : 'false');
    btn.innerHTML = `<span class="t">${escapeHtml(s.title)}</span>`;
    btn.addEventListener('click', () => setRoute(s.key, null));
    list.appendChild(btn);
  });
  els.subjectNav.appendChild(list);
}

function renderSubnavTabs(subjectKey) {
  els.subnavTabs.innerHTML = '';
  els.subnavMenu.innerHTML = '';
  els.subnavMenu.hidden = true;
  els.subnavMoreBtn.setAttribute('aria-expanded', 'false');

  const nav = app.navBySubject.get(subjectKey);
  const tabs = nav?.tabs || [];
  
  // Add "Full View" tab at the beginning or end? User said "Add global preview".
  // Let's add it at the end for now, or beginning? 
  // "Click subject -> then click sub-directory... then interface displays ONLY content".
  // "Navbar adds a global preview".
  const allTabs = [...tabs, { id: 'full', title: '全文预览' }];

  allTabs.forEach((t) => {
    const btn = document.createElement('button');
    btn.className = 'subnavTab';
    btn.type = 'button';
    btn.textContent = t.title;
    btn.dataset.section = t.id;
    btn.setAttribute('aria-current', t.id === app.activeSection ? 'true' : 'false');
    btn.addEventListener('click', () => setRoute(subjectKey, t.id));
    els.subnavTabs.appendChild(btn);

    const mi = document.createElement('button');
    mi.className = 'subnavMenuItem';
    mi.type = 'button';
    mi.role = 'menuitem';
    mi.textContent = t.title;
    mi.addEventListener('click', () => {
      els.subnavMenu.hidden = true;
      els.subnavMoreBtn.setAttribute('aria-expanded', 'false');
      setRoute(subjectKey, t.id);
    });
    els.subnavMenu.appendChild(mi);
  });

  // Overflow handling
  if (!renderSubnavTabs._wired) {
    renderSubnavTabs._wired = true;
    els.subnavMoreBtn.addEventListener('click', () => {
      const open = els.subnavMenu.hidden === false;
      els.subnavMenu.hidden = open;
      els.subnavMoreBtn.setAttribute('aria-expanded', open ? 'false' : 'true');
    });
    document.addEventListener(
      'click',
      (e) => {
        if (!els.subnavMenu || els.subnavMenu.hidden) return;
        const t = e.target;
        if (t === els.subnavMoreBtn || els.subnavMenu.contains(t)) return;
        els.subnavMenu.hidden = true;
        els.subnavMoreBtn.setAttribute('aria-expanded', 'false');
      },
      { capture: true }
    );
  }

  window.requestAnimationFrame(() => {
    const overflow = els.subnavTabs.scrollWidth > els.subnavTabs.clientWidth + 4;
    els.subnavMoreBtn.style.display = overflow ? 'inline-flex' : 'none';
  });
}

function emphasizeText(htmlText) {
  let out = htmlText;
  KEYWORDS_BOLD.forEach((k) => {
    const re = new RegExp(k, 'g');
    out = out.replace(re, `<strong>${k}</strong>`);
  });
  return out;
}

// Pre-render content into chunks
function renderSubjectContent(subjectKey) {
  const md = app.mdBySubject.get(subjectKey) || '';
  const blocks = mdToBlocks(md);
  const nav = buildNavFromBlocks(subjectKey, blocks);
  
  app.navBySubject.set(subjectKey, { ...nav, allIds: new Set(nav.allIds) });

  const sectionsMap = new Map();
  let currentId = nav.tabs[0]?.id || makeId(subjectKey, '首页', 0);
  let currentHtml = [];
  
  // Default first section (Home) if no explicit header starts it
  if (!nav.tabs.length) {
     app.navBySubject.set(subjectKey, { tabs: [{id: currentId, title: '首页'}], allIds: new Set([currentId]) });
  }

  // Helper to save current buffer to map
  const saveBuffer = () => {
    if (currentHtml.length > 0) {
      const existing = sectionsMap.get(currentId) || '';
      sectionsMap.set(currentId, existing + currentHtml.join(''));
    }
    currentHtml = [];
  };

  blocks.forEach((b, idx) => {
    if (b.type === 'h') {
      const title = cleanHeadingText(b.text);
      const level = getHeadingLevel(b.text);
      
      // Check if this header triggers a tab switch
      // 1. Exact match to a tab title
      const matchedTab = nav.tabs.find(t => t.title === title);
      // 2. Or it is an attachment and we have an attachments tab
      const isAttachment = title.includes('附件') || title.includes('附录');
      
      if (matchedTab) {
        saveBuffer();
        currentId = matchedTab.id;
        currentHtml.push(`<h2 class="doc-heading" data-level="2">${escapeHtml(title)}</h2>`);
        return;
      } else if (isAttachment) {
        saveBuffer();
        // Switch to attachments tab ID
        currentId = `${subjectKey}-attachments`;
        currentHtml.push(`<h2 class="doc-heading" data-level="2">${escapeHtml(title)}</h2>`);
        return;
      }
      
      // Otherwise just a normal heading in current section
      if (level === 2) {
         // If it's level 2 but not a tab (shouldn't happen with buildNav logic, but safe fallback)
         // We just render it.
         currentHtml.push(`<h2 class="doc-heading" data-level="2">${escapeHtml(title)}</h2>`);
      } else if (level === 3) {
        currentHtml.push(`<h3 class="doc-heading" data-level="3">${escapeHtml(title)}</h3>`);
      } else {
        currentHtml.push(`<h4 class="doc-heading" data-level="4">${escapeHtml(title)}</h4>`);
      }
      return;
    }

    if (b.type === 'p') {
      const important = /应|必须|严禁|不得/.test(b.text);
      const text = emphasizeText(escapeHtml(b.text));
      currentHtml.push(`<p class="${important ? 'highlight-border' : ''}">${text}</p>`);
      return;
    }

    if (b.type === 'table') {
      const t = parseTable(b.lines);
      if (t) currentHtml.push(buildTableHtml(t, subjectKey));
    }
  });

  saveBuffer(); // Save last chunk
  app.sectionsBySubject.set(subjectKey, sectionsMap);
}

function buildTableHtml(table, subjectKey) {
  const colCount = Math.max(table.header.length, ...table.body.map((r) => r.length));
  const header = table.header.slice();
  while (header.length < colCount) header.push('');
  let colGroup = '<colgroup>';
  for (let i = 0; i < colCount; i++) colGroup += '<col style="width: 180px">';
  colGroup += '</colgroup>';

  let thead = '<thead><tr>';
  for (let i = 0; i < colCount; i++) {
    const cell = escapeHtml(header[i] || '');
    thead += `<th scope="col">${cell}</th>`;
  }
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  for (const row of table.body) {
    const r = row.slice();
    while (r.length < colCount) r.push('');
    tbody += '<tr>';
    for (const raw of r) {
      const v = raw || '';
      tbody += `<td>${escapeHtml(v)}</td>`;
    }
    tbody += '</tr>';
  }
  tbody += '</tbody>';

  return `<div class="tableBlock"><div class="tableToolbar"><span class="badge">表格</span><div style="font-size:12px;color:var(--muted)">可横向滚动</div></div><div class="tableWrap" tabindex="0"><table class="regTable">${colGroup}${thead}${tbody}</table></div></div>`;
}

// Display the content based on active section
function updateContentArea() {
  const subjectKey = app.activeSubject;
  const sectionsMap = app.sectionsBySubject.get(subjectKey);
  if (!sectionsMap) return;

  const sectionId = app.activeSection;
  
  if (sectionId === 'full') {
    // Join all sections
    const nav = app.navBySubject.get(subjectKey);
    let fullHtml = '';
    // Use tabs order to reconstruct
    nav.tabs.forEach(t => {
      const html = sectionsMap.get(t.id) || '';
      fullHtml += `<section class="cardSection" id="${t.id}"><div class="card doc">${html}</div></section>`;
    });
    els.subjectPanels.innerHTML = `<div class="contentStage">${fullHtml}</div>`;
  } else {
    // Single section
    const html = sectionsMap.get(sectionId) || '<p>暂无内容</p>';
    els.subjectPanels.innerHTML = `<div class="contentStage"><section class="cardSection" id="${sectionId}"><div class="card doc">${html}</div></section></div>`;
  }
  
  // Scroll to top
  els.scrollContainer.scrollTop = 0;
  
  // Highlight subnav
  Array.from(els.subnavTabs.querySelectorAll('.subnavTab')).forEach((b) => {
    b.setAttribute('aria-current', b.dataset.section === sectionId ? 'true' : 'false');
  });
}

function applyActiveSubject(subjectKey, desiredSection) {
  app.activeSubject = subjectKey;
  const subject = SUBJECTS.find((s) => s.key === subjectKey);
  els.currentTitle.textContent = subject?.title || subjectKey;
  els.heroTitle.textContent = subject?.title || subjectKey;
  renderSubjects();

  // Process MD if not done
  if (!app.sectionsBySubject.has(subjectKey)) {
    renderSubjectContent(subjectKey);
  }

  const nav = app.navBySubject.get(subjectKey);
  // Default to first tab
  const fallback = nav?.tabs?.[0]?.id || 'full';
  app.activeSection = desiredSection && (nav?.allIds?.has(desiredSection) || desiredSection === 'full') ? desiredSection : fallback;
  
  renderSubnavTabs(subjectKey);
  updateContentArea();
}

function onRouteChange() {
  const raw = parseRoute();
  const v = validateRoute(raw);
  
  if (v.reason === 'invalid-subject') showToast('无效科目链接');
  
  if (v.subject !== raw.subject || v.section !== raw.section) {
    setRoute(v.subject, v.section);
    return;
  }

  const subjectChanged = v.subject !== app.activeSubject;
  if (subjectChanged) {
    applyActiveSubject(v.subject, v.section);
  } else {
    // Same subject, different section
    app.activeSection = v.section;
    renderSubnavTabs(v.subject); // Update active state visually (though logic is in updateContentArea too, but tab list might need refresh if changed? No, just highlight)
    updateContentArea();
  }
}

function wireSearch() {
  els.searchBtn.addEventListener('click', () => {
    const q = (els.globalSearch.value || '').trim();
    if (!q) return;
    const md = app.mdBySubject.get(app.activeSubject) || '';
    const lines = md.split('\n');
    const res = [];
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes(q)) {
        res.push({ line: i + 1, ctx: lines[i] });
        if (res.length >= 30) break;
      }
    }
    els.searchResults.innerHTML = res.map((r) => `<div class="card" style="padding:10px;margin:10px 0;">第${r.line}行：${escapeHtml(r.ctx)}</div>`).join('');
    els.searchModal.setAttribute('open', '');
  });
  els.closeSearch.addEventListener('click', () => els.searchModal.removeAttribute('open'));
}

async function main() {
  initTheme();
  wireSearch();
  renderSubjects();

  try {
    app.mdAll = await loadSourceMd();
    const mdBy = buildSubjectMdMap(app.mdAll);
    app.mdBySubject = mdBy;
    
    // Initial Route
    window.addEventListener('hashchange', onRouteChange);
    if (!location.hash) setRoute('management', null);
    else onRouteChange();
  } catch (e) {
    showToast('加载失败');
    els.subjectPanels.innerHTML = `<div style="padding:20px;color:red">${escapeHtml(String(e))}</div>`;
  }
}

document.addEventListener('DOMContentLoaded', main);

    </script>
