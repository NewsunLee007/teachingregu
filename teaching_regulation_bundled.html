<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>温州市初中教学常规（2025）</title>
  <style>
:root {
  --bg: #F9FAFB;
  --paper: #FFFFFF;
  --ink: #1F2328;
  --muted: #656D76;
  --border: #D0D7DE;
  --accent: #0969DA;
  --accent-2: #0550AE;
  --highlight-bg: #FFF8C5;
  --highlight-border: #D29922;
  --focus: rgba(9, 105, 218, 0.3);
  --shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
  --radius: 6px;
  
  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
  --font-serif: "Songti SC", "Noto Serif SC", serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;

  --h1-size: 32px;
  --h2-size: 24px;
  --h3-size: 20px;
  --h4-size: 16px;
  --h5-size: 14px;
  --h6-size: 14px;

  --h1-color: #1F2328;
  --h2-color: #1F2328;
  --h3-color: #1F2328;
  --h4-color: #1F2328;
  --h5-color: #1F2328;
  --h6-color: #656D76;

  --topbar-h: 56px;
  --subnav-h: 44px;
  
  --sidebar-w: 200px;
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

button, input, select { font: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: -1px; border-radius: 4px; }

/* Layout */
.layout { display: flex; height: 100%; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  flex: 0 0 var(--sidebar-w);
  background: #F6F8FA;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
}

.brand {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.brand h1 {
  margin: 0;
  font-family: var(--font-sans);
  font-weight: 600;
  line-height: 1.25;
  color: var(--h1-color);
  font-size: 18px;
}
.brand p {
  margin: 4px 0 0 0;
  color: var(--muted);
  font-size: 12px;
}

/* Directory/Nav */
.directory {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.directory-list { display: flex; flex-direction: column; gap: 2px; }

.directory-btn {
  width: 100%;
  text-align: left;
  border: none;
  background: transparent;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  color: var(--ink);
  font-size: 14px;
  font-weight: 400;
}
.directory-btn:hover { background: rgba(208, 215, 222, 0.32); }
.directory-btn[aria-current="page"] {
  background: #E5EFFC; /* Slightly bluer for active */
  color: var(--accent);
  font-weight: 600;
  box-shadow: inset 3px 0 0 var(--accent); /* Left border indicator */
  border-radius: 0 6px 6px 0; /* Align left edge */
  margin-left: -8px;
  padding-left: 18px;
}

/* Main Area */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; background: var(--paper); }

.topbar {
  height: var(--topbar-h);
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 90;
}
.crumb { color: var(--ink); font-weight: 600; font-size: 16px; }

.top-actions { display: flex; gap: 8px; align-items: center; }

.search {
  display: flex; align-items: center; gap: 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  background: var(--bg);
  width: 220px;
}
.search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.search input { border: none; outline: none; background: transparent; flex: 1; min-width: 0; color: var(--ink); font-size: 13px; }

.btn {
  border: 1px solid var(--border);
  background: #F6F8FA;
  border-radius: 6px;
  padding: 4px 12px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
  font-weight: 500; color: var(--ink); font-size: 13px;
  box-shadow: 0 1px 0 rgba(27,31,36,0.04);
  transition: 0.2s cubic-bezier(0.3, 0, 0.5, 1);
  transition-property: background-color, border-color;
}
.btn:hover { background-color: #F3F4F6; border-color: #8C959F; }

/* Subnav Bar (Top Tabs) */
.subnavBar{
  position: sticky;
  top: 0; /* Reset since topbar is separate or handled differently? No, keep layout */
  z-index: 80;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  height: 48px; /* Fixed height for compactness */
}
.subnavTabs{
  display: flex;
  align-items: center;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none; /* Hide scrollbar */
  flex: 1;
  height: 100%;
}
.subnavTabs::-webkit-scrollbar { display: none; }

.subnavTab{
  border: none;
  background: transparent;
  padding: 4px 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  border-radius: 6px;
  transition: all 0.1s;
  height: 32px; /* Compact */
}
.subnavTab:hover {
  background-color: rgba(0,0,0,0.04);
  color: var(--ink);
}
.subnavTab[aria-current="true"]{ 
  color: var(--ink);
  background-color: #F0F2F4; /* Distinct gray background for active */
  font-weight: 600;
  position: relative;
}
.subnavTab[aria-current="true"]::after {
  content: '';
  position: absolute;
  bottom: -9px; /* Align with container border */
  left: 0;
  right: 0;
  height: 2px;
  background: #FD8C73; /* Orange accent line for visibility */
  border-radius: 2px 2px 0 0;
}

/* Reader Styles (Optimized Text) */
.reader {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px 80px; /* Reduced padding */
  background: var(--paper);
}
.page { max-width: 1000px; margin: 0 auto; }

.hero {
  text-align: left;
  margin: 0 0 32px 0;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.hero p { margin: 0; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.hero h1 { margin: 8px 0 0 0; font-size: 28px; font-weight: 600; color: var(--h1-color); }

/* Document Typography */
.doc h1, .doc h2, .doc h3, .doc h4, .doc h5 {
  margin-top: 24px;
  margin-bottom: 16px;
  font-weight: 600;
  line-height: 1.4;
}
.doc h2 { 
  font-size: 24px; 
  padding-bottom: 8px; 
  border-bottom: 1px solid var(--border); 
  color: var(--h1-color);
}
.doc h3 { font-size: 18px; color: var(--h2-color); margin-top: 20px; }
.doc h4 { font-size: 16px; font-weight: 600; }

.doc p {
  text-indent: 2em;
  margin-bottom: 16px;
  text-align: justify;
  font-size: 16px;
  color: var(--ink);
  line-height: 1.8;
}

/* Simplified Layout (No Cards) */
.cardSection{
  margin: 0;
  padding: 0;
}
.cardSection .card{
  box-shadow: none;
  border: none;
  background: transparent;
  border-radius: 0;
  padding: 0;
}

/* Transitions */
.contentStage{
  opacity: 1;
  transition: opacity 0.15s ease;
}
.contentStage.is-switching{
  opacity: 0.4;
}

/* Skeleton */
.skeletonCard{
  border: none;
  background: transparent;
  box-shadow: none;
  padding: 0;
}
.skeletonLine{
  height: 16px;
  border-radius: 4px;
  background: rgba(175, 184, 193, 0.2);
  margin: 12px 0;
}

/* Toast */
.toast{
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%);
  background: rgba(17, 18, 19, 0.92);
  color: #fff;
  border-radius: 10px;
  padding: 10px 14px;
  box-shadow: var(--shadow);
  z-index: 500;
  max-width: min(520px, calc(100vw - 24px));
}

/* Modals */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 300; opacity: 0; transition: opacity 0.2s; }
.modal[open] { display: flex; opacity: 1; }
.card { background: var(--paper); border-radius: 12px; box-shadow: var(--shadow); max-width: 600px; width: 90%; max-height: 90vh; overflow: auto; padding: 24px; }

/* Key Content Highlights */
.highlight-bg { background-color: var(--highlight-bg); padding: 0 2px; }
.highlight-border { 
  /* Minimal indication */
  color: var(--ink);
  font-weight: 500;
}
strong { font-weight: 600; color: var(--ink); }

/* Table Styles */
.tableBlock { margin: 24px 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.tableToolbar { padding: 8px 12px; background: #F6F8FA; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.regTable th { background: #F6F8FA; font-weight: 600; color: var(--ink); font-size: 13px; }
.regTable td { font-size: 14px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .topbar { padding: 0 12px; }
  .subnavBar{ padding: 0 12px; }
  .reader { padding: 16px; }
}

/* Dark Mode */
html[data-theme="dark"] {
  --bg: #010409;
  --paper: #0D1117;
  --ink: #E6EDF3;
  --muted: #848D97;
  --border: #30363D;
  --accent: #2F81F7;
  --highlight-bg: rgba(187, 128, 9, 0.15);
  --focus: rgba(47, 129, 247, 0.4);
}
html[data-theme="dark"] .sidebar { background: #010409; }
html[data-theme="dark"] .directory-btn[aria-current="page"] { background: rgba(56, 139, 253, 0.1); color: #4493F8; box-shadow: inset 3px 0 0 #4493F8; }
html[data-theme="dark"] .subnavTab[aria-current="true"] { background: rgba(110, 118, 129, 0.4); color: #F0F6FC; }
html[data-theme="dark"] .subnavTab[aria-current="true"]::after { background: #F78166; }
</style>

  }

html[data-theme="dark"] .topbar{

}

html[data-theme="dark"] .directory-btn{
  color:#E0E0E0;
  opacity:1;
}

html[data-theme="dark"] .directory-btn[aria-current="page"],
html[data-theme="dark"] .directory-btn[aria-selected="true"]{
  color:#FFFFFF;
  opacity:1;
}

html[data-theme="dark"] .btn,
html[data-theme="dark"] .search,
html[data-theme="dark"] .subnavBar{
  background: var(--paper);
}

html[data-theme="dark"] .subnavTab{
  color: #E0E0E0;
}

html[data-theme="dark"] .subnavTab[aria-current="true"]{
  color: #FFFFFF;
}

@media (prefers-color-scheme: dark){
  html:not([data-theme]) .topbar{
    background: var(--paper);
  }
  html:not([data-theme]) .directory-btn{
    color:#E0E0E0;
    opacity:1;
  }
  html:not([data-theme]) .directory-btn[aria-current="page"],
  html:not([data-theme]) .directory-btn[aria-selected="true"]{
    color:#FFFFFF;
    opacity:1;
  }
  html:not([data-theme]) .btn,
  html:not([data-theme]) .search,
  html:not([data-theme]) .subnavBar{
    background: var(--paper);
  }

  html:not([data-theme]) .subnavTab{
    color: #E0E0E0;
  }

  html:not([data-theme]) .subnavTab[aria-current="true"]{
    color: #FFFFFF;
  }
}
</style>
</head>

    window.__MD_CONTENT__ = "# \u6e29\u5dde\u5e02\u521d\u4e2d\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09\n\n# \u76ee\u5f55\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u8bfe\u7a0b\u6559\u5b66\u7ba1\u7406\u6307\u5f15\uff082025\u5e74\u7248\uff09\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248)\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u6570\u5b66\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09 26\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u82f1\u8bed\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09 44\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u79d1\u5b66\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09 62\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u9053\u5fb7\u4e0e\u6cd5\u6cbb\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09 81\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u5386\u53f2\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09 99\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u5730\u7406\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248) 119\n\n\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u97f3\u4e50\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248) \u2026 140\n\n\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u4f53\u80b2\u4e0e\u5065\u5eb7\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248) 153\n\n\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u7f8e\u672f\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248) \u2026 163\n\n\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u4fe1\u606f\u79d1\u6280\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248) \u2026 175\n\n\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u52b3\u52a8\u3001\u7efc\u5408\u5b9e\u8df5\u6d3b\u52a8\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248) \u2026 187\n\n\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u5730\u65b9\u8bfe\u7a0b\u6559\u5b66\u5e38\u89c4(2025\u5e74\u7248) \u2026 197\n\n\u9644\u5f55\n\n\u91cd\u8981\u6587\u4ef6\u5b66\u4e60\u76ee\u5f55\u00b7 205\n\n# \u6e29\u5dde\u5e02\u521d\u4e2d\u8bfe\u7a0b\u6559\u5b66\u7ba1\u7406\u6307\u5f15\uff082025\u5e74\u7248\uff09\n\n\u6839\u636e\u300a\u6559\u80b2\u5f3a\u56fd\u5efa\u8bbe\u89c4\u5212\u7eb2\u8981(2024\u20142035\u5e74)\u300b\u7cbe\u795e\uff0c\u843d\u5b9e2022\u5e74\u7248\u300a\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u65b9\u6848\u300b\u548c\u5404\u5b66\u79d1\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u6807\u51c6\u7406\u5ff5\uff0c\u7ed3\u5408\u300a\u6d59\u6c5f\u7701\u4e49\u52a1\u6559\u80b2\u5b66\u6821\u6559\u5b66\u7ba1\u7406\u6307\u5357\uff082021\u5e74\u7248\uff09\u300b\u548c\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u5b9e\u65bd\u529e\u6cd5\u300b\u8981\u6c42\uff0c\u6709\u6548\u843d\u5b9e\u6e29\u5dde\u5e02\u521d\u4e2d\u5404\u5b66\u79d1\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09\uff0c\u4fc3\u8fdb\u521d\u4e2d\u6559\u5b66\u8fc7\u7a0b\u6027\u6307\u5bfc\u4e0e\u7ba1\u7406\uff0c\u6df1\u5316\u8bfe\u7a0b\u6559\u5b66\u6539\u9769\uff0c\u7279\u5236\u5b9a\u6e29\u5dde\u5e02\u521d\u4e2d\u8bfe\u7a0b\u6559\u5b66\u7ba1\u7406\u6307\u5f15\uff0c\u53bf\uff08\u5e02\u3001\u533a\uff09\u7ed3\u5408\u533a\u57df\u5b9e\u9645\u5236\u5b9a\u7ba1\u7406\u7ec6\u5219\u3002\n\n\u4e00\u3001\u5f00\u9f50\u5f00\u8db3\u8bfe\u7a0b\u3002\u6839\u636e\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u5b9e\u65bd\u529e\u6cd5\uff08\u8bd5\u884c\uff09\u300b\uff0c\u5b66\u6821\u6210\u7acb\u8bfe\u7a0b\u7ba1\u7406\u59d4\u5458\u4f1a\u3002\u7ed3\u5408\u6821\u60c5\u7814\u5236\u5b66\u6821\u8bfe\u7a0b\u5b9e\u65bd\u65b9\u6848\uff0c\u505a\u5230\u201c\u4e00\u6821\u4e00\u6848\u201d\uff0c\u786e\u4fdd\u5f00\u9f50\u5f00\u8db3\u8bfe\u7a0b\uff0c\u8bfe\u7a0b\u540d\u79f0\u8981\u89c4\u8303\uff08\u4e0d\u5199\u7b80\u79f0\uff09\uff0c\u5b9e\u65bd\u65b9\u6848\u201c\u4e00\u5e74\u4e00\u4f18\u5316\u201d\u3002\u5b9e\u65bd\u5b66\u751f\u4f53\u8d28\u5f3a\u5065\u8ba1\u5212\uff0c\u786e\u4fdd\u6bcf\u5929\u4e00\u8282\u4f53\u80b2\u8bfe\uff08\u4f53\u80b2\u6d3b\u52a8\u8bfe\uff09\uff0c\u6bcf\u5929\u7efc\u5408\u4f53\u80b2\u6d3b\u52a8\u65f6\u95f4\u4e0d\u4f4e\u4e8e2\u5c0f\u65f6\uff0c\u5b66\u6821\u6bcf\u5b66\u5e74\u6839\u636e\u5b9e\u65bd\u60c5\u51b5\u8c03\u6574\u4f18\u5316\u8bfe\u7a0b\u5b9e\u65bd\u65b9\u6848\uff0c\u62a5\u4e3b\u7ba1\u6559\u80b2\u884c\u653f\u90e8\u95e8\u5907\u6848\uff0c\u7ecf\u5ba1\u6838\u901a\u8fc7\u540e\u5b9e\u65bd\u3002\n\n\u4e8c\u3001\u4f18\u5316\u8bfe\u7a0b\u5b9e\u65bd\u3002\u79d1\u5b66\u89c4\u8303\u5b89\u6392\u5b66\u751f\u5728\u6821\u4f5c\u606f\u65f6\u95f4\u8868\u3001\u5b66\u6821\u8bfe\u7a0b\u8868\u3001\u6559\u5e08\u6388\u8bfe\u8868\u548c\u73ed\u7ea7\u529f\u8bfe\u8868\u3002\u52a0\u5f3a\u5bf9\u6bcf\u4e2a\u73ed\u7ea7\u7684\u8bfe\u7a0b\u5f00\u8bbe\u3001\u8bfe\u65f6\u4fdd\u969c\u5e38\u6001\u5316\u5de1\u89c6\uff0c\u5b9a\u671f\u8d70\u8bbf\u5b66\u751f\u4e86\u89e3\u5f00\u8bfe\u662f\u5426\u6b63\u5e38\u3002\u53bf\u7ea7\u6559\u80b2\u884c\u653f\u548c\u6559\u7814\u90e8\u95e8\u6bcf\u5b66\u5e74\u81f3\u5c11\u8c03\u78141\u6b21\u5b66\u6821\u8bfe\u7a0b\u5b9e\u65bd\u60c5\u51b5\uff0c\u53d1\u73b0\u95ee\u9898\u53ca\u65f6\u7ea0\u6b63\u3002\n\n\u4e09\u3001\u5f3a\u5316\u5907\u8bfe\u7ba1\u7406\u3002\u5b66\u6821\u6839\u636e\u6559\u5e08\u7684\u6559\u9f84\u3001\u5c42\u6b21\u3001\u5b66\u79d1\u7279\u70b9\u8bbe\u7f6e\u5907\u8bfe\u8981\u6c42\uff0c\u5176\u4e2d\u6559\u9f84\u4e0d\u8d85\u8fc73\u5e74\u6216\u6559\u9f843-5\u5e74\u4f46\u672a\u6ee1\u4e00\u8f6e\u6559\u5b66\u7684\u6559\u5e08\u53ca\u65b0\u6559\u79d1\u76ee\u7684\u6559\u5e08\u987b\u5199\u8be6\u6848\uff0c\u7ec4\u7ec7\u5f00\u5c55\u591a\u5f62\u5f0f\u7684\u96c6\u4f53\u5907\u8bfe\u3002\u6559\u5e08\u4e2a\u4eba\u5907\u8bfe\u6309\u7167\u5404\u5b66\u79d1\u6559\u5b66\u5e38\u89c4\u8981\u6c42\u5b9e\u884c\uff0c\u517c\u4efb\u5b66\u79d1\u53ef\u4ee5\u5728\u4f18\u8d28\u5171\u4eab\u8d44\u6e90\u7684\u57fa\u7840\u4e0a\u8fdb\u884c\u4e8c\u5ea6\u5907\u8bfe\u3002\u5efa\u7acb\u5b9a\u671f\u68c0\u67e5\u4e0e\u968f\u673a\u62bd\u67e5\u76f8\u7ed3\u5408\u7684\u5907\u8bfe\u8bc4\u8bae\u6307\u5bfc\u5236\u5ea6\uff0c\u5168\u5458\u68c0\u67e5\u4e00\u5b66\u671f\u4e0d\u5c11\u4e8e3\u6b21\u3002\u6ce8\u91cd\u5907\u8bfe\u68c0\u67e5\u4e0e\u8bfe\u5802\u6559\u5b66\u8c03\u7814\u76f8\u7ed3\u5408\uff0c\u68c0\u67e5\u540e\u6709\u5178\u578b\u6848\u4f8b\u7684\u5206\u4eab\u4e0e\u53cd\u9988\u3002\n\n\u56db\u3001\u5f3a\u5316\u4e0a\u8bfe\u7ba1\u7406\u3002\u5efa\u7acb\u5b66\u6821\u8bfe\u5802\u6559\u5b66\u4e0e\u5b66\u5e38\u89c4\uff0c\u5efa\u7acb\u6559\u5b66\u8c03\u7814\u3001\u8003\u6838\u548c\u5956\u52b1\u5236\u5ea6\uff0c\u79ef\u6781\u5f00\u5c55\u5de1\u8bfe\u3001\u9884\u7ea6\u542c\u8bfe\u3001\u8bca\u8bfe\u7b49\u6559\u5b66\u89c6\u5bfc\u3002\u675c\u7edd\u65e0\u6559\u5b66\u6848\u8fdb\u8bfe\u5802\uff0c\u4e25\u7981\u51fa\u73b0\u8fdf\u5230\u3001\u968f\u610f\u63a5\u6253\u7535\u8bdd\u3001\u62d6\u5802\u7b49\u4e0d\u5f53\u884c\u4e3a\u3002\u6bcf\u6708\u81f3\u5c11\u5f00\u5c551\u6b21\u201c\u63a8\u95e8\u542c\u8bfe\u201d\u7b49\u5f62\u5f0f\u7684\u8bfe\u5802\u8c03\u7814\uff0c\u4e86\u89e3\u65e5\u5e38\u6559\u5b66\u60c5\u51b5\uff0c\u5e76\u505a\u597d\u8c03\u7814\u540e\u5178\u578b\u7ecf\u9a8c\u7684\u53cd\u9988\u3001\u4ea4\u6d41\u548c\u603b\u7ed3\u5de5\u4f5c\u3002\n\n\u4e94\u3001\u5f3a\u5316\u4f5c\u4e1a\u7ba1\u7406\u3002\u6839\u636e\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u9636\u6bb5\u5b66\u6821\u201c\u51cf\u8d1f\u63d0\u8d28\u201d\u4f5c\u4e1a\u7ba1\u7406\u6307\u5357\u300b\u8981\u6c42\uff0c\u538b\u51cf\u91cd\u590d\u6027\u4f5c\u4e1a\uff0c\u805a\u7126\u6838\u5fc3\u7d20\u517b\u8bbe\u8ba1\u9488\u5bf9\u6027\u4f5c\u4e1a\uff0c\u5b8c\u5584\u4f5c\u4e1a\u7edf\u7b79\u548c\u201c\u7194\u65ad\u201d\u673a\u5236\uff0c\u5f53\u5929\u65e0\u8bfe\u7684\u5b66\u79d1\u4e0d\u5f97\u5e03\u7f6e\u4e66\u9762\u4f5c\u4e1a\uff0c\u4e66\u9762\u4f5c\u4e1a\u5e73\u5747\u5b8c\u6210\u65f6\u95f4\u4e0d\u8d85\u8fc790\u5206\u949f\uff0c\u671f\u672b\u590d\u4e60\u4e25\u7981\u5e03\u7f6e\u5927\u91cf\u7684\u8bd5\u5377\u7ec3\u4e60\uff0c\u8282\u5047\u65e5\u5b66\u751f\u6bcf\u5929\u7684\u4e66\u9762\u4f5c\u4e1a\u91cf\u4e0d\u5f97\u9ad8\u4e8e\u5e73\u65f6\u4f5c\u4e1a\u91cf\u3002\u5b9a\u671f\u68c0\u67e5\u548c\u62bd\u67e5\u5404\u5b66\u79d1\u5404\u73ed\u7ea7\u4f5c\u4e1a\u7684\u603b\u91cf\u53ca\u6279\u6539\u60c5\u51b5\uff0c\u6bcf\u5b66\u671f\u81f3\u5c11\u5f00\u5c551\u6b21\u6709\u5173\u4f5c\u4e1a\u60c5\u51b5\u7684\u8c03\u67e5\u5206\u6790\u3002\u5c06\u4f5c\u4e1a\u8bbe\u8ba1\u3001\u5e03\u7f6e\u3001\u6279\u6539\u4e0e\u8f85\u5bfc\u7eb3\u5165\u65e5\u5e38\u6559\u7814\uff0c\u7ec4\u7ec7\u4f18\u79c0\u4f5c\u4e1a\u5c55\u793a\u4ea4\u6d41\uff0c\u6bcf\u5b66\u671f\u5f00\u5c55\u4ee5\u4f5c\u4e1a\u4e3a\u4e3b\u9898\u7684\u6821\u672c\u7814\u4fee\u6d3b\u52a8\u4e0d\u5c11\u4e8e1\u6b21\uff0c\u4e0d\u65ad\u63d0\u9ad8\u4f5c\u4e1a\u54c1\u8d28\u3002\n\n\u516d\u3001\u6df1\u5316\u5b66\u4e1a\u8bc4\u4ef7\u3002\u6839\u636e\u300a\u6d59\u6c5f\u7701\u6559\u80b2\u5385\u529e\u516c\u5ba4\u5173\u4e8e\u8fdb\u4e00\u6b65\u52a0\u5f3a\u4e49\u52a1\u6559\u80b2\u9636\u6bb5\u8003\u8bd5\u8bc4\u4ef7\u7ba1\u7406\u7684\u901a\u77e5\u300b\u8981\u6c42\uff0c\u53bf\uff08\u5e02\u3001\u533a\uff09\u8981\u6574\u4f53\u6784\u5efa\u7d20\u517b\u5bfc\u5411\u8bc4\u4ef7\u4f53\u7cfb\uff0c\u4e3b\u8981\u5305\u62ec\u8bc4\u4ef7\u7684\u529f\u80fd\u5b9a\u4f4d\u3001\u5185\u5bb9\u6807\u51c6\u3001\u65b9\u6cd5\u65b9\u5f0f\u3001\u7ed3\u679c\u5e94\u7528\u53ca\u76d1\u7ba1\u4fdd\u969c\u7b49\u5185\u5bb9\uff0c\u521d\u4e09\u4e0b\u5b66\u671f\u603b\u590d\u4e60\u9636\u6bb5\u53ef\u7ec4\u7ec71-2\u6b21\u533a\u57df\u6027\u6a21\u62df\u8003\u8bd5\u3002\u5b66\u6821\u4f9d\u636e\u53bf\u57df\u8bc4\u4ef7\u65b9\u6848\u5236\u5b9a\u4e94\u80b2\u5e76\u4e3e\u7684\u7efc\u5408\u8bc4\u4ef7\u65b9\u6848\uff0c\u7981\u5468\u8003\u3001\u6708\u8003\uff0c\u6bcf\u5b66\u671f\u7ec4\u7ec71-2\u6b21\u5b66\u4e1a\u8d28\u91cf\u5206\u6790\u4f1a\uff0c\u53d1\u6325\u8bc4\u4ef7\u7684\u8bca\u65ad\u6fc0\u52b1\u4e0e\u6539\u8fdb\u6559\u5b66\u7684\u4f5c\u7528\uff0c\u4e25\u7981\u6309\u7167\u5206\u6570\u6392\u540d\u3002\u6ce8\u91cd\u8fc7\u7a0b\u6027\u8bc4\u4ef7\u4e0e\u8003\u8bd5\u7ed3\u679c\u8854\u63a5\uff0c\u63a2\u7d22\u201c\u7b49\u7ea7+\u5206\u6570+\u8bc4\u8bed\u201d\u7684\u591a\u7ef4\u7ed3\u679c\u5448\u73b0\uff0c\u5f15\u5bfc\u5bb6\u957f\u4e86\u89e3\u7efc\u5408\u8bc4\u4ef7\u8981\u6c42\uff0c\u6811\u7acb\u6b63\u786e\u7684\u8bc4\u4ef7\u7406\u5ff5\u3002\u63a2\u7d22\u7d20\u517b\u7acb\u610f\u547d\u9898\uff0c\u96be\u5ea6\u7cfb\u6570\u5b9c\u63a7\u5236\u57280.75\u5de6\u53f3\uff0c\u540c\u65f6\u52a0\u5f3a\u8868\u73b0\u6027\u3001\u5b9e\u8df5\u6027\u7b49\u8bc4\u4ef7\u5f62\u5f0f\u7814\u7a76\u4e0e\u5e94\u7528\u3002\n\n\u4e03\u3001\u63a8\u8fdb\u6559\u5b66\u6539\u9769\u3002\u5b66\u6821\u5236\u5b9a\u7d20\u517b\u7acb\u610f\u7684\u6559\u5b66\u53d8\u9769\u65b9\u6848\uff0c\u79ef\u6781\u63a2\u7d22\u201c\u7d20\u517b\u8bfe\u5802\u3001\u7d20\u517b\u4f5c\u4e1a\u3001\u7d20\u517b\u8bc4\u4ef7\u201d\u7b49\u6559\u5b66\u6539\u9769\uff0c\u5b9e\u8df5\u4ee5\u4e3b\u9898\u5f0f\u3001\u9879\u76ee\u5316\u5b66\u4e60\u4e3a\u6838\u5fc3\u7684\u6559\u5b66\u5f62\u6001\u3002\u6ce8\u91cd\u201c\u505a\u4e2d\u5b66\u201d\uff0c\u79ef\u6781\u5f00\u5c55\u5b66\u79d1\u5b9e\u8df5\u6d3b\u52a8\uff0c\u5404\u95e8\u8bfe\u7a0b\u7528\u4e0d\u5c11\u4e8e10%\u00a0\u7684\u8bfe\u65f6\u5f00\u5c55\u8de8\u5b66\u79d1\u4e3b\u9898\u5b66\u4e60\uff0c\u57f9\u517b\u5b66\u751f\u5728\u771f\u5b9e\u60c5\u5883\u4e2d\u7efc\u5408\u8fd0\u7528\u591a\u5b66\u79d1\u77e5\u8bc6\u89e3\u51b3\u590d\u6742\u95ee\u9898\u7684\u80fd\u529b\u3002\u79ef\u6781\u843d\u5b9e\u201c\u7231\u9605\u8bfb\u884c\u52a8\u201d\u201c\u6570\u5b66\u5bb6\u4e4b\u4e61\u201d\u201c\u79d1\u5b66\u6559\u80b2\u52a0\u6cd5\u201d\u7b49\u884c\u52a8\u3002\n\n\u516b\u3001\u52a0\u5f3a\u6559\u7814\u7ba1\u7406\u3002\u6839\u636e\u300a\u6d59\u6c5f\u7701\u6559\u80b2\u5385\u5173\u4e8e\u8fdb\u4e00\u6b65\u52a0\u5f3a\u65b0\u65f6\u4ee3\u57fa\u7840\u6559\u80b2\u6559\u7814\u5de5\u4f5c\u7684\u5b9e\u65bd\u610f\u89c1\u300b\u548c\u300a\u6e29\u5dde\u5e02\u4e2d\u5c0f\u5b66\u5b66\u79d1\u6559\u7814\u7ec4\u5efa\u8bbe\u6307\u5357\u300b\u7b49\u6587\u4ef6\u8981\u6c42\uff0c\u4f18\u5316\u914d\u7f6e\u6559\u7814\u961f\u4f0d\uff0c\u5b8c\u5584\u6559\u7814\u5e38\u89c4\u53ca\u8003\u6838\u5236\u5ea6\uff0c\u89c4\u8303\u6559\u7814\u6d3b\u52a8\u3002\u5efa\u7acb\u6559\u5b66\u7ba1\u7406\u4eba\u5458\u5230\u4f18\u8d28\u5b66\u6821\u4ea4\u6d41\u5b66\u4e60\u673a\u5236\u3002\u6574\u4f53\u8bbe\u8ba1\u6709\u4e3b\u9898\u3001\u6709\u89c4\u5212\u3001\u8fdb\u9636\u5f0f\u7684\u6821\u672c\u7814\u4fee\u65b9\u6848\uff0c\u5f00\u5c55\u6559\u5e08\u8bfb\u4e66\u6d3b\u52a8\uff0c\u53ca\u65f6\u7ec4\u7ec7\u6559\u80b2\u653f\u7b56\u6587\u4ef6\u5b66\u4e60\u3002\u5b66\u79d1\u6559\u5e08\u6bcf\u5b66\u671f\u987b\u4e0a1\u8282\u5e74\u7ea7\u6216\u6821\u7ea7\u7814\u8ba8\u8bfe\uff0c\u6559\u5b66\u7ba1\u7406\u4eba\u5458\u6bcf\u5b66\u671f\u6821\u5185\u542c\u8bc4\u8bfe\u4e0d\u5c11\u4e8e20\u8282\u3002\u5efa\u7acb\u6821\u5185\u6559\u5e08\u9752\u84dd\u7ed3\u5bf9\u7b49\u5236\u5ea6\uff0c\u6ce8\u91cd\u5404\u5c42\u6b21\u6559\u5e08\u7684\u57f9\u517b\u3002\u9f13\u52b1\u5c0f\u89c4\u6a21\u5b66\u6821\uff0c\u6210\u7acb\u4ee5\u8054\u76df\u6821\u4e3a\u4e3b\u7684\u6821\u9645\u5b66\u79d1\u6559\u7814\u7ec4\u3002\n\n\u4e5d\u3001\u5efa\u8bbe\u6821\u672c\u8d44\u6e90\u3002\u4e30\u5bcc\u6559\u5b66\u8d44\u6e90\u5f62\u6001\uff0c\u96c6\u7eb3\u7cbe\u54c1\u8bfe\u7a0b\u3001\u4f18\u79c0\u6559\u5b66\u8bbe\u8ba1\u3001\u4f18\u8d28\u5b66\u751f\u5b66\u4e60\u8d44\u6e90\u3001\u7279\u8272\u6821\u672c\u4f5c\u4e1a\u4e0e\u8bc4\u4ef7\u6848\u4f8b\u3001\u5178\u578b\u6559\u79d1\u7814\u8bfe\u9898\u4e0e\u8bba\u6587\u7b49\u7c7b\u578b\u8d44\u6e90\u3002\u79ef\u6781\u5229\u7528\u56fd\u5bb6\u667a\u6167\u6559\u80b2\u5e73\u53f0\u3001\u6d59\u6c5f\u7701\u6559\u7814\u5ba4\u5929\u5929\u516c\u5f00\u8bfe\u3001\u4e4b\u6c5f\u6c47\u6559\u80b2\u5e7f\u573a\u7b49\u7f51\u7edc\u5b66\u79d1\u8d44\u6e90\uff0c\u52a0\u5f3a\u5408\u4f5c\u4ea4\u6d41\u3001\u6210\u679c\u5c55\u793a\u3001\u7ecf\u9a8c\u63a8\u4ecb\uff0c\u7edf\u7b79\u5efa\u8bbe\u667a\u80fd\u5316\u6821\u672c\u8d44\u6e90\u5e93\u3002\n\n\u5341\u3001\u63a8\u8fdb\u6280\u672f\u8d4b\u80fd\u3002\u5b66\u6821\u79ef\u6781\u63a2\u7d22\u8fd0\u7528\u4fe1\u606f\u6280\u672f\u7b49\u624b\u6bb5\u63d0\u5347\u6559\u5b66\u7ba1\u7406\u6548\u7387\u7684\u65b9\u6cd5\u3002\u6559\u7814\u7ec4\u8981\u6784\u5efa\u6570\u636e\u9a71\u52a8\u3001\u57fa\u4e8e\u8bc1\u636e\u3001\u7cbe\u51c6\u8bca\u65ad\u548c\u53cd\u9988\u7684\u6559\u79d1\u7814\u65b0\u8303\u5f0f\u3002\u9f13\u52b1\u6559\u5e08\u5b66\u4e60\u8fd0\u7528\u4eba\u5de5\u667a\u80fd\u7b49\u5de5\u5177\uff0c\u652f\u6491\u5907\u6388\u8bfe\uff0c\u63a2\u7d22\u667a\u6167\u4f5c\u4e1a\uff0c\u4fc3\u8fdb\u4e2a\u6027\u5316\u5b66\u4e60\u3002\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u8bfe\u7a0b\u6559\u5b66\u7ba1\u7406\u8fc7\u7a0b\u6307\u5bfc\u53cd\u9988\u8868 (2025\u5e74\u7248)\n\n|   |   |   |   |   |   |   |   |   |\n|---|---|---|---|---|---|---|---|---|\n|\u8bc4\u8bae\u4fe1\u606f|\u5b66\u6821\u53cd\u9988\u65f6\u95f4|   |   |   |   |   |   |   |\n|\u4e00\u7ea7\u6307\u6807|\u4e8c\u7ea7\u6307\u6807|\u8bc4\u8bae\u8981\u7d20|\u6750\u6599\u6216\u8bc4\u8bae\u65b9\u5f0f|\u8bc4\u8bae\u60c5\u51b5|   |   |   |\u53cd\u9988\u8bf4\u660e|\n|\u5206\u503c|\u81ea\u8bc4|\u53bf\u8bc4|\u5e02\u8bc4|\n|A1\u5f00\u9f50\u5f00\u8db3\u8bfe\u7a0b(8\u5206)|B1\u7ec4\u7ec7\u7ba1\u7406|\u8bbe\u7acb\u6559\u5b66\u7ba1\u7406\u9886\u5bfc\u5c0f\u7ec4;\u6210\u7acb\u8bfe\u7a0b\u7ba1\u7406\u59d4\u5458\u4f1a,\u7ed3\u5408\u6821\u60c5\u7814\u5236\u5b66\u6821\u8bfe\u7a0b\u5b9e\u65bd\u65b9\u6848;\u6bcf\u5b66\u5e74\u5f00\u5c55\u8bfe\u7a0b\u8bbe\u7f6e\u7814\u7814\u8ba8\u3002|\u6559\u5b66\u7ba1\u7406\u9886\u5bfc\u5c0f\u7ec4\u540d\u5355\u5b66\u6821\u8bfe\u7a0b\u7ba1\u7406\u59d4\u5458\u4f1a\u540d\u5355\u53ca\u8bfe\u7a0b\u5b9e\u65bd\u65b9\u6848|3|||||\n|B2\u89c4\u8303\u8bfe\u7a0b|\u5f00\u9f50\u5f00\u8db3\u8bfe\u7a0b,\u8bfe\u7a0b\u540d\u79f0\u89c4\u8303\u3002|\u67e5\u770b\u6750\u6599/\u5b66\u751f\u95ee\u5377|3|||||\n|B3\u8bfe\u7a0b\u4f18\u5316|\u6bcf\u5b66\u5e74\u6839\u636e\u5b9e\u65bd\u60c5\u51b5\u8c03\u6574\u4f18\u5316\u8bfe\u7a0b\u5b9e\u65bd\u65b9\u6848,\u62a5\u4e3b\u7ba1\u6559\u80b2\u884c\u653f\u90e8\u95e8\u5907\u6848\u5e76\u901a\u8fc7\u5ba1\u6838\u3002|\u67e5\u770b\u6750\u6599|2|||||\n|A2\u4f18\u5316\u8bfe\u7a0b\u5b9e\u65bd(8\u5206)|B4\u89c4\u8303\u8868\u518c|\u79d1\u5b66\u89c4\u8303\u5b89\u6392\u5b66\u751f\u5728\u6821\u4f5c\u606f\u65f6\u95f4\u8868\u3001\u5b66\u6821\u8bfe\u7a0b\u8868\u3001\u6559\u5e08\u6388\u8bfe\u8868\u548c\u73ed\u7ea7\u529f\u8bfe\u8868\u3002|\u67e5\u770b\u6750\u6599|3|||||\n|B5\u76d1\u7763\u5de1\u89c6|\u5bf9\u73ed\u7ea7\u7684\u8bfe\u7a0b\u5f00\u8bbe\u3001\u8bfe\u65f6\u4fdd\u969c\u5f00\u5c55\u5e38\u6001\u5316\u5de1\u89c6;\u5b9a\u671f\u8d70\u8bbf\u5b66\u751f\u4e86\u89e3\u73ed\u7ea7\u5f00\u8bfe\u60c5\u51b5\u3002|\u8bfe\u5802\u5de1\u89c6\u8bb0\u5f55\u5e08\u751f\u5ea7\u8c08|3|||||\n|B6\u4fdd\u969c\u5b9e\u65bd|\u4f9d\u636e\u53bf\u7ea7\u6559\u80b2\u884c\u653f\u548c\u6559\u7814\u90e8\u95e8\u5bf9\u672c\u6821\u8bfe\u7a0b\u8c03\u7814\u540e\u7684\u5efa\u8bae,\u53ca\u65f6\u4fee\u6b63\u8bfe\u7a0b\u8bbe\u7f6e\u548c\u5b9e\u65bd|\u67e5\u770b\u6750\u6599|2|||||\n|A3\u5f3a\u5316\u5907\u8bfe\u7ba1\u7406(12\u5206)|B7\u5907\u8bfe\u8981\u6c42|\u6839\u636e\u6559\u5e08\u7684\u6559\u9f84\u3001\u5c42\u6b21\u3001\u5b66\u79d1\u7279\u70b9\u8bbe\u7f6e\u5907\u8bfe\u8981\u6c42;\u7ec4\u7ec7\u5f00\u5c55\u591a\u5f62\u5f0f\u7684\u96c6\u4f53\u5907\u8bfe|\u5b66\u6821\u5907\u8bfe\u5236\u5ea6\u96c6\u4f53\u5907\u8bfe\u76f8\u5173\u6750\u6599|4|||||\n|B8\u5907\u8bfe\u65b9\u5f0f|\u6559\u5e08\u4e2a\u4eba\u5907\u8bfe\u6309\u7167\u5404\u5b66\u79d1\u6559\u5b66\u5e38\u89c4\u8981\u6c42\u5b9e\u884c;\u517c\u4efb\u5b66\u79d1\u5728\u4f18\u8d28\u5171\u4eab\u8d44\u6e90\u7684\u57fa\u7840\u4e0a\u8fdb\u884c\u4e8c\u5ea6\u5907\u8bfe\u3002|\u6559\u5e08\u5907\u8bfe\u672c|4|||||\n|\u4e00\u7ea7\u6307\u6807|\u4e8c\u7ea7\u6307\u6807|\u8bc4\u8bae\u8981\u7d20|\u6750\u6599\u6216\u8bc4\u8bae\u65b9\u5f0f|\u8bc4\u8bae\u60c5\u51b5|   |   |   |\u53cd\u9988\u8bf4\u660e|\n|\u5206\u503c|\u81ea\u8bc4|\u53bf\u8bc4|\u5e02\u8bc4|\n||B9 \u68c0\u67e5\u53cd\u9988|\u5efa\u7acb\u5b9a\u671f\u68c0\u67e5\u4e0e\u968f\u673a\u62bd\u67e5\u76f8\u7ed3\u5408\u7684\u5907\u8bfe\u8bc4\u8bae\u6307\u5bfc\u5236\u5ea6,\u5168\u5458\u68c0\u67e5\u4e00\u5b66\u671f\u4e0d\u5c11\u4e8e3\u6b21,\u6559\u5b66\u68c0\u67e5\u540e\u6709\u5178\u578b\u6848\u4f8b\u7684\u5206\u4eab\u4e0e\u53cd\u9988\u3002|\u5907\u8bfe\u8bc4\u8bae\u5236\u5ea6\u5907\u8bfe\u68c0\u67e5\u8bb0\u5f55\u68c0\u67e5\u53cd\u9988\u6750\u6599|4|||||\n|A4\u5f3a\u5316\u4e0a\u8bfe\u7ba1\u7406(15\u5206)|B10 \u5efa\u7acb\u5e38\u89c4|\u5efa\u7acb\u5b66\u6821\u8bfe\u5802\u6559\u4e0e\u5b66\u5e38\u89c4|\u67e5\u770b\u6750\u6599|5|||||\n|B11 \u89c4\u8303\u4e0a\u8bfe|\u5efa\u7acb\u6559\u5b66\u8c03\u7814\u3001\u8003\u6838\u548c\u5956\u52b1\u5236\u5ea6;\u5b66\u6821\u79ef\u6781\u5f00\u5c55\u5de1\u8bfe\u3001\u9884\u7ea6\u542c\u8bfe\u3001\u8bca\u8bfe\u7b49\u6559\u5b66\u89c6\u5bfc\u6d3b\u52a8|\u76f8\u5173\u5236\u5ea6\u68c0\u67e5\u8bb0\u5f55|5|||||\n|B12 \u8bfe\u5802\u8c03\u7814|\u6bcf\u6708\u5f00\u5c55\u201c\u63a8\u95e8\u542c\u8bfe\u201d\u7b49\u5f62\u5f0f\u8bfe\u5802\u8c03\u7814,\u5e76\u5bf9\u8c03\u7814\u4e2d\u7684\u5178\u578b\u7ecf\u9a8c\u5f00\u5c55\u53cd\u9988\u4ea4\u6d41\u548c\u603b\u7ed3|\u8c03\u7814\u6750\u6599\u5e08\u751f\u5ea7\u8c08|5|||||\n|A5\u5f3a\u5316\u4f5c\u4e1a\u7ba1\u7406(12\u5206)|B13 \u4f5c\u4e1a\u673a\u5236|\u538b\u51cf\u91cd\u590d\u6027\u4f5c\u4e1a,\u805a\u7126\u6838\u5fc3\u7d20\u517b\u8bbe\u8ba1\u9488\u5bf9\u6027\u4f5c\u4e1a,\u5b8c\u5584\u4f5c\u4e1a\u7edf\u7b79\u548c\u201c\u7194\u65ad\u201d\u673a\u5236\u3002|\u4f5c\u4e1a\u673a\u5236\u5e08\u751f\u5ea7\u8c08|4|||||\n|B14 \u4f5c\u4e1a\u68c0\u67e5|\u5b9a\u671f\u68c0\u67e5\u548c\u62bd\u67e5\u73ed\u7ea7\u3001\u5b66\u79d1\u4f5c\u4e1a\u7684\u603b\u91cf\u53ca\u6279\u6539\u60c5\u51b5;\u6bcf\u5b66\u671f\u81f3\u5c11\u5f00\u5c551\u6b21\u6709\u5173\u4f5c\u4e1a\u60c5\u51b5\u7684\u8c03\u67e5\u5206\u6790\u3002|\u4f5c\u4e1a\u68c0\u67e5\u8bb0\u5f55|4|||||\n|B15 \u4f5c\u4e1a\u7814\u4fee|\u5b66\u6821\u5f00\u5c55\u4ee5\u4f5c\u4e1a\u4e3a\u4e3b\u9898\u7684\u6821\u672c\u6559\u7814\u6d3b\u52a8;\u5b66\u6821\u7ec4\u7ec7\u4f18\u79c0\u4f5c\u4e1a\u5c55\u793a\u4ea4\u6d41\u6d3b\u52a8\u3002|\u6821\u672c\u7814\u4fee\u6750\u6599\u4f5c\u4e1a\u5c55\u8bc4\u6750\u6599|4|||||\n|A6\u6df1\u5316\u5b66\u4e1a\u8bc4\u4ef7(12\u5206)|B16 \u8bc4\u4ef7\u65b9\u6848|\u5b66\u6821\u4f9d\u636e\u53bf\u57df\u8bc4\u4ef7\u65b9\u6848\u5236\u5b9a\u4e94\u80b2\u5e76\u4e3e\u7684\u7efc\u5408\u8bc4\u4ef7\u65b9\u6848\u3002|\u8bc4\u4ef7\u65b9\u6848|4|||||\n|B17 \u5b66\u6821\u8bc4\u4ef7|\u6bcf\u5b66\u5e74\u5f00\u5c551\u6b21\u5b66\u4e1a\u8d28\u91cf\u5206\u6790\u4f1a;\u5b66\u6821\u4e0d\u6309\u7167\u5206\u6570\u8fdb\u884c\u5404\u9879\u6392\u540d\u3002|\u4f1a\u8bae\u8bb0\u5f55\u5e08\u751f\u5ea7\u8c08|4|||||\n|B18 \u5bb6\u957f\u4e86\u89e3|\u5f15\u5bfc\u5bb6\u957f\u4e86\u89e3\u7efc\u5408\u8bc4\u4ef7\u8981\u6c42\u3002|\u95ee\u5377\u8c03\u67e5|4|||||\n|A7\u63a8\u8fdb\u6559\u5b66\u6539\u9769(9\u5206)|B19\u6559\u5b66\u53d8\u9769|\u5b66\u6821\u5236\u5b9a\u7d20\u517b\u7acb\u610f\u7684\u6559\u5b66\u53d8\u9769\u65b9\u6848\u3002|\u6559\u5b66\u53d8\u9769\u65b9\u6848|3|||||\n|B20\u5b9e\u8df5\u6d3b\u52a8|\u5404\u95e8\u8bfe\u7a0b\u7528\u4e0d\u5c11\u4e8e10%\u7684\u8bfe\u65f6\u5f00\u5c55\u8de8\u5b66\u79d1\u4e3b\u9898\u5b66\u4e60\u3002|\u76f8\u5173\u6750\u6599|3|||||\n|B21\u9879\u76ee\u5efa\u8bbe|\u79ef\u6781\u843d\u5b9e\u201c\u7231\u9605\u8bfb\u884c\u52a8\u201d\u201c\u6570\u5b66\u5bb6\u4e4b\u4e61\u201d\u201c\u79d1\u5b66\u6559\u80b2\u52a0\u6cd5\u201d\u884c\u52a8\u3002|\u9879\u76ee\u5efa\u8bbe\u6750\u6599|3|||||\n|A8\u52a0\u5f3a\u6559\u7814\u7ba1\u7406(12\u5206)|B22\u6559\u7814\u5236\u5ea6|\u5efa\u7acb\u6559\u7814\u5e38\u89c4\u53ca\u8003\u6838\u5236\u5ea6,\u89c4\u8303\u6559\u7814\u6d3b\u52a8;\u6574\u4f53\u8bbe\u8ba1\u6821\u672c\u7814\u4fee\u65b9\u6848\u3002|\u6559\u7814\u5236\u5ea6\u7814\u4fee\u65b9\u6848|4|||||\n|B23\u6559\u7814\u5185\u5bb9|\u5f00\u5c55\u6559\u5e08\u8bfb\u4e66\u6d3b\u52a8,\u53ca\u65f6\u7ec4\u7ec7\u6559\u80b2\u653f\u7b56\u6587\u4ef6\u5b66\u4e60;\u5b66\u79d1\u6559\u5e08\u6bcf\u5b66\u671f\u6267\u65591\u8282\u7814\u8ba8\u8bfe;\u6559\u5b66\u7ba1\u7406\u4eba\u5458\u6bcf\u5b66\u671f\u6821\u5185\u542c\u8bc4\u8bfe\u4e0d\u5c11\u4e8e20\u8282\u3002|\u6559\u7814\u7ec4\u6750\u6599\u7814\u8ba8\u8bfe\u8bb0\u5f55\u542c\u8bfe\u7b14\u8bb0|4|||||\n|B24\u6559\u7814\u7ed3\u5bf9|\u5efa\u7acb\u6821\u5185\u6559\u5e08\u9752\u84dd\u7ed3\u5bf9\u5236\u5ea6,\u6ce8\u91cd\u5404\u5c42\u6b21\u6559\u5e08\u7684\u57f9\u517b,\u5c0f\u89c4\u6a21\u5b66\u6821\u6210\u7acb\u6821\u9645\u5b66\u79d1\u6559\u7814\u7ec4\u3002|\u6559\u5e08\u7ed3\u5bf9\u5236\u5ea6\u3001\u6821\u9645\u5b66\u6821\u8054\u76df\u7684\u76f8\u5173\u6d3b\u52a8\u6750\u6599|4|||||\n|A9\u5efa\u8bbe\u6821\u672c\u8d44\u6e90(6\u5206)|B25\u4e30\u5bcc\u8d44\u6e90|\u4e30\u5bcc\u6559\u5b66\u8d44\u6e90\u5f62\u6001,\u96c6\u7eb3\u4e0d\u540c\u7c7b\u578b\u8d44\u6e90\u3002|\u6821\u672c\u8d44\u6e90\u6750\u6599|3|||||\n|B26\u7efc\u5408\u5b66\u4e60|\u79ef\u6781\u5229\u7528\u4f18\u79c0\u7f51\u7edc\u5b66\u79d1\u8d44\u6e90,\u7edf\u7b79\u5efa\u8bbe\u667a\u80fd\u5316\u6821\u672c\u8d44\u6e90\u5e93\u3002|\u7f51\u7edc\u5e73\u53f0\u8fd0\u7528\u6570\u636e\u6821\u672c\u8d44\u6e90\u5e93\u5efa\u8bbe|3|||||\n|A10\u63a8\u8fdb\u6280\u672f\u8d4b\u80fd(6\u5206)|B27\u6d3b\u52a8\u9879\u76ee|\u8fd0\u7528\u4fe1\u606f\u6280\u672f\u7b49\u624b\u6bb5\u63d0\u5347\u6559\u5b66\u7ba1\u7406\u6548\u7387\u3002|\u76f8\u5173\u667a\u6167\u7ba1\u7406\u6570\u636e\u6570\u5b57\u5316\u7ba1\u7406\u65b9\u6848|3|||||\n|B28\u6280\u672f\u652f\u6301|\u6784\u5efa\u6570\u636e\u9a71\u52a8\u3001\u57fa\u4e8e\u8bc1\u636e\u3001\u7cbe\u51c6\u8bca\u65ad\u548c\u53cd\u9988\u7684\u6559\u79d1\u7814\u65b0\u8303\u5f0f\u3002|\u76f8\u5173\u6280\u672f\u8d4b\u80fd\u6750\u6599\u6559\u5e08\u5ea7\u8c08|3|||||\n\n|   |   |   |   |   |   |   |   |   |\n|---|---|---|---|---|---|---|---|---|\n|\u4e00\u7ea7\u6307\u6807|\u4e8c\u7ea7\u6307\u6807|\u8bc4\u8bae\u8981\u7d20|\u6750\u6599\u6216\u8bc4\u8bae\u65b9\u5f0f|\u8bc4\u8bae\u60c5\u51b5|   |   |   |\u53cd\u9988\u8bf4\u660e|\n|\u5206\u503c|\u81ea\u8bc4|\u53bf\u8bc4|\u5e02\u8bc4|\n|\u5176\u4ed6(\u9644\u52a010\u5206)|B29\u7ba1\u7406\u7279\u8272|\u5e08\u751f\u79ef\u6781\u53c2\u4e0e\u6559\u80b2\u90e8\u95e8\u7ec4\u7ec7\u7684\u5404\u7ea7\u5404\u7c7b\u8bc4\u6bd4\u6d3b\u52a8,\u6210\u7ee9\u663e\u8457;\u5b66\u6821\u6559\u80b2\u6559\u5b66\u7814\u7a76\u9879\u76ee\u5728\u533a\u57df\u5185\u6709\u4e00\u5b9a\u7684\u8f90\u5c04\u529b\u3002|\u76f8\u5173\u4f50\u8bc1\u6750\u6599|10|||||\n|\u8bc4\u8bae\u603b\u7ed3|\u4eae\u70b9||||||||\n|\u5efa\u8bae||||||||\n\n# \u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09\n\n\u8bed\u6587\u8bfe\u7a0b\u662f\u4e00\u95e8\u5b66\u4e60\u56fd\u5bb6\u901a\u7528\u8bed\u8a00\u6587\u5b57\u8fd0\u7528\u7684\u7efc\u5408\u6027\u3001\u5b9e\u8df5\u6027\u8bfe\u7a0b\u3002\u672c\u8bfe\u7a0b\u65e8\u5728\u5f15\u5bfc\u5b66\u751f\u638c\u63e1\u8bed\u8a00\u89c4\u5f8b\uff0c\u611f\u53d7\u6bcd\u8bed\u9b45\u529b\uff0c\u4f20\u627f\u6587\u5316\uff0c\u53d1\u5c55\u601d\u7ef4\uff0c\u63d0\u5347\u5ba1\u7f8e\u3002\u4f9d\u636e\u300a\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u65b9\u6848\uff082022\u5e74\u7248\uff09\u300b\u300a\u4e49\u52a1\u6559\u80b2\u8bed\u6587\u8bfe\u7a0b\u6807\u51c6\uff082022\u5e74\u7248\uff09\u300b\u7b49\u6587\u4ef6\u7cbe\u795e\uff0c\u7ed3\u5408\u300a\u6e29\u5dde\u5e02\u4e49\u52a1\u6559\u80b2\u8bfe\u7a0b\u5b9e\u65bd\u529e\u6cd5\uff08\u8bd5\u884c\uff09\u300b\uff0c\u805a\u7126\u201c\u4ee5\u6587\u5316\u4eba\u3001\u4ee5\u80b2\u624d\u201d\uff0c\u7279\u7814\u5236\u300a\u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u6559\u5b66\u5e38\u89c4\uff082025\u5e74\u7248\uff09\u300b\uff0c\u81f4\u529b\u4e8e\u5f15\u5bfc\u5e08\u751f\u5171\u540c\u8425\u9020\u5bcc\u6709\u6d3b\u529b\u7684\u8bed\u8a00\u5b9e\u8df5\u573a\u57df\uff0c\u5168\u9762\u63d0\u5347\u5b66\u751f\u7684\u8bed\u6587\u6838\u5fc3\u7d20\u517b\u3002\n\n# \u5907\u8bfe\u5e38\u89c4\n\n\u5907\u8bfe\u662f\u6559\u5b66\u7684\u91cd\u8981\u73af\u8282\u3002\u6559\u5e08\u9700\u4f9d\u636e\u8bed\u6587\u8bfe\u7a0b\u6807\u51c6\uff0c\u5145\u5206\u7814\u8bfb\u6559\u6750\u5185\u5bb9\uff0c\u7ed3\u5408\u5b66\u751f\u5b9e\u9645\u60c5\u51b5\u660e\u786e\u5b66\u4e60\u76ee\u6807\uff0c\u8bbe\u8ba1\u5b66\u4e60\u4efb\u52a1\uff0c\u4ee5\u4fdd\u969c\u6559\u5b66\u6d3b\u52a8\u7cbe\u51c6\u3001\u6709\u6548\u5b9e\u65bd\u3002\n\n# \u4e00\u3001\u6559\u5b66\u89c4\u5212\n\n1.\u6839\u636e\u8bed\u6587\u8bfe\u7a0b\u6807\u51c6\u3001\u6559\u6750\u5185\u5bb9\u53ca\u5b66\u60c5\uff0c\u5236\u5b9a\u5b66\u671f\u6559\u5b66\u8ba1\u5212\uff0c\u786e\u4fdd\u6559\u5b66\u8ba1\u5212\u517c\u5177\u79d1\u5b66\u6027\u4e0e\u9002\u5207\u6027\u3002\n\n2.\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 \u4ee5\u5355\u5143\u4e3a\u5355\u4f4d\u8fdb\u884c\u5907\u8bfe\uff0c\u5e76\u4f9d\u636e\u9605\u8bfb\u3001\u5199\u4f5c\u3001\u6574\u672c\u4e66\u9605\u8bfb\u3001\u4e13\u9898\u5b66\u4e60\u6d3b\u52a8\u3001\u9605\u8bfb\u7efc\u5408\u5b9e\u8df5\u7b49\u5185\u5bb9\uff0c\u5408\u7406\u5206\u914d\u8bfe\u65f6\u6bd4\u4f8b\u3002\n\n# \u4e8c\u3001\u6559\u6750\u89e3\u8bfb\n\n\u6559\u5e08\u8981\u505a\u6559\u6750\u7684\u201c\u89e3\u8bfb\u8005\u201d\uff0c\u901a\u8fc7\u72ec\u7acb\u9605\u8bfb\u4e0e\u6559\u6750\u5185\u5bb9\u5c55\u5f00\u5bf9\u8bdd\uff0c\u5e76\u501f\u52a9\u6559\u5e08\u6559\u5b66\u7528\u4e66\u7b49\u8d44\u6599\u8fdb\u4e00\u6b65\u89e3\u8bfb\u6559\u6750\uff0c\u53d1\u73b0\u6559\u6750\u8d44\u6e90\u7684\u539f\u751f\u4ef7\u503c\uff1b\u4e5f\u8981\u505a\u6559\u6750\u7684\u201c\u8f6c\u5316\u8005\u201d\uff0c\u7acb\u8db3\u5b66\u751f\u7684\u5b66\u4e60\u9700\u6c42\u4e0e\u8ba4\u77e5\u7279\u70b9\uff0c\u5c06\u6559\u6750\u8d44\u6e90\u8f6c\u5316\u4e3a\u9002\u914d\u7684\u5b66\u4e60\u5185\u5bb9\uff0c\u63d0\u5347\u6559\u5b66\u5b9e\u6548\u3002\n\n1.\u7814\u8bfb\u6559\u6750\uff0c\u67b6\u6784\u5355\u5143\u5b66\u4e60\u3002\u901a\u8bfb\u5355\u5143\u6587\u672c\u53ca\u5404\u677f\u5757\uff0c\u5173\u6ce8\u6559\u6750\u52a9\u5b66\u7cfb\u7edf\uff0c\u660e\u6670\u5355\u5143\u5185\u5bb9\u627f\u8f7d\u7684\u6587\u5316\u5185\u6db5\u4e0e\u5ba1\u7f8e\u4ef7\u503c\uff0c\u660e\u786e\u5355\u5143\u7684\u6838\u5fc3\u77e5\u8bc6\uff1b\u5efa\u7acb\u677f\u5757\u4e4b\u95f4\u7684\u903b\u8f91\u5173\u7cfb\uff0c\u660e\u786e\u5404\u677f\u5757\u5728\u5355\u5143\u6574\u4f53\u67b6\u6784\u4e2d\u7684\u5b9a\u4f4d\uff0c\u6574\u5408\u3001\u8d2f\u901a\u5355\u5143\u5b66\u4e60\u5185\u5bb9\uff0c\u4fc3\u6210\u5355\u5143\u5b66\u4e60\u7ed3\u6784\u5316\u3002\n\n2.\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 \u7ec6\u8bfb\u6587\u672c\uff0c\u660e\u786e\u6559\u5b66\u91cd\u70b9\u3002\u628a\u63e1\u5355\u7bc7\u6587\u672c\u7684\u7279\u8d28\uff0c\u6df1\u5165\u7406\u89e3\u6587\u672c\u5185\u6db5\uff0c\u63d0\u70bc\u5176\u72ec\u7279\u4ef7\u503c\uff0c\u5e76\u660e\u6670\u5355\u7bc7\u8bfe\u6587\u4e0e\u5355\u5143\u6838\u5fc3\u77e5\u8bc6\u7684\u5173\u7cfb\uff1b\u901a\u8bfb\u7ecf\u5178\u540d\u8457\uff0c\u7814\u8bfb\u91cd\u8981\u5185\u5bb9\uff0c\u660e\u786e\u6574\u672c\u4e66\u7684\u6838\u5fc3\u4ef7\u503c\uff0c\u7edf\u7b79\u5b89\u6392\u8bfe\u5185\u4e0e\u8bfe\u5916\u3001\u4e2a\u4eba\u4e0e\u96c6\u4f53\u7684\u6574\u672c\u4e66\u9605\u8bfb\u6d3b\u52a8\u3002\n\n# \u4e09\u3001\u5b66\u60c5\u5206\u6790\n\n\u901a\u8fc7\u8bbf\u8c08\u8c03\u67e5\u3001\u63d0\u95ee\u8d28\u7591\u3001\u9884\u5b66\u68c0\u6d4b\u7b49\u65b9\u5f0f\uff0c\u4e86\u89e3\u5b66\u751f\u5df2\u6709\u7684\u76f8\u5173\u8bed\u6587\u77e5\u8bc6\u548c\u751f\u6d3b\u7ecf\u9a8c\uff0c\u5145\u5206\u8003\u8651\u4e0d\u540c\u5c42\u6b21\u5b66\u751f\u7684\u9700\u6c42\u3002\n\n# \u56db\u3001\u76ee\u6807\u64b0\u5199\n\n1. \u4ee5\u8bfe\u6807\u4e3a\u5bfc\u5411\uff0c\u4f9d\u636e\u6559\u6750\u5185\u5bb9\u548c\u5b66\u60c5\uff0c\u56f4\u7ed5\u5355\u5143\u6838\u5fc3\u77e5\u8bc6\u660e\u786e\u5355\u5143\u5b66\u4e60\u76ee\u6807\uff0c\u5e76\u4f9d\u636e\u5355\u5143\u76ee\u6807\u8bbe\u8ba1\u8bfe\u65f6\u76ee\u6807\u3002\n2. \u5b66\u4e60\u76ee\u6807\u7684\u8868\u8ff0\u5e94\u4ee5\u5b66\u751f\u4e3a\u4e3b\u4f53\uff0c\u5305\u62ec\u5b66\u4e60\u7b56\u7565\u3001\u884c\u4e3a\u52a8\u8bcd\u53ca\u4e60\u5f97\u7684\u5185\u5bb9\uff0c\u4f53\u73b0\u5b66\u4e60\u7684\u8fdb\u9636\u8fc7\u7a0b\u3002\n\n# \u4e94\u3001\u8fc7\u7a0b\u8bbe\u8ba1\n\n1. \u57fa\u4e8e\u5b66\u4e60\u76ee\u6807\u548c\u5b66\u60c5\uff0c\u6839\u636e\u9700\u8981\u7075\u6d3b\u521b\u8bbe\u65e5\u5e38\u751f\u6d3b\u3001\u6587\u5b66\u4f53\u9a8c\u3001\u8de8\u5b66\u79d1\u5b66\u4e60\u7b49\u60c5\u5883\uff0c\u8bbe\u8ba1\u5178\u578b\u7684\u95ee\u9898\u6216\u4efb\u52a1\u3002\n2. \u95ee\u9898\u6216\u4efb\u52a1\u96be\u5ea6\u9002\u5207\uff0c\u6709\u4e00\u5b9a\u5f00\u653e\u6027\uff0c\u80fd\u6fc0\u53d1\u5b66\u751f\u7684\u4e3b\u52a8\u5b66\u4e60\uff1b\u6839\u636e\u9700\u8981\u5c06\u4e3b\u4efb\u52a1\u5206\u89e3\u4e3a\u5b50\u4efb\u52a1\uff0c\u660e\u786e\u5404\u5b50\u4efb\u52a1\u4e4b\u95f4\u7684\u903b\u8f91\u5173\u7cfb\u3002\n3. \u95ee\u9898\u6216\u4efb\u52a1\u8868\u8ff0\u8981\u6e05\u6670\uff0c\u5177\u6709\u53ef\u64cd\u4f5c\u6027\uff0c\u5e94\u5305\u542b\u5b66\u4e60\u60c5\u5883\u3001\u6838\u5fc3\u77e5\u8bc6\u3001\u4e3b\u4f53\u884c\u4e3a\u3001\u9884\u671f\u7ed3\u679c\u7b49\u8981\u7d20\uff0c\u5373\u201c\u505a\u4ec0\u4e48\u201d\u201c\u7528\u4ec0\u4e48\u505a\u201d\u201c\u505a\u6210\u4ec0\u4e48\u201d\u3002\n\n4.\u6839\u636e\u89e3\u51b3\u95ee\u9898\u548c\u5b8c\u6210\u4efb\u52a1\u7684\u9700\u8981\uff0c\u5f00\u5c55\u8bc6\u5b57\u4e0e\u5199\u5b57\u3001\u9605\u8bfb\u4e0e\u9274\u8d4f\u3001\u8868\u8fbe\u4e0e\u4ea4\u6d41\u3001\u68b3\u7406\u4e0e\u63a2\u7a76\u7b49\u8bed\u6587\u5b9e\u8df5\u6d3b\u52a8\uff0c\u6ce8\u610f\u8fde\u8d2f\u6027\u548c\u7efc\u5408\u6027\u3002\n\n5.\u9884\u8bbe\u5b66\u751f\u89e3\u51b3\u95ee\u9898\u3001\u5b8c\u6210\u4efb\u52a1\u8fc7\u7a0b\u4e2d\u53ef\u80fd\u51fa\u73b0\u7684\u60c5\u51b5\u53ca\u5e94\u5bf9\u7684\u65b9\u6cd5\uff1b\u8bbe\u8ba1\u4efb\u52a1\u5b8c\u6210\u540e\u5c55\u793a\u4e0e\u4ea4\u6d41\u7684\u65b9\u5f0f\u3002\n\n6.\u5728\u95ee\u9898\u6216\u4efb\u52a1\u63a8\u8fdb\u7684\u4e0d\u540c\u9636\u6bb5\uff0c\u9009\u62e9\u6070\u5f53\u7684\u8bc4\u4ef7\u65b9\u5f0f\u5f00\u5c55\u591a\u5143\u8bc4\u4ef7\u3002\n\n# \u516d\u3001\u677f\u4e66\u8bbe\u8ba1\n\n\u677f\u4e66\u5185\u5bb9\u76f4\u89c2\u6e05\u6670\uff0c\u63d0\u7eb2\u6308\u9886\uff0c\u5bcc\u4e8e\u542f\u53d1\u6027\uff1b\u9002\u5f53\u7559\u6709\u5b66\u751f\u53c2\u4e0e\u8bfe\u5802\u677f\u4e66\u7684\u673a\u4f1a\uff0c\u4f53\u73b0\u8bed\u6587\u5b66\u4e60\u7684\u8fc7\u7a0b\u6027\u548c\u601d\u7ef4\u7684\u53ef\u89c6\u5316\u3002\n\n# \u4e03\u3001\u4f5c\u4e1a\u8bbe\u8ba1\n\n\u8bed\u6587\u4f5c\u4e1a\u662f\u8bed\u6587\u6559\u5b66\u7684\u91cd\u8981\u7ec4\u6210\u90e8\u5206\uff0c\u8d2f\u7a7f\u5e76\u5f15\u9886\u5b66\u751f\u5b66\u4e60\u8fc7\u7a0b\uff0c\u8981\u5f3a\u8c03\u4f5c\u4e1a\u8bbe\u8ba1\u7684\u201c\u5355\u5143\u89c6\u89d2\u201d\u201c\u76ee\u6807\u5bfc\u5411\u201d\u201c\u7cfb\u7edf\u8bbe\u8ba1\u201d\u548c\u201c\u8bca\u65ad\u6539\u8fdb\u201d\u3002\n\n# \u516b\u3001\u6559\u5b66\u53cd\u601d\n\n\u6559\u5b66\u53cd\u601d\u805a\u7126\u6838\u5fc3\u7d20\u517b\u76ee\u6807\u7684\u8fbe\u6210\u60c5\u51b5\uff0c\u53ef\u6307\u5411\u6838\u5fc3\u77e5\u8bc6\u662f\u5426\u6b63\u786e\u7cbe\u51c6\u3001\u4efb\u52a1\u5c42\u7ea7\u7684\u903b\u8f91\u662f\u5426\u5408\u7406\u3001\u5b66\u4e60\u652f\u67b6\u662f\u5426\u5951\u5408\u5b66\u751f\u9700\u6c42\u3001\u8bed\u8a00\u6d3b\u52a8\u7684\u601d\u7ef4\u542b\u91cf\u9ad8\u4f4e\u3001\u5b66\u751f\u4e3b\u4f53\u7684\u53c2\u4e0e\u7a0b\u5ea6\u7b49\u5173\u952e\u7ef4\u5ea6\u3002\n\n# \u2014\u2014\u4e0a\u8bfe\u5e38\u89c4\u2014\u2014\n\n# \u4e00\u3001\u603b\u4f53\u8981\u6c42\n\n# \uff08\u4e00\uff09\u8bfe\u5802\u7ec4\u7ec7\uff1a\u642d\u5efa\u8bed\u8a00\u5b9e\u8df5\u5e73\u53f0\n\n\u5e73\u8861\u5b66\u751f\u81ea\u4e3b\u5b66\u4e60\u4e0e\u6559\u5e08\u8bfe\u5802\u5f15\u5bfc\uff0c\u521b\u8bbe\u4e00\u4e2a\u5b89\u5168\u3001\u652f\u6301\u6027\u7684\u5b66\u4e60\u73af\u5883\uff1b\u52a8\u6001\u4f18\u5316\u5b66\u4e60\u4efb\u52a1\uff0c\u786e\u4fdd\u4efb\u52a1\u76ee\u6807\u3001\u8bc4\u4ef7\u6807\u51c6\u548c\u64cd\u4f5c\u6b65\u9aa4\u6e05\u6670\u660e\u786e\uff1b\u9f13\u52b1\u5b66\u751f\u4e3b\u52a8\u53c2\u4e0e\u5b66\u4e60\u5de5\u5177\uff08\u5982\u5199\u4f5c\u91cf\u8868\u3001\u9605\u8bfb\u5c0f\u8d34\u58eb\uff09\u7684\u5236\u5b9a\u8fc7\u7a0b\uff0c\u4ee5\u6b64\u5f3a\u5316\u8fd0\u7528\u8bed\u6587\u77e5\u8bc6\u89e3\u51b3\u5b9e\u9645\u95ee\u9898\u7684\u610f\u8bc6\uff1b\u63d0\u4f9b\u591a\u6837\u5316\u7684\u5b66\u4e60\u8d44\u6e90\uff0c\u5f15\u5bfc\u5b66\u751f\u5728\u5177\u4f53\u60c5\u5883\u4e2d\u53d1\u73b0\u95ee\u9898\u3001\u63d0\u51fa\u95ee\u9898\uff0c\u901a\u8fc7\u7ec4\u7ec7\u8ba8\u8bba\u3001\u5c55\u793a\u7b49\u65b9\u5f0f\u9a71\u52a8\u63a2\u7a76\uff0c\u6784\u5efa\u4e30\u5bcc\u3001\u6d3b\u8dc3\u7684\u8bed\u8a00\u5b9e\u8df5\u5e73\u53f0\u3002\n\n# \uff08\u4e8c\uff09\u5b66\u4e60\u6307\u5bfc\uff1a\u57f9\u517b\u8bed\u6587\u5173\u952e\u80fd\u529b\n\n\u6559\u5e08\u91c7\u7528\u89c2\u5bdf-\u4ecb\u5165\u7b56\u7565\uff0c\u5f3a\u8c03\u8fc7\u7a0b\u6027\u6307\u5bfc\uff0c\u9f13\u52b1\u5b66\u751f\u7ed8\u5236\u601d\u7ef4\u5bfc\u56fe\u3001\u8bb0\u5f55\u5173\u952e\u8bcd\u7b49\u65b9\u5f0f\u5916\u5316\u601d\u7ef4\u8fc7\u7a0b\uff0c\u4ee5\u6b64\u652f\u6301\u4ed6\u4eec\u5bf9\u6587\u672c\u5c55\u5f00\u72ec\u7acb\u5206\u6790\u3001\u8fa9\u8bc1\u601d\u8003\u548c\u5ba1\u7f8e\u9274\u8d4f\uff1b\u5f15\u5bfc\u5b66\u751f\u57fa\u4e8e\u9605\u8bfb\u548c\u751f\u6d3b\u5b9e\u9645\uff0c\u5b66\u4e60\u89e3\u51b3\u95ee\u9898\u7684\u601d\u8def\u548c\u65b9\u6cd5\uff0c\u5e76\u80fd\u89c2\u70b9\u9c9c\u660e\u3001\u8bc1\u636e\u5145\u5206\u3001\u5408\u4e4e\u903b\u8f91\u5730\u8868\u8fbe\uff1b\u5728\u5408\u4f5c\u5b66\u4e60\u4e2d\u5f3a\u5316\u8bed\u7528\u5b9e\u8df5\uff0c\u660e\u786e\u8d44\u6599\u641c\u96c6\u3001\u6587\u672c\u5206\u6790\u3001\u6210\u679c\u6c47\u62a5\u7b49\u9636\u6bb5\u4e2d\u7684\u89d2\u8272\u5206\u5de5\uff0c\u5e76\u901a\u8fc7\u89d2\u8272\u8f6e\u6362\u4fdd\u969c\u53c2\u4e0e\u5ea6\uff0c\u786e\u4fdd\u6bcf\u4f4d\u5b66\u751f\u90fd\u80fd\u83b7\u5f97\u5168\u9762\u7684\u8bed\u6587\u5b66\u4e60\u4f53\u9a8c\uff1b\u5173\u6ce8\u5b66\u751f\u7684\u4e2a\u4f53\u5dee\u5f02\uff0c\u4e3a\u4e0d\u540c\u80fd\u529b\u548c\u9700\u6c42\u7684\u5b66\u751f\u63d0\u4f9b\u4e2a\u6027\u5316\u7684\u652f\u6301\u548c\u6307\u5bfc\u3002\n\n# \uff08\u4e09\uff09\u5206\u4eab\u4e92\u52a8\uff1a\u6fc0\u53d1\u8bed\u6587\u601d\u7ef4\u6d3b\u529b\n\n\u5728\u6210\u679c\u5c55\u793a\u73af\u8282\uff0c\u5b66\u751f\u53ef\u6839\u636e\u4efb\u52a1\u7279\u70b9\uff0c\u7075\u6d3b\u9009\u62e9\u4e2a\u4eba\u9648\u8ff0\u6c47\u62a5\uff0c\u6216\u901a\u8fc7\u5c0f\u7ec4\u534f\u4f5c\u5b8c\u6210\u7cfb\u7edf\u6027\u5c55\u793a\u3002\u4e92\u8bc4\u9636\u6bb5\uff0c\u5b66\u751f\u76f8\u4e92\u95f4\u63d0\u51fa\u5efa\u8bbe\u6027\u610f\u89c1\uff0c\u518d\u6839\u636e\u81ea\u8eab\u5b66\u4e60\u60c5\u51b5\u5408\u7406\u91c7\u7eb3\uff0c\u4ee5\u63a8\u52a8\u5143\u8ba4\u77e5\u80fd\u529b\u53d1\u5c55\u3002\u6559\u5e08\u5219\u4f9d\u636e\u6559\u5b66\u76ee\u6807\uff0c\u52a8\u6001\u76d1\u6d4b\u5b66\u4e60\u8fc7\u7a0b\uff0c\u65e2\u8981\u53ca\u65f6\u8d5e\u8d4f\u4e2a\u6027\u5316\u601d\u7ef4\u4eae\u70b9\uff0c\u4e5f\u8981\u654f\u9510\u8bc6\u522b\u5b66\u751f\u5b58\u5728\u7684\u56f0\u96be\u3002\u6559\u5e08\u9488\u5bf9\u5171\u6027\u7591\u96be\uff0c\u57fa\u4e8e\u8bca\u65ad\u7075\u6d3b\u8c03\u6574\u7b56\u7565\uff0c\u9002\u65f6\u63d0\u4f9b\u5b66\u4e60\u652f\u67b6\uff08\u5982\u8303\u4f8b\u3001\u63d0\u793a\u6027\u95ee\u9898\u3001\u601d\u7ef4\u5de5\u5177\u7b49\uff09\uff0c\u6307\u5bfc\u5b66\u751f\u7efc\u5408\u8fd0\u7528\u6bd4\u8f83\u3001\u5206\u6790\u3001\u6982\u62ec\u3001\u63a8\u7406\u7b49\u591a\u79cd\u601d\u7ef4\u65b9\u6cd5\u81ea\u4e3b\u63a2\u7a76\u3002\n\n# \u4e8c\u3001\u5355\u5143\u5177\u4f53\u8bfe\u578b\u8981\u6c42\n\n\u6559\u5e08\u9700\u6839\u636e\u5177\u4f53\u5b66\u60c5\u3001\u6559\u5b66\u76ee\u6807\u53ca\u65f6\u95f4\u5b89\u6392\uff0c\u9009\u62e9\u76f8\u5e94\u7684\u8bfe\u578b\uff0c\u4f7f\u4e0d\u540c\u8bfe\u578b\u4f18\u52bf\u4e92\u8865\uff0c\u5171\u540c\u670d\u52a1\u4e8e\u5b66\u751f\u6838\u5fc3\u7d20\u517b\u7684\u6301\u7eed\u53d1\u5c55\u3002\n\n# \uff08\u4e00\uff09\u9605\u8bfb\n\n\u5355\u5143\u9605\u8bfb\u6559\u5b66\u9700\u7acb\u8db3\u6574\u4f53\uff0c\u660e\u786e\u6587\u672c\u529f\u80fd\uff0c\u7cbe\u51c6\u670d\u52a1\u5355\u5143\u76ee\u6807\uff0c\u901a\u8fc7\u201c\u6559\u8bfb\u201d ![](data:image/emf;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAlCAYAAAB7yHheAAAAAXNSR0IArs4c6QAAAHhlWElmTU0AKgAAAAgABQESAAMAAAABAAEAAAEaAAUAAAABAAAASgEbAAUAAAABAAAAUgEoAAMAAAABAAIAAIdpAAQAAAABAAAAWgAAAAAAAACQAAAAAQAAAJAAAAABAAKgAgAEAAAAAQAAAAqgAwAEAAAAAQAAACUAAAAA3QLYaAAAAAlwSFlzAAAWJQAAFiUBSVIk8AAAAIVJREFUOBFjZGBg+AvE/4AYH2ABSVbiUwGV+8xEhCKwklGFeENqxARPPjAYbJCDAlcyEwIqugJV/JkRyFgFxBZAjA2IAgV/ADE84TIDOeiYByh2HojDgBiecEHZAR3nAMXagBhkI8RIEAML6EAWG1ZRCApIJyAGByiyL9HYbGj8Ue6gCQEAUCgS14gKrs8AAAAASUVORK5CYII=)\u00a0\u201c\u81ea\u8bfb\u201d ![](data:image/emf;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAlCAYAAAB7yHheAAAAAXNSR0IArs4c6QAAAHhlWElmTU0AKgAAAAgABQESAAMAAAABAAEAAAEaAAUAAAABAAAASgEbAAUAAAABAAAAUgEoAAMAAAABAAIAAIdpAAQAAAABAAAAWgAAAAAAAACQAAAAAQAAAJAAAAABAAKgAgAEAAAAAQAAAAqgAwAEAAAAAQAAACUAAAAA3QLYaAAAAAlwSFlzAAAWJQAAFiUBSVIk8AAAAIVJREFUOBFjZGBg+AvE/4AYH2ABSVbiUwGV+8xEhCKwklGFeENqxARPPjAYbJCDAlcyEwIqugJV/JkRyFgFxBZAjA2IAgV/ADE84TIDOeiYByh2HojDgBiecEHZAR3nAMXagBhkI8RIEAML6EAWG1ZRCApIJyAGByiyL9HYbGj8Ue6gCQEAUCgS14gKrs8AAAAASUVORK5CYII=)\u00a0\u201c\u8bfe\u5916\u9605\u8bfb\u201d\u7684\u6e10\u8fdb\u8def\u5f84\uff0c\u4f9d\u6258\u7ed3\u6784\u5316\u4efb\u52a1\u94fe\uff0c\u9010\u6b65\u5b66\u4f1a\u9605\u8bfb\u3002\u5f00\u5c55\u6717\u8bfb\u3001\u54c1\u5473\u3001\u8054\u60f3\u3001\u60f3\u8c61\u3001\u4f53\u9a8c\u3001\u63a2\u7a76\u3001\u8d28\u7591\u3001\u62bd\u8c61\u3001\u63a8\u7406\u7b49\u6d3b\u52a8\uff0c\u5f15\u5bfc\u5b66\u751f\u7406\u89e3\u6587\u672c\u610f\u4e49\uff0c\u53d1\u73b0\u8a00\u8bed\u7279\u8d28\u3002\u52a0\u5f3a\u5bf9\u5b66\u751f\u9605\u8bfb\u65b9\u6cd5\u7684\u6307\u5bfc\uff0c\u9f13\u52b1\u5b66\u751f\u5f00\u5c55\u81ea\u4e3b\u6027\u9605\u8bfb\uff0c\u901a\u8fc7\u591a\u89d2\u5ea6\u3001\u6709\u521b\u610f\u7684\u9605\u8bfb\uff0c\u63d0\u5347\u5b66\u751f\u601d\u7ef4\u54c1\u8d28\u3002\n\n\u6574\u672c\u4e66\u9605\u8bfb\u8bfe\u9700\u5efa\u6784\u6574\u672c\u4e66\u9605\u8bfb\u7cfb\u5217\u8bfe\u578b\uff0c\u4ece\u5bfc\u8bfb\u5230\u7cbe\u8bfb\u518d\u5230\u4e13\u9898\u9605\u8bfb\uff0c\u4ece\u800c\u5b9e\u73b0\u201c\u6df1\u5ea6\u9605\u8bfb\u201d\u3002\n\n# \uff08\u4e8c\uff09\u5199\u4f5c\n\n\u5199\u4f5c\u6d3b\u52a8\u5e94\u6df1\u5ea6\u878d\u5165\u5404\u8bed\u6587\u5b66\u4e60\u4efb\u52a1\u7fa4\uff0c\u5728\u771f\u5b9e\u8bed\u8a00\u5b9e\u8df5\u4e2d\u5c55\u5f00\u3002\u4f9d\u636e\u6559\u6750\uff0c\u91cd\u89c6\u5199\u4f5c\u7c7b\u578b\uff08\u5b9e\u7528/\u6587\u5b66/\u8bba\u8ff0\uff09\u7684\u529f\u80fd\u5dee\u5f02\uff0c\u8bbe\u8ba1\u87ba\u65cb\u4e0a\u5347\u7684\u4efb\u52a1\u5e8f\u5217\uff0c\u7cfb\u7edf\u57f9\u80b2\u5199\u4f5c\u80fd\u529b\u3002\u8981\u5f3a\u5316\u8fc7\u7a0b\u6027\u6307\u5bfc\uff0c\u7740\u529b\u5f15\u5bfc\u5b66\u751f\u8054\u7ed3\u751f\u6d3b\u3001\u89c2\u5bdf\u4f53\u609f\uff0c\u5e76\u501f\u52a9\u9636\u6bb5\u6027\u7684\u53cd\u9988\u4e0e\u9488\u5bf9\u6027\u652f\u67b6\uff0c\u4e3a\u5176\u6253\u901a\u601d\n\n\u7ef4\u8def\u5f84\uff0c\u652f\u6301\u5199\u4f5c\u5168\u7a0b\u3002\u6ce8\u91cd\u8bfb\u5199\u6709\u673a\u6574\u5408\uff0c\u5c06\u6458\u8981\u3001\u77ed\u8bc4\u3001\u7eed\u5199\u7b49\u529f\u80fd\u6027\u5199\u4f5c\u4ecb\u5165\u9605\u8bfb\u8fc7\u7a0b\uff0c\u5b9e\u73b0\u4ee5\u5199\u4fc3\u8bfb\uff1b\u5f15\u5bfc\u5b66\u751f\u5c06\u9605\u8bfb\u4e60\u5f97\u8f6c\u5316\u4e3a\u5199\u4f5c\u8d44\u6e90\uff0c\u4ee5\u8bfb\u4fc3\u5199\uff0c\u5b9e\u73b0\u7b56\u7565\u6027\u8bed\u8a00\u5efa\u6784\u3002\n\n# \uff08\u4e09\uff09\u9605\u8bfb\u7efc\u5408\u5b9e\u8df5\n\n\u5b8c\u6210\u9605\u8bfb\u7efc\u5408\u5b9e\u8df5\u7684\u6559\u5b66\u6709\u591a\u79cd\u65b9\u5f0f\u3002\u7ebf\u6027\u8054\u901a\u5f0f\uff1a\u4f9d\u5e8f\u5b8c\u6210\u5355\u5143\u5355\u7bc7\u7cbe\u8bfb\uff0c\u63d0\u70bc\u5171\u6027\u80fd\u529b\u951a\u70b9\uff0c\u518d\u6574\u5408\u591a\u7bc7\u5f00\u5c55\u6bd4\u8f83\u3001\u6eaf\u6e90\u3001\u4e3b\u9898\u63a2\u7a76\u7b49\u7efc\u5408\u5b9e\u8df5\u3002\u52a8\u6001\u5d4c\u5165\u5f0f\uff1a\u6839\u636e\u6559\u5b66\u8fdb\u7a0b\uff0c\u5c06\u7efc\u5408\u5b9e\u8df5\u62c6\u89e3\u4e3a\u9636\u6bb5\u6027\u4efb\u52a1\uff0c\u5728\u5355\u7bc7\u6559\u5b66\u4e2d\u9002\u65f6\u5207\u5165\u201c\u9605\u8bfb\u7efc\u5408\u5b9e\u8df5\u201d\u7684\u5185\u5bb9\u3002\u4efb\u52a1\u7edf\u6574\u5f0f\uff1a\u4ee5\u771f\u5b9e\u60c5\u5883\u4efb\u52a1\u7edf\u9886\u5355\u5143\uff0c\u6253\u901a\u5355\u5143\u5185\u5bb9\uff0c\u4f7f\u6240\u6709\u9605\u8bfb\u7efc\u5408\u5b9e\u8df5\u81ea\u7136\u5d4c\u5165\u95ee\u9898\u89e3\u51b3\u94fe\u6761\uff0c\u5b9e\u73b0\u5168\u57df\u6574\u5408\u3002\n\n# \uff08\u56db\uff09\u4e13\u9898\u5b66\u4e60\u6d3b\u52a8\n\n\u65e8\u5728\u6253\u901a\u542c\u3001\u8bf4\u3001\u8bfb\u3001\u5199\u6d3b\u52a8\u754c\u9650\uff0c\u878d\u5408\u751f\u6d3b\u548c\u8bed\u6587\uff0c\u6784\u5efa\u7efc\u5408\u6027\u8bed\u8a00\u5b9e\u8df5\u7cfb\u7edf\u3002\u53ef\u4ee5\u7528\u8de8\u5b66\u79d1\u4e3b\u9898\u5f0f\u5b66\u4e60\u3001\u9879\u76ee\u5f0f\u5b66\u4e60\u6216\u7814\u7a76\u6027\u5b66\u4e60\u7684\u65b9\u5f0f\u6765\u5f00\u5c55\u4e13\u9898\u5b66\u4e60\u6d3b\u52a8\uff0c\u4ee5\u771f\u5b9e\u95ee\u9898\u4e3a\u9a71\u52a8\uff0c\u5f15\u5bfc\u5b66\u751f\u5728\u5177\u4f53\u60c5\u5883\u4e2d\u5bf9\u95ee\u9898\u5c55\u5f00\u63a2\u7a76\u3002\n\n# \uff08\u4e94\uff09\u6d3b\u52a8\u00b7\u63a2\u7a76\u5355\u5143\n\n\u6d3b\u52a8\u00b7\u63a2\u7a76\u5355\u5143\u7684\u76ee\u6807\u786e\u7acb\u8981\u4ece\u5355\u4e00\u8d70\u5411\u7efc\u5408\uff0c\u9605\u8bfb\u6559\u5b66\u65b9\u5f0f\u8981\u4ece\u5355\u7bc7\u8d70\u5411\u7fa4\u6587\uff0c\u6d3b\u52a8\u7ec4\u7ec7\u5b9e\u65bd\u4ece\u5c01\u95ed\u8d70\u5411\u5f00\u653e\uff1b\u53ef\u7528\u201c\u60c5\u5883\u5316\u201d\u201c\u9879\u76ee\u5316\u201d\u7b49\u5b66\u4e60\u65b9\u5f0f\uff0c\u6307\u5bfc\u5b66\u751f\u56f4\u7ed5\u9879\u76ee\uff0c\u5728\u8a00\u8bed\u5b9e\u8df5\u4e0e\u95ee\u9898\u63a2\u7a76\u8fc7\u7a0b\u4e2d\uff0c\u4ee5\u5c0f\u7ec4\u5408\u4f5c\u7684\u5f62\u5f0f\u5b8c\u6210\u9879\u76ee\u3002\n\n# \uff08\u516d\uff09\u5176\u4ed6\u8bfe\u578b\n\n\u5355\u5143\u8d77\u59cb\u8bfe\uff0c\u65e8\u5728\u5e2e\u52a9\u5b66\u751f\u6574\u4f53\u628a\u63e1\u5355\u5143\u5b66\u4e60\u5185\u5bb9\uff0c\u660e\u786e\u6838\u5fc3\u4efb\u52a1\u4e0e\u5b66\u4e60\u8def\u5f84\uff0c\u4ee5\u6b64\u6fc0\u6d3b\u5176\u5185\u5728\u9a71\u52a8\u529b\uff0c\u4e3a\u540e\u7eed\u7684\u6df1\u5ea6\u5b66\u4e60\u505a\u597d\u5145\u5206\u51c6\u5907\uff1b\u5355\u5143\u6574\u7406\u8bfe\uff0c\u5f15\u9886\u5b66\u751f\u81ea\u4e3b\u3001\u5408\u4f5c\u6574\u7406\u5355\u5143\u77e5\u8bc6\u4e0e\u6280\u80fd\uff0c\u4fc3\u4f7f\u77e5\u8bc6\u7ed3\u6784\u5316\uff0c\u6280\u80fd\u7cfb\u7edf\u5316\uff1b\u4e13\u9898\u590d\u4e60\u8bfe\uff0c\u4ee5\u6838\u5fc3\u6982\u5ff5\u4e3a\u8f74\uff0c\u8de8\u5355\u5143\u6574\u5408\u5b66\u4e60\u5185\u5bb9\uff0c\u521b\u8bbe\u771f\u5b9e\u8bed\u7528\u60c5\u5883\uff0c\u5f15\u5bfc\u5b66\u751f\u5728\u5bf9\u6bd4\u3001\u5206\u6790\u8bed\u8a00\u73b0\u8c61\u3001\u5178\u578b\u6587\u672c\uff08\u5305\u62ec\u5178\u578b\u4e60\u4f5c\uff09\u4e2d\u63d0\u70bc\u8bed\u8a00\u89c4\u5f8b\u6216\u5199\u4f5c\u7b56\u7565\uff0c\u5f62\u6210\u6982\u5ff5\u6027\u7406\u89e3\uff0c\u9a71\u52a8\u7ed3\u6784\u5316\u77e5\u8bc6\u7684\u521b\u9020\u6027\u5e94\u7528\u3002\n\n# \u2014\u2014\u4f5c\u4e1a\u5e38\u89c4\u2014\u2014\n\n\u4f5c\u4e1a\u5e94\u7acb\u8db3\u8bed\u6587\u6838\u5fc3\u7d20\u517b\uff0c\u7d27\u6263\u5355\u5143\u5b66\u4e60\u76ee\u6807\u8fdb\u884c\u6574\u4f53\u8bbe\u8ba1\u4e0e\u5e03\u7f6e\u3002\u9700\u91cd\u89c6\u542c\u8bf4\u8bfb\u5199\u80fd\u529b\u57f9\u517b\uff0c\u592f\u5b9e\u8bed\u6587\u5173\u952e\u80fd\u529b\uff0c\u52a8\u6001\u53cd\u6620\u5b66\u751f\u80fd\u529b\u63d0\u5347\u3001\u601d\u7ef4\u53d1\u5c55\u4e0e\u4e60\u60ef\u517b\u6210\u8fc7\u7a0b\uff0c\u52a9\u529b\u5b66\u751f\u8bed\u6587\u6838\u5fc3\u7d20\u517b\u6301\u7eed\u53d1\u5c55\u3002\n\n# \u4e00\u3001\u4f5c\u4e1a\u7684\u4f18\u5316\u4e0e\u5e03\u7f6e\n\n\u300a\u8bed\u6587\u4f5c\u4e1a\u672c\u300b\u7684\u4f7f\u7528\u9700\u7ed3\u5408\u5b66\u60c5\u7075\u6d3b\u8c03\u6574\uff0c\u5bf9\u5185\u5bb9\u8fdb\u884c\u9488\u5bf9\u6027\u589e\u5220\uff1b\u9700\u4f9d\u636e\u5b66\u4e60\u76ee\u6807\uff0c\u5bf9\u4f5c\u4e1a\u672c\u4efb\u52a1\u8fdb\u884c\u7ed3\u6784\u5316\u91cd\u7ec4\uff0c\u589e\u5f3a\u4efb\u52a1\u7cfb\u7edf\u6027\uff0c\u65e2\u4fbf\u4e8e\u5b66\u751f\u6709\u6761\u7406\u5730\u5f00\u5c55\u5b66\u4e60\uff0c\u4e5f\u80fd\u901a\u8fc7\u53cd\u9988\u7cbe\u51c6\u638c\u63e1\u5176\u5b66\u4e60\u72b6\u51b5\uff0c\u5b9e\u73b0\u5bfc\u5b66\u4e0e\u8bc4\u4ef7\u7684\u53cc\u91cd\u529f\u80fd\u3002\u540c\u65f6\uff0c\u53ef\u7ed3\u5408\u6559\u5b66\u9700\u6c42\u5e03\u7f6e\u5b9e\u8df5\u7c7b\u3001\u62d3\u5c55\u7c7b\u4f5c\u4e1a\uff08\u5982\u8bfb\u4e66\u5c0f\u8bba\u6587\u3001\u8bed\u6587\u4e3b\u9898\u624b\u6284\u62a5\u7b49\uff09\uff1b\u79ef\u6781\u63a2\u7d22\u8de8\u5b66\u79d1\u4f5c\u4e1a\uff0c\u63d0\u5347\u5b66\u751f\u5bf9\u8bed\u6587\u77e5\u8bc6\u7684\u73b0\n\n\u5b9e\u5e94\u7528\u4e0e\u8fc1\u79fb\u80fd\u529b\u3002\n\n\u4e25\u683c\u63a7\u5236\u4f5c\u4e1a\u603b\u91cf\uff0c\u5408\u7406\u8bbe\u7f6e\u4f5c\u4e1a\u96be\u5ea6\uff1b\u5b9e\u65bd\u5206\u5c42\u4f5c\u4e1a\u5e03\u7f6e\uff0c\u901a\u8fc7\u201c\u5fc5\u505a+\u9009\u505a+\u521b\u505a\u201d\u7684\u5f39\u6027\u8bbe\u8ba1\u6ee1\u8db3\u4e0d\u540c\u9700\u6c42\uff1a\u5fc5\u505a\u4f5c\u4e1a\u53ef\u5305\u542b\u5fc5\u80cc\u53e4\u8bd7\u6587\u3001\u5b57\u8bcd\u7ec3\u4e60\u7b49\u57fa\u7840\u5185\u5bb9\uff0c\u9009\u505a\u4f5c\u4e1a\u53ef\u63d0\u4f9b\u8bfe\u5916\u62d3\u5c55\u9605\u8bfb\u4e66\u76ee\u7b49\u63d0\u5347\u5185\u5bb9\uff0c\u4ee5\u6b64\u57f9\u517b\u5b66\u751f\u81ea\u4e3b\u7ba1\u7406\u80fd\u529b\uff1b\u642d\u914d\u591a\u5143\u8bc4\u4ef7\u673a\u5236\uff0c\u5145\u5206\u9002\u914d\u4e0d\u540c\u5b66\u751f\u7684\u53d1\u5c55\u9700\u6c42\u3002\n\n\u56f4\u7ed5\u771f\u5b9e\u573a\u666f\u4e0e\u4efb\u52a1\u9700\u6c42\u8fdb\u884c\u60c5\u5883\u5316\u8bbe\u8ba1\uff0c\u521b\u65b0\u4f5c\u4e1a\u5f62\u5f0f\uff0c\u5982\u8bfe\u5802\u5ef6\u4f38\u578b\u7684\u5c0f\u7ec4\u534f\u4f5c\u4f5c\u4e1a\uff08\u5982\u6821\u56ed\u4e3b\u9898\u9879\u76ee\u7b56\u5212\u3001\u5b66\u79d1\u95ee\u9898\u5171\u63a2\u7b49\uff09\uff0c\u6216\u5047\u671f\u81ea\u4e3b\u578b\u5b9e\u8df5\u63a2\u7a76\u4efb\u52a1\uff08\u5982\u540d\u8457\u6df1\u5ea6\u7814\u8bfb\u62a5\u544a\u3001\u5bb6\u4e61\u6c11\u4fd7\u6587\u5316\u8c03\u7814\u7b49\uff09\uff0c\u517c\u987e\u534f\u4f5c\u80fd\u529b\u4e0e\u72ec\u7acb\u63a2\u7a76\u7d20\u517b\u7684\u57f9\u517b\u3002\n\n# \u4e8c\u3001\u4f5c\u4e1a\u7684\u6279\u6539\u4e0e\u53cd\u9988\n\n\u4f5c\u4e1a\u6279\u6539\u9700\u505a\u5230\u53ca\u65f6\u3001\u89c4\u8303\uff0c\u907f\u514d\u7b80\u5355\u6807\u8bb0\uff0c\u5efa\u8bae\u91c7\u7528\u201c\u7b49\u7ea7\u5236+\u9f13\u52b1\u6027\u8bc4\u8bed\u201d\u76f8\u7ed3\u5408\u7684\u65b9\u5f0f\uff1b\u5bf9\u9519\u8bef\u7b54\u6848\u8fdb\u884c\u6070\u5f53\u6807\u6ce8\uff0c\u5bf9\u521b\u610f\u7b54\u6848\u7ed9\u4e88\u6fc0\u52b1\u6027\u53cd\u9988\uff1b\u4f5c\u6587\u6279\u6539\u5efa\u8bae\u91c7\u7528\u201c\u4eae\u70b9+\u95ee\u9898+\u5efa\u8bae\u201d\u6a21\u5f0f\uff0c\u91cd\u89c6\u9762\u6279\uff0c\u805a\u7126\u5347\u683c\uff0c\u901a\u8fc7\u5e08\u751f\u5bf9\u8bdd\u5171\u540c\u8bca\u65ad\u95ee\u9898\u3001\u5546\u5b9a\u4fee\u6539\u65b9\u6848\uff0c\u5e76\u8ffd\u8e2a\u4e8c\u6b21\u4fee\u8ba2\u6210\u6548\u3002\u5b9a\u671f\u5c55\u793a\u4f18\u79c0\u4f5c\u4e1a\uff0c\u6fc0\u53d1\u5b66\u751f\u5b66\u4e60\u79ef\u6781\u6027\uff1b\u6536\u96c6\u5178\u578b\u9519\u9898\u4e0e\u4f18\u79c0\u89e3\u7b54\uff0c\u5c06\u5176\u8f6c\u5316\u4e3a\u6559\u5b66\u8d44\u6e90\u3002\n\n\u4f5c\u4e1a\u53cd\u9988\u9700\u6ce8\u91cd\u53ca\u65f6\u6027\uff0c\u4e14\u5185\u5bb9\u5e94\u6db5\u76d6\u5b66\u751f\u7684\u4f5c\u4e1a\u6001\u5ea6\u4e0e\u4e60\u60ef\u3001\u601d\u8003\u8fc7\u7a0b\u3001\u4f5c\u4e1a\u6574\u7406\u4e0e\u53cd\u601d\u7b49\u65b9\u9762\uff0c\u52a9\u529b\u5b66\u751f\u5728\u5b8c\u6210\u4f5c\u4e1a\u7684\u8fc7\u7a0b\u4e2d\u5b9e\u73b0\u5b66\u4e60\u8fdb\u9636\u4e0e\u81ea\u6211\u6210\u957f\u3002\n\n# \u8bc4\u4ef7\u5e38\u89c4\n\n\u5021\u5bfc\u6784\u5efa\u4ee5\u8bed\u6587\u5b66\u4e60\u4efb\u52a1\u7fa4\u4e3a\u57fa\u672c\u67b6\u6784\u3001\u4ee5\u6838\u5fc3\u7d20\u517b\u53d1\u5c55\u4e3a\u5bfc\u5411\u7684\u521d\u4e2d\u8bed\u6587\u6d4b\u8bc4\uff08\u8bc4\u4ef7\uff09\u4f53\u7cfb\u3002\u4f9d\u636e\u4e0d\u540c\u4efb\u52a1\u7fa4\u7684\u9636\u6bb5\u7279\u5f81\u4e0e\u5b66\u4e60\u76ee\u6807\uff0c\u9009\u62e9\u591a\u6837\u5316\u7684\u8bc4\u4ef7\u5f62\u5f0f\uff0c\u5b9e\u73b0\u201c\u6559-\u5b66-\u8bc4\u201d\u7684\u4e00\u81f4\u6027\u3002\u901a\u8fc7\u53ca\u65f6\u3001\u7cbe\u51c6\u7684\u53cd\u9988\uff0c\u5f15\u5bfc\u5b66\u751f\u5728\u8bed\u6587\u5b9e\u8df5\u6d3b\u52a8\u4e2d\u8fdb\u884c\u81ea\u6211\u8c03\u63a7\u4e0e\u5b66\u4e60\u6539\u8fdb\uff0c\u4ece\u800c\u7efc\u5408\u63d0\u5347\u8bed\u6587\u6838\u5fc3\u7d20\u517b\u3002\n\n# 1. \u8bca\u65ad\u6027\u8bc4\u4ef7\n\n\u5728\u8bed\u6587\u6559\u5b66\u6d3b\u52a8\u5f00\u59cb\u524d\u6216\u6559\u5b66\u8fc7\u7a0b\u4e2d\uff0c\u901a\u8fc7\u95ee\u5377\u8c03\u67e5\u3001\u5148\u884c\u4efb\u52a1\u5355\u3001\u65e5\u5e38\u4f5c\u4e1a\u7b49\u65b9\u5f0f\uff0c\u5bf9\u5b66\u751f\u7684\u8bed\u6587\u80fd\u529b\u8fdb\u884c\u5168\u9762\u8bc4\u4f30\uff1a\u4e00\u65b9\u9762\u4e86\u89e3\u5b66\u751f\u8bed\u6587\u5b66\u4e60\u7684\u57fa\u7840\u6c34\u5e73\uff0c\u53e6\u4e00\u65b9\u9762\u8bca\u65ad\u5b66\u751f\u5b58\u5728\u7684\u5b66\u4e60\u56f0\u60d1\uff0c\u4ee5\u4fbf\u6709\u9488\u5bf9\u6027\u5730\u8c03\u6574\u6559\u5b66\u7b56\u7565\u4e0e\u65b9\u6cd5\u3002\n\n# 2. \u8868\u73b0\u6027\u8bc4\u4ef7\n\n\u5c06\u8868\u73b0\u6027\u8bc4\u4ef7\u878d\u5165\u8bed\u6587\u5b66\u4e60\u5168\u8fc7\u7a0b\uff0c\u8bbe\u8ba1\u8d34\u8fd1\u771f\u5b9e\u751f\u6d3b\u7684\u4efb\u52a1\u60c5\u5883\uff08\u5982\u65b0\u95fb\u64b0\u5199\u3001\u4eba\u7269\u8bbf\u8c08\u7b49\uff09\uff0c\u8ba9\u5b66\u751f\u5728\u5b9e\u8df5\u5e94\u7528\u4e2d\u5c55\u73b0\u8bed\u6587\u80fd\u529b\uff1b\u9700\u5236\u5b9a\u6e05\u6670\u7684\u5206\u7ea7\u8bc4\u4ef7\u6807\u51c6\uff0c\u4ece\u591a\u7ef4\u5ea6\u5f00\u5c55\u8bc4\u4ef7\uff0c\u5e76\u901a\u8fc7\u8bfe\u5802\u89c2\u5bdf\u3001\u4f5c\u54c1\u5206\u6790\u3001\u6210\u957f\u6863\u6848\u7b49\u65b9\u5f0f\uff0c\u5168\u9762\u8bb0\u5f55\u5b66\u751f\u5b8c\u6210\u4efb\u52a1\u8fc7\u7a0b\u4e2d\u7684\u8868\u73b0\uff1b\u5f15\u5bfc\u5b66\u751f\u5f00\u5c55\u81ea\u8bc4\u4e0e\u4e92\u8bc4\uff0c\u57f9\u517b\u5176\u81ea\u6211\u53cd\u601d\u4e0e\u8bc4\u4ef7\u80fd\u529b\uff0c\u6784\u5efa\u201c\u6559\u5e08\u8bc4\u4ef7+\u5b66\u751f\u4e92\u8bc4+\u81ea\u6211\u8bc4\u4ef7\u201d\u76f8\u7ed3\u5408\u7684\u591a\u5143\u8bc4\u4ef7\u4f53\u7cfb\u3002\n\n# 3. \u9636\u6bb5\u6027\u8bc4\u4ef7\n\n\u5728\u5355\u5143\u6216\u5b66\u671f\u5b66\u4e60\u7ed3\u675f\u540e\uff0c\u5e94\u8bbe\u8ba1\u4e0e\u8be5\u9636\u6bb5\u5b66\u4e60\u76ee\u6807\u76f8\u9002\u914d\u7684\u8bc4\u4ef7\u65b9\u5f0f\uff0c\u5bf9\u5b66\u751f\u7684\u9636\u6bb5\u6027\u5b66\u4e60\u8fdb\u884c\u5168\u9762\u3001\u7efc\u5408\u7684\u8bc4\u4ef7\u3002\u5355\u5143\u547d\u9898\u9700\u4fa7\u91cd\u8003\u67e5\u5355\u5143\u6838\u5fc3\u77e5\u8bc6\uff0c\u68c0\u9a8c\u5b66\u751f\u5bf9\u6838\u5fc3\u77e5\u8bc6\u7684\u7406\u89e3\u4e0e\u8fd0\u7528\u80fd\u529b\uff0c\u53ca\u65f6\u53d1\u73b0\u5b66\u751f\u5728\u672c\u5355\u5143\u5b66\u4e60\u4e2d\u7684\u95ee\u9898\uff0c\u4e3a\u540e\u7eed\u6559\u5b66\u8c03\u6574\u63d0\u4f9b\u4f9d\u636e\uff1b\u671f\u4e2d\u3001\u671f\u672b\u547d\u9898\u9700\u951a\u5b9a\u5bf9\u5e94\u5b66\u4e60\u9636\u6bb5\u7684\u6838\u5fc3\u77e5\u8bc6\uff0c\u7a81\u51fa\u77e5\u8bc6\u7684\u7cfb\u7edf\u6027\u3001\u7efc\u5408\u6027\u4e0e\u5e94\u7528\u6027\uff0c\u8003\u67e5\u5b66\u751f\u5bf9\u6240\u5b66\u77e5\u8bc6\u7684\u6574\u4f53\u628a\u63e1\u4e0e\u7075\u6d3b\u8fd0\u7528\u80fd\u529b\uff0c\u5b9e\u73b0\u5bf9\u9636\u6bb5\u5b66\u4e60\u7684\u5168\u9762\u8bc4\u4f30\u3002\n\n\u8bbe\u8ba1\u7eb8\u7b14\u6d4b\u8bd5\u9700\u6ce8\u91cd\u7d20\u517b\u7acb\u610f\uff0c\u4fdd\u8bc1\u8bd5\u5377\u89c4\u8303\u4e14\u96be\u5ea6\u9002\u5b9c\uff1b\u63a7\u5236\u7eb8\u7b14\u6d4b\u8bd5\u9891\u6b21\uff0c\u6d4b\u8bd5\u5b8c\u6210\u540e\uff0c\u9700\u6df1\u5165\u5f00\u5c55\u5178\u578b\u9519\u8bef\u5206\u6790\uff0c\u4e3a\u6559\u5b66\u6539\u8fdb\u4e0e\u5b66\u751f\u8f85\u5bfc\u63d0\u4f9b\u65b9\u5411\u3002\n\n# \u2014\u2014\u5b66\u79d1\u6821\u672c\u6559\u7814\u2014\u2014\n\n\u7acb\u8db3\u8bed\u6587\u5b66\u79d1\u7279\u8d28\uff0c\u575a\u6301\u201c\u4ee5\u7814\u4fc3\u6559\uff0c\u4ee5\u6559\u5e26\u7814\u201d\uff0c\u6784\u5efa\u5b66\u6821\u7cfb\u7edf\u5316\u3001\u5e38\u6001\u5316\u7684\u6559\u7814\u673a\u5236\uff0c\u901a\u8fc7\u89c4\u8303\u6559\u7814\u5f62\u5f0f\u3001\u660e\u786e\u6559\u7814\u5185\u5bb9\u3001\u4f18\u5316\u5b9e\u65bd\u8def\u5f84\uff0c\u4e0d\u65ad\u63d0\u5347\u6559\u7814\u54c1\u8d28\uff0c\u4fc3\u8fdb\u6559\u5e08\u53d1\u5c55\u3002\n\n# \u4e00\u3001\u6d3b\u52a8\u76ee\u6807\n\n\u4ee5\u6559\u7814\u7ec4\u6216\u5907\u8bfe\u7ec4\u4e3a\u4f9d\u6258\uff0c\u805a\u7126\u6559\u5b66\u5b9e\u9645\u95ee\u9898\u5f00\u5c55\u6559\u7814\u6d3b\u52a8\uff0c\u5f62\u6210\u53ef\u8f6c\u5316\u3001\u53ef\u5e94\u7528\u7684\u6559\u7814\u6210\u679c\uff0c\u670d\u52a1\u6559\u5b66\u6539\u8fdb\u4e0e\u6559\u5e08\u6210\u957f\u3002\n\n# \u4e8c\u3001\u6d3b\u52a8\u5185\u5bb9\n\n1.\u6559\u5b66\u7814\u7a76\u3002\u4ee5\u95ee\u9898\u4e3a\u5bfc\u5411\uff0c\u9488\u5bf9\u6559\u5b66\u5b9e\u8df5\u4e2d\u7684\u56f0\u60d1\u786e\u7acb\u7814\u7a76\u4e3b\u9898\u3002\u53ef\u5f00\u5c55\u6559\u6750\u6587\u672c\u89e3\u8bfb\u3001\u5355\u5143\u6574\u4f53\u6559\u5b66\u3001\u5355\u5143\u89c6\u57df\u4e0b\u5355\u7bc7\u6559\u5b66\u3001\u6587\u4f53\u6559\u5b66\u7b56\u7565\u7b49\u6559\u5b66\u4e13\u9898\u7814\u8ba8\uff1b\u4e5f\u53ef\u4ee5\u7ec4\u7ec7\u547d\u9898\u7814\u7a76\uff0c\u5982\u4e2d\u8003\u771f\u9898\u5206\u6790\u3001\u539f\u521b\u8bd5\u9898\u547d\u5236\u4e0e\u8bc4\u4ef7\u6807\u51c6\u7814\u4fee\u7b49\u6d3b\u52a8\u3002\u6ce8\u91cd\u8fc7\u7a0b\u79ef\u7d2f\uff0c\u529b\u6c42\u6210\u679c\u8f93\u51fa\uff0c\u5c06\u5b9e\u8df5\u8fc7\u7a0b\u4e0e\u601d\u8003\u8f6c\u5316\u4e3a\u8bba\u6587\u3001\u6848\u4f8b\u548c\u6821\u672c\u4f5c\u4e1a\u7b49\u3002\n\n2. \u8bfe\u7a0b\u5f00\u53d1\u3002\u7ed3\u5408\u6559\u6750\u5185\u5bb9\uff0c\u9009\u62e9\u6709\u5229\u4e8e\u7ec4\u7ec7\u548c\u5b9e\u65bd\u8bed\u6587\u7efc\u5408\u6027\u5b9e\u8df5\u6d3b\u52a8\u7684\u4f18\u8d28\u8d44\u6e90\uff0c\u6784\u5efa\u7279\u8272\u8bfe\u7a0b\u3002\u53ef\u8bbe\u8ba1\u7ecf\u5178\u8bf5\u8bfb\u8bfe\u7a0b\u3001\u5199\u4f5c\u5e8f\u5217\u8bfe\u7a0b\u6216\u6784\u5efa\u201c\u5fae\u5199\u4f5c\u2014\u9879\u76ee\u5f0f\u5199\u4f5c\u2014\u521b\u610f\u5199\u4f5c\u201d\u68af\u5ea6\u5199\u4f5c\u4f53\u7cfb\u7b49\u3002\n3. \u8bfb\u4e66\u7814\u4fee\u3002\u5f00\u5c55\u4e13\u4e1a\u9605\u8bfb\uff0c\u5b9a\u671f\u5171\u8bfb\u8bed\u6587\u5b66\u79d1\u6559\u5b66\u4e13\u8457\uff1b\u7ec4\u7ec7\u7ecf\u5178\u5171\u7814\uff0c\u56f4\u7ed5\u7ecf\u5178\u6587\u672c\u8fdb\u884c\u6df1\u5ea6\u7814\u8bfb\uff1b\u4fc3\u8fdb\u6210\u679c\u8f6c\u5316\uff0c\u4e3e\u529e\u8bfb\u4e66\u4f1a\uff0c\u64b0\u5199\u8bfb\u4e66\u5fc3\u5f97\u4e0e\u53cd\u601d\u672d\u8bb0\u7b49\u3002\n\n# \u4e09\u3001\u6d3b\u52a8\u5f62\u5f0f\n\n1.\u96c6\u4f53\u5907\u8bfe\u3002\u5b9a\u671f\u5b9a\u65f6\u6709\u5e8f\u5f00\u5c55\u96c6\u4f53\u5907\u8bfe\uff0c\u6539\u53d8\u201c\u5206\u5de5\u5907\u8bfe\u201d\u7684\u4e60\u60ef\uff0c\u5728\u6559\u5e08\u72ec\u7acb\u5907\u8bfe\u7684\u57fa\u7840\u4e0a\u7ec4\u7ec7\u7814\u8ba8\uff0c\u5bf9\u6559\u5b66\u95ee\u9898\u5f00\u5c55\u96c6\u4f53\u5bfb\u7b56\uff0c\u65e8\u5728\u7814\u8ba8\u5178\u578b\u5185\u5bb9\uff0c\u89e3\u51b3\u5b9e\u9645\u95ee\u9898\u3002\n\n2.\u542c\u8bfe\u8bc4\u8bfe\u3002\u5f00\u5c55\u516c\u5f00\u6559\u5b66\u6d3b\u52a8\uff0c\u8bfe\u540e\u7ec4\u7ec7\u96c6\u4f53\u8bc4\u8bfe\u8bae\u8bfe\u6d3b\u52a8\uff0c\u56f4\u7ed5\u6559\u7814\u4e3b\u9898\u6df1\u5165\u7814\u8ba8\uff0c\u53d1\u73b0\u95ee\u9898\uff0c\u5171\u540c\u63a2\u8ba8\u89e3\u51b3\u65b9\u6848\uff0c\u5206\u4eab\u6559\u5b66\u7ecf\u9a8c\u548c\u7b56\u7565\uff0c\u5f62\u6210\u5171\u8bc6\u3002\n\n3.\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 \u4e13\u9898\u7814\u8ba8\u3002\u56f4\u7ed5\u6559\u80b2\u6559\u5b66\u70ed\u70b9\u3001\u96be\u70b9\u6216\u5171\u6027\u95ee\u9898\uff0c\u901a\u8fc7\u7406\u8bba\u5b66\u4e60\u3001\u5b9e\u8df5\u7814\u7a76\u3001\u6848\u4f8b\u5206\u6790\u3001\u7ecf\u9a8c\u4ea4\u6d41\u7b49\u65b9\u5f0f\uff0c\u8fdb\u884c\u6df1\u5165\u7814\u8ba8\u3002\n\n4.\u6821\u9645\u8054\u52a8\u6559\u7814\u3002\u4e0e\u5176\u4ed6\u5b66\u6821\u8054\u5408\u5f00\u5c55\u6559\u7814\u6d3b\u52a8\uff0c\u5efa\u7acb\u6709\u6548\u7684\u5408\u4f5c\u673a\u5236\uff0c\u5982\u4e92\u6d3e\u6559\u5e08\u542c\u8bfe\u3001\u5171\u540c\u5f00\u5c55\u8bfe\u9898\u7814\u7a76\u3001\u5171\u4eab\u6559\u7814\u8d44\u6e90\u7b49\uff0c\u4ee5\u6b64\u62d3\u5bbd\u89c6\u91ce\uff0c\u501f\u9274\u7ecf\u9a8c\uff0c\u8d44\u6e90\u5171\u4eab\u3002\n\n# \u2014\u2014\u5b66\u79d1\u5b66\u4e60\u529b\u57f9\u517b\u2014\u2014\n\n\u8bed\u6587\u5b66\u4e60\u529b\u662f\u6307\u5b66\u751f\u5728\u8bed\u6587\u5b66\u4e60\u8fc7\u7a0b\u4e2d\u8868\u73b0\u51fa\u7684\u7efc\u5408\u80fd\u529b\u4e0e\u7d20\u517b\u3002\u6559\u5e08\u5e94\u7acb\u8db3\u8bed\u6587\u5b66\u79d1\u7279\u70b9\uff0c\u591a\u7ef4\u5ea6\u6784\u5efa\u8bed\u6587\u5b66\u4e60\u529b\u57f9\u517b\u4f53\u7cfb\uff0c\u6307\u5bfc\u5b66\u751f\u517b\u6210\u826f\u597d\u7684\u8bed\u6587\u5b66\u4e60\u4e60\u60ef\uff0c\u5e2e\u52a9\u5b66\u751f\u5f62\u6210\u7ec8\u8eab\u53d7\u76ca\u7684\u8bed\u6587\u5b66\u4e60\u80fd\u529b\u3002\n\n# \u4e00\u3001\u4e60\u60ef\u57f9\u517b\uff1a\u592f\u5b9e\u8bed\u6587\u5b66\u4e60\u6839\u57fa\n\n1.\u65e5\u5e38\u4e60\u60ef\u57f9\u517b\u3002\u6307\u5bfc\u5b66\u751f\u719f\u7ec3\u4f7f\u7528\u5de5\u5177\u4e66\u72ec\u7acb\u8bc6\u5b57\uff0c\u5e76\u4fdd\u6301\u826f\u597d\u7684\u4e66\u5199\u4e60\u60ef\uff1b\u6307\u5bfc\u5b66\u751f\u517b\u6210\u9884\u4e60\u4e60\u60ef\uff0c\u626b\u6e05\u5b57\u8bcd\u969c\u788d\uff0c\u628a\u63e1\u6587\u7ae0\u8109\u7edc\uff0c\u63d0\u51fa\u4e2a\u6027\u5316\u7591\u95ee\uff1b\u5f15\u5bfc\u5b66\u751f\u5b66\u4e60\u6587\u660e\u5f97\u4f53\u5730\u4ea4\u6d41\uff0c\u8010\u5fc3\u4e13\u6ce8\u5730\u503e\u542c\uff0c\u9f13\u52b1\u5b66\u751f\u79ef\u6781\u63d0\u95ee\uff0c\u968f\u65f6\u8bb0\u5f55\uff1b\u57f9\u517b\u81ea\u4e3b\u5b66\u4e60\u4e60\u60ef\uff0c\u6307\u5bfc\u5b66\u751f\u6309\u7167\u4e00\u5b9a\u7684\u6807\u51c6\u6574\u7406\u5b66\u8fc7\u7684\u8bed\u8a00\u6750\u6599\uff0c\u68b3\u7406\u3001\u53cd\u601d\u81ea\u5df1\u8bed\u6587\u5b66\u4e60\u7684\u7ecf\u9a8c\uff0c\u5f15\u5bfc\u5b66\u751f\u81ea\u4e3b\u4f18\u5316\u5b66\u4e60\u8fc7\u7a0b\uff0c\u63d0\u5347\u5b66\u4e60\u6548\u679c\u3002\n\n2.\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 \u9605\u8bfb\u4e60\u60ef\u57f9\u517b\u3002\u5f15\u5bfc\u5b66\u751f\u517b\u6210\u8bf5\u8bfb\u4e60\u60ef\uff0c\u63d0\u5347\u8bed\u611f\uff1b\u6307\u5bfc\u5b66\u751f\u5728\u9605\u8bfb\u4e2d\u8fd0\u7528\u7cbe\u8bfb\u4e0e\u6cdb\u8bfb\u7b49\u7b56\u7565\uff0c\u7406\u89e3\u6587\u672c\u5185\u5bb9\uff0c\u4f53\u5473\u8bed\u8a00\u8fd0\u7528\uff0c\u5e76\u9010\u6b65\u5efa\u7acb\u6587\u4f53\u610f\u8bc6\uff1b\u5728\u7bc7\u7ae0\u4e0e\u6574\u672c\u4e66\u9605\u8bfb\u4e2d\uff0c\u5f15\u5bfc\u5b66\u751f\u517b\u6210\u505a\u6279\u6ce8\u3001\u5199\u7b14\u8bb0\u7684\u4e60\u60ef\uff0c\u53ca\u65f6\u8bb0\u5f55\u7591\u95ee\u3001\u611f\u609f\u4e0e\u8054\u60f3\uff0c\u53d1\u5c55\u7406\u89e3\u529b\u4e0e\u6279\u5224\u6027\u601d\u7ef4\uff0c\u5f62\u6210\u4e2a\u4eba\u89c1\u89e3\uff1b\u9f13\u52b1\u5b66\u751f\u62d3\u5c55\u8bfe\u5916\u9605\u8bfb\uff0c\u5e76\u79ef\u6781\u53c2\u4e0e\u9605\u8bfb\u4ea4\u6d41\u6d3b\u52a8\uff0c\u5206\u4eab\u9605\u8bfb\u5fc3\u5f97\uff0c\u5e76\u5c1d\u8bd5\u901a\u8fc7\u4eff\u5199\u3001\u77ed\u8bc4\u7b49\u65b9\u5f0f\u5c06\u8f93\u5165\u8f6c\u5316\u4e3a\u8f93\u51fa\u3002\n\n3.\u5199\u4f5c\u4e60\u60ef\u57f9\u517b\u3002\u6307\u5bfc\u5b66\u751f\u575a\u6301\u5199\u65e5\u5fd7\u3001\u968f\u7b14\u7b49\uff0c\u968f\u65f6\u8bb0\u5f55\u751f\u6d3b\u6216\u9605\u8bfb\u611f\u609f\uff1b\u6307\u5bfc\u5b66\u751f\u5efa\u7acb\u5199\u4f5c\u7d20\u6750\u5e93\uff0c\u5206\u7c7b\u6536\u96c6\u540d\u8a00\u4f73\u53e5\u3001\u751f\u6d3b\u7247\u6bb5\u3001\u65f6\u4e8b\u8bc4\u8bba\u7b49\uff1b\u6307\u5bfc\u5b66\u751f\u5f00\u5c55\u591a\u79cd\u5f62\u5f0f\u7684\u5199\u4f5c\u4ea4\u6d41\u3001\u5c55\u793a\u6d3b\u52a8\uff1b\u6307\u5bfc\u5b66\u751f\u53ca\u65f6\u53cd\u590d\u4fee\u6539\u81ea\u5df1\u7684\u4f5c\u6587\uff0c\u80fd\u4e0e\u4ed6\u4eba\u4e92\u76f8\u8bc4\u6539\u6216\u4ea4\u6d41\u5199\u4f5c\u5fc3\u5f97\u3002\n\n# \u4e8c\u3001\u5b66\u4e60\u80fd\u529b\u57f9\u517b\uff1a\u63d0\u5347\u8bed\u6587\u5b66\u4e60\u6548\u80fd\n\n1. \u72ec\u7acb\u601d\u8003\u80fd\u529b\u3002\u5728\u5b66\u4e60\u5b9e\u8df5\u6d3b\u52a8\u4e2d\uff0c\u8981\u7ed9\u4e88\u5b66\u751f\u5145\u5206\u7684\u72ec\u7acb\u601d\u8003\u7a7a\u95f4\u4e0e\u8868\u8fbe\u7684\u673a\u4f1a\uff1b\u6307\u5bfc\u5b66\u751f\u56f4\u7ed5\u95ee\u9898\uff0c\u641c\u96c6\u8d44\u6599\uff0c\u63d0\u53d6\u4fe1\u606f\uff0c\u6982\u62ec\u89c2\u70b9\uff1b\u5f15\u5bfc\u5b66\u751f\u79ef\u6781\u601d\u8003\uff0c\u52c7\u4e8e\u8868\u8fbe\uff0c\u4e0d\u4ec5\u505a\u5230\u6709\u4e2d\u5fc3\uff0c\u6709\u6839\u636e\uff0c\u6709\u6761\u7406\uff0c\u800c\u4e14\u80fd\u5229\u7528\u591a\u79cd\u8bc1\u636e\u5224\u65ad\u4fe1\u606f\u7684\u771f\u5b9e\u6027\u4e0e\u53ef\u4fe1\u5ea6\uff0c\u80fd\u8fd0\u7528\u5b9e\u8bc1\u6750\u6599\u5bf9\u4ed6\u4eba\u89c2\u70b9\u4f5c\u51fa\u4ef7\u503c\u5224\u65ad\u3002\n2. \u5408\u4f5c\u5b66\u4e60\u80fd\u529b\u3002\u5728\u8bed\u6587\u5b66\u4e60\u4e2d\uff0c\u7740\u529b\u57f9\u517b\u5b66\u751f\u7684\u5408\u4f5c\u63a2\u7a76\u80fd\u529b\u3002\u5f15\u5bfc\u5c0f\u7ec4\u56f4\u7ed5\u8bed\u6587\u5b66\u4e60\u4efb\u52a1\uff0c\u4f9d\u636e\u6210\u5458\u7279\u957f\u8fdb\u884c\u5206\u5de5\uff0c\u5728\u8d44\u6599\u641c\u96c6\u3001\u4fe1\u606f\u6574\u5408\u3001\u6210\u679c\u521b\u4f5c\u7b49\u73af\u8282\u4e2d\u534f\u540c\u5408\u4f5c\uff0c\u8fbe\u6210\u5b66\u4e60\u76ee\u6807\u3002\u6307\u5bfc\u5b66\u751f\u56f4\u7ed5\u6587\u672c\u5185\u5bb9\u3001\u8bed\u8a00\u5f62\u5f0f\u548c\u601d\u60f3\u5185\u6db5\u7b49\u5c55\u5f00\u5bf9\u8bdd\uff0c\u5b66\u4e60\u6709\u7406\u6709\u636e\u5730\u8868\u8fbe\u89c2\u70b9\u3002\u57f9\u517b\u5b66\u751f\u4e13\u6ce8\u503e\u542c\u7684\u4e60\u60ef\uff0c\u80fd\u591f\u51c6\u786e\u6355\u6349\u5e76\u6574\u5408\u5404\u79cd\u89c1\u89e3\uff0c\u8fd0\u7528\u89c4\u8303\u3001\u5f97\u4f53\u7684\u8bed\u8a00\u6e05\u6670\u5448\u73b0\u5c0f\u7ec4\u5b66\u4e60\u6210\u679c\u3002\u5f15\u5bfc\u5b66\u751f\u4ece\u5408\u4f5c\u5185\u5bb9\u3001\u8fc7\u7a0b\u3001\u6548\u679c\u7b49\u7ef4\u5ea6\u5f00\u5c55\u8bc4\u4ef7\uff0c\u5173\u6ce8\u5b66\u751f\u5728\u8bed\u8a00\u5b9e\u8df5\u4e2d\u7684\u8868\u73b0\u4e0e\u53d1\u5c55\uff0c\u901a\u8fc7\u5e08\u751f\u3001\u751f\u751f\u4e92\u8bc4\u63d0\u5347\u8bed\u6587\u7d20\u517b\u3002\n3. \u6df1\u5ea6\u63a2\u7a76\u80fd\u529b\u3002\u5f15\u5bfc\u5b66\u751f\u603b\u7ed3\u3001\u53cd\u601d\u9605\u8bfb\u7b56\u7565\uff1b\u6307\u5bfc\u5b66\u751f\u8fdb\u884c\u8bfb\u5199\u8f6c\u5316\uff0c\u57f9\u517b\u5b66\u751f\u6279\u5224\u6027\u9605\u8bfb\u4e0e\u5199\u4f5c\u80fd\u529b\uff1b\u57f9\u517b\u95ee\u9898\u610f\u8bc6\uff0c\u5e76\u9f13\u52b1\u5b66\u751f\u56f4\u7ed5\u95ee\u9898\uff0c\u8054\u7ed3\u73b0\u5b9e\u751f\u6d3b\u8fdb\u884c\u4e13\u9898\u5f0f\u7814\u8ba8\u3001\u6f14\u8bb2\u548c\u5199\u4f5c\uff0c\u89e3\u51b3\u771f\u5b9e\u95ee\u9898\u3002\n\n\u9644\u4ef6\uff1a1.\u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u6559\u5b66\u8ba1\u5212\u53c2\u8003\u683c\u5f0f\uff082025\u5e74\u7248\uff09\n\n2.\u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u5355\u5143\u6559\u5b66\u5907\u8bfe\u53c2\u8003\u683c\u5f0f\uff082025\u5e74\u7248\uff09\n\n3.\u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u8bfe\u65f6\u6559\u5b66\u5907\u8bfe\u53c2\u8003\u683c\u5f0f\uff082025\u5e74\u7248\uff09\n\n4.\u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u5b66\u79d1\u9605\u8bfb\u53c2\u8003\u4e66\u76ee\uff082025\u5e74\u7248\uff09\n\n5.\u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u6559\u5e08\u6559\u5b66\u5e38\u89c4\u8fc7\u7a0b\u6307\u5bfc\u53cd\u9988\u8868\uff082025\u5e74\u7248\uff09\n\n\u9644\u4ef61\n\n# \u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u6559\u5b66\u8ba1\u5212\u53c2\u8003\u683c\u5f0f\uff082025\u5e74\u7248\uff09\n\n# \u5b66\u5e74\u7b2c\u5b66\u671f\u6559\u5b66\u8ba1\u5212\n\n\u73ed\u7ea7\n\n\u5b66\u751f\u6570\n\n\u4efb\u8bfe\u6559\u5e08\n\n# \u4e00\u3001\u5b66\u671f\u6559\u5b66\u91cd\u70b9\n\n(\u4e3b\u8981\u5305\u62ec\u8bc6\u5b57\u4e0e\u5199\u5b57\u3001\u9605\u8bfb\u4e0e\u9274\u8d4f\u3001\u8868\u8fbe\u4e0e\u4ea4\u6d41\u3001\u68b3\u7406\u4e0e\u63a2\u7a76\u7b49\u65b9\u9762\u7684\u6559\u5b66\u91cd\u70b9\u5185\u5bb9)\n\n# \u4e8c\u3001\u5b66\u60c5\u5206\u6790\n\n(\u4e3b\u8981\u5305\u62ec\u5b66\u751f\u7684\u77e5\u8bc6\u57fa\u7840\u3001\u5b66\u4e60\u80fd\u529b\u3001\u5b66\u4e60\u5174\u8da3\u4e0e\u6001\u5ea6\u7b49)\n\n# \u4e09\u3001\u6559\u5b66\u4e3e\u63aa\n\n(\u4e3b\u8981\u5305\u62ec\u63d0\u5347\u5b66\u751f\u8bed\u6587\u7d20\u517b\u91c7\u53d6\u7684\u6559\u5b66\u6539\u8fdb\u4e3e\u63aa, \u5982\u4f18\u5316\u8bfe\u5802\u6559\u5b66\u3001\u5206\u5c42\u6559\u5b66\u7b49)\n\n# \u56db\u3001\u57f9\u4f18\u4e0e\u5e2e\u6276\n\n(\u4e3b\u8981\u5305\u62ec\u4e0d\u540c\u5c42\u6b21\u5b66\u751f\u7684\u9488\u5bf9\u6027\u6307\u5bfc\u4e0e\u5e2e\u6276\u63aa\u65bd)\n\n# \u4e94\u3001\u6559\u5b66\u8fdb\u5ea6\n\n|   |   |   |   |\n|---|---|---|---|\n|\u5468\u6b21|\u8d77\u6b62\u65f6\u95f4|\u6559\u5b66\u5185\u5bb9|\u5907\u6ce8|\n|||||\n|||||\n|||||\n|||||\n|||||\n|||||\n|||||\n|......||||\n\n# \u516d\u3001\u4e13\u9898\u6559\u5b66\u5b89\u6392\n\n(\u5728\u6574\u4f53\u6559\u5b66\u8fdb\u5ea6\u5b89\u6392\u7684\u57fa\u7840\u4e0a, \u53ef\u5bf9\u4e2a\u522b\u4e13\u9898\u6559\u5b66\u8fdb\u884c\u7cfb\u7edf\u89c4\u5212\u3002\u4ee5\u4e0b\u8868\u683c\u4f9b\u53c2\u8003\u3002)\n\n1.\u6574\u672c\u4e66\u9605\u8bfb\n\n|   |   |   |\n|---|---|---|\n|\u6708\u4efd|\u9605\u8bfb\u4e66\u76ee|\u4e3b\u8981\u9605\u8bfb\u6d3b\u52a8|\n||||\n||||\n|\u2026\u2026|||\n\n2.\u5199\u4f5c\n\n|   |   |\n|---|---|\n|\u65f6\u95f4|\u5199\u4f5c\u6307\u5bfc\u5185\u5bb9|\n|||\n|||\n|\u2026\u2026||\n\n3.\u4e13\u9898\u5b66\u4e60\u6d3b\u52a8\n\n|   |   |\n|---|---|\n|\u65f6\u95f4|\u6d3b\u52a8\u5185\u5bb9|\n|||\n|||\n|......||\n\n\uff08\u6839\u636e\u6559\u5b66\u5b9e\u9645\u53ef\u4ee5\u8c03\u6574\u8868\u683c\uff09\n\n# \u9644\u4ef62\n\n\u6e29\u5dde\u5e02\u521d\u4e2d\u8bed\u6587\u5355\u5143\u6559\u5b66\u5907\u8bfe\u53c2\u8003\u683c\u5f0f\uff082025\u5e74\u7248\uff09\n\n|   |   |   |\n|---|---|---|\n|\u5355\u5143\u57fa\u672c\u4fe1\u606f|\u5e74\u7ea7 \u518c \u7b2c \u5355\u5143 \u6559\u5b66\u8bfe\u65f6: \u8bbe\u8ba1\u8005:|   |\n|\u5355\u5143\u6559\u6750\u7814\u8bfb|\u7acb\u8db3\u8bfe\u6807,\u901a\u89c8\u5355\u5143\u5404\u677f\u5757\u5185\u5bb9,\u7cfb\u7edf\u68b3\u7406\u5355\u5143\u77e5\u8bc6\u7ed3\u6784,\u51c6\u786e\u628a\u63e1\u7f16\u8005\u610f\u56fe;\u7814\u8bfb\u5355\u5143\u6587\u672c,\u5e76\u5408\u7406\u5229\u7528\u6559\u5e08\u6559\u5b66\u7528\u4e66\u7b49\u8d44\u6599,\u6316\u6398\u6587\u672c\u7684\u6838\u5fc3\u6559\u5b66\u4ef7\u503c\u3002|   |\n|\u5b66\u60c5\u5206\u6790|\u5206\u6790\u5b66\u751f\u5173\u4e8e\u672c\u5355\u5143\u6838\u5fc3\u77e5\u8bc6\u7684\u5df2\u6709\u57fa\u7840\u4e0e\u6f5c\u5728\u969c\u788d,\u5305\u62ec\u5176\u77e5\u8bc6\u50a8\u5907\u3001\u80fd\u529b\u6c34\u5e73\u3001\u5174\u8da3\u52a8\u673a\u53ca\u6587\u672c\u7406\u89e3\u7684\u96be\u70b9\u3002|   |\n|\u5355\u5143\u6838\u5fc3\u77e5\u8bc6|\u501f\u52a9\u5355\u5143\u5bfc\u8
